        h('div', { class: 'connect-consent-scope-text' }, [
          h('div', { class: 'connect-consent-scope-label' }, [txt(row.label)]),
          h('div', { class: 'connect-consent-scope-sub' }, [txt(row.sub)])
        ])
      ]);
      return rowEl;
    });

    var introText = 'AlyInvest requests read-only access to your ' + brokerName +
      ' account. These are the only permissions we need — we can never interact with your account beyond reading your data.';

    var bd = h('div', { class: 'connect-consent-bd' }, [
      h('p', { class: 'connect-consent-intro' }, [txt(introText)])
    ].concat(
      [h('div', { class: 'connect-consent-scopes' }, scopeEls)],
      [buildSyncingEl()]
    ));

    var grantBtn = h('button', { class: 'btn btn-primary', type: 'button' }, [
      txt('Grant read-only access')
    ]);
    var cancelBtn = h('button', { class: 'btn btn-ghost', type: 'button' }, [
      txt('Cancel')
    ]);

    var ft = h('div', { class: 'connect-consent-ft' }, [cancelBtn, grantBtn]);

    consentEl.appendChild(hd);
    consentEl.appendChild(bd);
    consentEl.appendChild(ft);

    var syncingEl = bd.querySelector('.connect-syncing');

    hd.querySelector('.connect-consent-close').addEventListener('click', function () {
      consentEl.classList.remove('is-open');
    });

    cancelBtn.addEventListener('click', function () {
      consentEl.classList.remove('is-open');
    });

    grantBtn.addEventListener('click', function () {
      // Show syncing state
      grantBtn.disabled = true;
      cancelBtn.disabled = true;
      bd.querySelector('.connect-consent-scopes').style.display = 'none';
      bd.querySelector('.connect-consent-intro').style.display = 'none';
      syncingEl.classList.add('is-active');

      setTimeout(function () {
        consentEl.classList.remove('is-open');
        onGranted();
      }, 1800);
    });
  }

  function buildSyncingEl() {
    return h('div', { class: 'connect-syncing' }, [
      h('div', { class: 'connect-syncing-spinner' }),
      h('div', { class: 'connect-syncing-text' }, [txt('Establishing read-only connection…')])
    ]);
  }

  // ── Build a single option card ───────────────────────────

  function buildOptionCard(brokerId, dbBroker, state, consentEl) {
    var meta = BROKER_META[brokerId];
    var isConnected = dbBroker && dbBroker.status === 'connected';

    // Logo element
    var logoEl;
    if (meta.logoText) {
      logoEl = h('div', { class: 'connect-opt-logo ' + meta.logoClass }, [txt(meta.logoText)]);
    } else {
      logoEl = h('div', { class: 'connect-opt-logo ' + meta.logoClass }, [icon(meta.logoIcon)]);
    }

    // Status pill
    var statusEl = h('div', {
      class: 'connect-opt-status ' + (isConnected ? 'connected' : 'available')
    }, [
      h('div', { class: 'connect-opt-status-dot' }),
      txt(isConnected ? 'Connected' : 'Available')
    ]);

    // Scope hints (shown for API brokers)
    var scopeEl = null;
    if (meta.kind === 'api') {
      scopeEl = h('div', { class: 'connect-opt-scope' }, [
        h('div', { class: 'connect-opt-scope-item' }, [icon('lock'), txt('read:positions · read:transactions')]),
        h('div', { class: 'connect-opt-scope-item' }, [icon('shield'), txt('No trade or transfer access')])
      ]);
    }

    // Connected preview (holdings count + last sync)
    var previewEl = null;
    if (isConnected && dbBroker) {
      var syncLabel = dbBroker.lastSync ? App.fmt.date(dbBroker.lastSync) : 'just now';
      previewEl = h('div', { class: 'connect-opt-preview' }, [
        h('div', { class: 'connect-opt-preview-stat' }, [
          h('div', { class: 'connect-opt-preview-val' }, [
            txt(String(dbBroker.holdingsCount || 0))
          ]),
          h('div', { class: 'connect-opt-preview-lbl' }, [txt('holdings synced')])
        ]),
        h('div', { class: 'connect-opt-preview-sync' }, [
          txt('Last sync'),
          h('br'),
          txt(syncLabel)
        ])
      ]);
    }

    var cardChildren = [
      h('div', { class: 'connect-opt-hd' }, [logoEl, statusEl])
    ];

    cardChildren.push(h('div', null, [
      h('p', { class: 'connect-opt-name' }, [txt(meta.name)]),
      h('p', { class: 'connect-opt-desc' }, [txt(meta.desc)])
    ]));

    if (scopeEl) cardChildren.push(scopeEl);
    if (previewEl) cardChildren.push(previewEl);

    var cardEl = h('button', {
      class: 'connect-opt' + (isConnected ? ' is-connected' : ''),
      type: 'button',
      'aria-label': meta.name + (isConnected ? ', connected' : ', tap to connect'),
      'data-broker-id': brokerId
    }, cardChildren);

    // Click handler
    cardEl.addEventListener('click', function () {
      if (meta.kind === 'api') {
        // Show inline OAuth consent
        buildConsentPanel(brokerId, meta.name, consentEl, function () {
          markConnected(brokerId, cardEl, state);
        });
        consentEl.classList.add('is-open');
        consentEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      } else if (meta.kind === 'csv') {
        // Toggle drop zone
        var dz = document.querySelector('.screen-connect .connect-dropzone');
        if (dz) {
          var isOpen = dz.classList.toggle('is-open');
          if (isOpen) dz.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

      } else if (meta.kind === 'manual') {
        // Toggle manual form
        var mf = document.querySelector('.screen-connect .connect-manual-form');
        if (mf) {
          var mfOpen = mf.classList.toggle('is-open');
          if (mfOpen) mf.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }
    });

    return cardEl;
  }

  // ── Mark a broker as connected and update UI ─────────────

  function markConnected(brokerId, cardEl, state) {
    if (!state) return;

    // Update card appearance
    cardEl.classList.add('is-connected');
    var statusEl = cardEl.querySelector('.connect-opt-status');
    if (statusEl) {
      statusEl.className = 'connect-opt-status connected';
      statusEl.innerHTML = '';
      var dot = document.createElement('div');
      dot.className = 'connect-opt-status-dot';
      statusEl.appendChild(dot);
      statusEl.appendChild(document.createTextNode('Connected'));
    }

    // Add preview holdings count
    var previewExisting = cardEl.querySelector('.connect-opt-preview');
    if (!previewExisting) {
      var brokers = (App.db && App.db.brokers) ? App.db.brokers : [];
      var dbBroker = null;
      for (var i = 0; i < brokers.length; i++) {
        if (brokers[i].id === brokerId) { dbBroker = brokers[i]; break; }
      }
      var count = dbBroker ? (dbBroker.holdingsCount || 8) : 8;
      var preview = h('div', { class: 'connect-opt-preview' }, [
        h('div', { class: 'connect-opt-preview-stat' }, [
          h('div', { class: 'connect-opt-preview-val' }, [txt(String(count))]),
          h('div', { class: 'connect-opt-preview-lbl' }, [txt('holdings synced')])
        ]),
        h('div', { class: 'connect-opt-preview-sync' }, [txt('Synced just now')])
      ]);
      cardEl.appendChild(preview);
    }

    // Track in state
    if (state.connectedBrokers.indexOf(brokerId) === -1) {
      state.connectedBrokers.push(brokerId);
    }

    App.toast(BROKER_META[brokerId].name + ' connected — read-only access granted.', 'ok');
    updateContinueVisibility(state);
  }

  // ── Show/hide Continue CTA ───────────────────────────────

  function updateContinueVisibility(state) {
    var actionsEl = document.querySelector('.screen-connect .connect-actions');
    if (!actionsEl) return;
    var hasSource = state.connectedBrokers.length > 0 || state.manualHoldings.length > 0;
    actionsEl.style.opacity = hasSource ? '1' : '0.4';
    actionsEl.style.pointerEvents = hasSource ? 'auto' : 'none';

    var continueBtn = actionsEl.querySelector('.btn-primary');
    if (continueBtn) {
      continueBtn.disabled = !hasSource;
    }
  }

  // ── Build CSV drop zone ──────────────────────────────────

  function buildDropZone(state) {
    var dz = h('div', {
      class: 'connect-dropzone',
      role: 'button',
      tabindex: '0',
      'aria-label': 'Click or drag a CSV file to import your holdings'
    }, [
      icon('upload'),
      h('div', { class: 'connect-dropzone-label' }, [
        txt('Drag your broker export here, or '),
        h('span', { style: 'color:var(--aly-gold);text-decoration:underline;cursor:pointer' }, [txt('browse')])
      ]),
      h('div', { class: 'connect-dropzone-sub' }, [
        txt('Supports Trading 212, IBKR, Freetrade, Revolut, Degiro exports')
      ])
    ]);

    function simulateImport() {
      dz.classList.remove('is-open');
      dz.classList.remove('is-dragging');

      // Simulate importing the persona holdings
      var holdings = (App.db && App.db.holdings) ? App.db.holdings : [];
      var preview = document.querySelector('.screen-connect .connect-csv-preview');
      if (!preview) return;

      preview.innerHTML = '';
      var hdr = h('div', { class: 'connect-preview-hd' }, [
        txt(holdings.length + ' holdings imported from CSV')
      ]);
      preview.appendChild(hdr);

      holdings.forEach(function (hld) {
        var row = h('div', { class: 'connect-preview-row' }, [
          h('div', { class: 'connect-preview-sym' }, [txt(hld.symbol || '')]),
          h('div', { class: 'connect-preview-name' }, [txt(hld.name || '')]),
          h('div', { class: 'connect-preview-shares' }, [
            txt(App.fmt.num(hld.shares || 0) + ' sh')
          ])
        ]);
        preview.appendChild(row);
      });

      // Mark csv as connected
      var csvCard = document.querySelector('.screen-connect .connect-opt[data-broker-id="csv"]');
      if (csvCard) markConnected('csv', csvCard, state);
    }

    dz.addEventListener('click', function () {
      // Simulate file pick immediately in demo
      setTimeout(simulateImport, 600);
    });

    dz.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        setTimeout(simulateImport, 600);
      }
    });

    dz.addEventListener('dragover', function (e) {
      e.preventDefault();
      dz.classList.add('is-dragging');
    });

    dz.addEventListener('dragleave', function () {
      dz.classList.remove('is-dragging');
    });

    dz.addEventListener('drop', function (e) {
      e.preventDefault();
      setTimeout(simulateImport, 400);
    });

    return dz;
  }

  // ── Build manual add-holding form ────────────────────────

  function buildManualForm(state) {
    var symInput = h('input', {
      class: 'input',
      type: 'text',
      id: 'manual-sym',
      name: 'symbol',
      placeholder: 'e.g. MSFT',
      'aria-label': 'Ticker symbol'
    });

    var sharesInput = h('input', {
      class: 'input',
      type: 'number',
      id: 'manual-shares',
      name: 'shares',
      placeholder: '0',
      min: '0',
      step: '0.001',
      'aria-label': 'Number of shares'
    });

    var costInput = h('input', {
      class: 'input',
      type: 'number',
      id: 'manual-cost',
      name: 'cost',
      placeholder: '0.00',
      min: '0',
      step: '0.01',
      'aria-label': 'Average cost per share'
    });

    var addBtn = h('button', { class: 'btn btn-primary btn-sm', type: 'button' }, [
      txt('Add holding')
    ]);

    var previewList = h('div', { class: 'connect-preview' });

    function addHolding() {
      var sym = symInput.value.trim().toUpperCase();
      var shares = parseFloat(sharesInput.value);
      var cost = parseFloat(costInput.value);

      if (!sym) {
        App.toast('Enter a ticker symbol.', 'warn');
        symInput.focus();
        return;
      }
      if (isNaN(shares) || shares <= 0) {
        App.toast('Enter a valid number of shares.', 'warn');
        sharesInput.focus();
        return;
      }

      // Prevent duplicates
      for (var k = 0; k < state.manualHoldings.length; k++) {
        if (state.manualHoldings[k].symbol === sym) {
          App.toast(sym + ' is already in your list.', 'warn');
          return;
        }
      }

      var entry = { symbol: sym, shares: shares, avgCost: isNaN(cost) ? 0 : cost };
      state.manualHoldings.push(entry);

      // Render preview row
      if (state.manualHoldings.length === 1) {
        var hdr = h('div', { class: 'connect-preview-hd' }, [txt('Holdings added manually')]);
        previewList.appendChild(hdr);
      }

      var removeBtn = h('button', {
        class: 'connect-preview-remove',
        type: 'button',
        'aria-label': 'Remove ' + sym
      }, [icon('close')]);

      var row = h('div', { class: 'connect-preview-row', 'data-sym': sym }, [
        h('div', { class: 'connect-preview-sym' }, [txt(sym)]),
        h('div', { class: 'connect-preview-name' }, [
          txt(entry.avgCost > 0 ? 'avg ' + App.fmt.money(entry.avgCost) : 'no avg cost')
        ]),
        h('div', { class: 'connect-preview-shares' }, [
          txt(App.fmt.num(shares) + ' sh')
        ]),
        removeBtn
      ]);

      removeBtn.addEventListener('click', function () {
        state.manualHoldings = state.manualHoldings.filter(function (h) { return h.symbol !== sym; });
        row.parentNode.removeChild(row);
        if (state.manualHoldings.length === 0 && previewList.firstChild) {
          previewList.removeChild(previewList.firstChild);
        }
        updateContinueVisibility(state);
      });

      previewList.appendChild(row);

      // Clear inputs
      symInput.value = '';
      sharesInput.value = '';
      costInput.value = '';
      symInput.focus();

      // Mark manual as "connected"
      var manualCard = document.querySelector('.screen-connect .connect-opt[data-broker-id="manual"]');
      if (manualCard && state.connectedBrokers.indexOf('manual') === -1) {
        markConnected('manual', manualCard, state);
      } else {
        updateContinueVisibility(state);
      }
    }

    addBtn.addEventListener('click', addHolding);

    // Allow Enter in inputs to submit
    [symInput, sharesInput, costInput].forEach(function (inp) {
      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); addHolding(); }
      });
    });

    return h('div', { class: 'connect-manual-form' }, [
      h('div', { class: 'connect-manual-form-hd' }, [txt('Add a holding')]),
      h('div', { class: 'connect-manual-fields' }, [
        h('div', { class: 'field' }, [
          h('label', { class: 'flabel', for: 'manual-sym' }, [txt('Symbol')]),
          symInput
        ]),
        h('div', { class: 'field' }, [
          h('label', { class: 'flabel', for: 'manual-shares' }, [txt('Shares')]),
          sharesInput
        ]),
        h('div', { class: 'field' }, [
          h('label', { class: 'flabel', for: 'manual-cost' }, [txt('Avg cost')]),
          costInput
        ])
      ]),
      h('div', null, [addBtn]),
      previewList
    ]);
  }

  // ── Mount ─────────────────────────────────────────────────

  function mount(el, params) {
    // Fresh local state
    _state = {
      connectedBrokers: [],
      manualHoldings: []
    };
    var state = _state;

    // Pre-populate already-connected brokers from db
    var dbBrokers = (App.db && App.db.brokers) ? App.db.brokers : [];
    dbBrokers.forEach(function (b) {
      if (b.status === 'connected' && BROKER_IDS.indexOf(b.id) !== -1) {
        if (state.connectedBrokers.indexOf(b.id) === -1) {
          state.connectedBrokers.push(b.id);
        }
      }
    });

    // ── Shell ──
    var root = h('div', { class: 'screen screen-connect' }, [
      h('div', { class: 'connect-shell' })
    ]);
    var shell = root.querySelector('.connect-shell');

    // ── Brand / step progress ──
    var stepDots = ['splash', 'welcome', 'signup', 'connect', 'onboarding'].map(function (s, i) {
      var isDone = i < 3;
      var isNow  = i === 3;
      return h('div', {
        class: 'connect-step-dot' + (isDone ? ' is-done' : '') + (isNow ? ' is-now' : ''),
        'aria-hidden': 'true'
      });
    });

    var brandRow = h('div', { class: 'connect-brand' }, [
      h('div', { class: 'connect-brand-mark' }, [txt('A')]),
      h('div', { class: 'connect-brand-name' }, [txt('AlyInvest')])
    ]);

    var stepsEl = h('div', { class: 'connect-steps', 'aria-label': 'Setup step 4 of 5' },
      stepDots
    );

    shell.appendChild(brandRow);
    shell.appendChild(stepsEl);

    // ── Heading ──
    var headingEl = h('div', { class: 'connect-heading', 'data-reveal': '' }, [
      h('h1', null, [txt('Connect your portfolio')]),
      h('p', null, [
        txt('Link your existing broker so AlyInvest can see your holdings and give you grounded, personalised advice. You choose how.')
      ])
    ]);
    shell.appendChild(headingEl);

    // ── Trust banner ──
    var trustPillars = [
      { ic: 'eye',    label: 'Read-only' },
      { ic: 'lock',   label: 'Tokens in vault' },
      { ic: 'shield', label: 'No trade access' },
      { ic: 'close',  label: 'Disconnect anytime' }
    ].map(function (p) {
      return h('div', { class: 'connect-trust-pillar' }, [icon(p.ic), txt(p.label)]);
    });

    var trustEl = h('div', { class: 'connect-trust', 'data-reveal': '' }, [
      h('div', { class: 'connect-trust-icon' }, [icon('shield')]),
      h('div', { class: 'connect-trust-body' }, [
        h('strong', null, [txt('Read-only access, always')]),
        h('p', null, [
          txt('AlyInvest connects read-only. We see your holdings to advise you — we can never place trades, move money, or interact with your account. Your credentials are stored in an encrypted vault; you can disconnect at any time.')
        ]),
        h('div', { class: 'connect-trust-pillars' }, trustPillars)
      ])
    ]);
    shell.appendChild(trustEl);

    // ── Consent panel (shared, revealed inline) ──
    var consentEl = h('div', { class: 'connect-consent', 'aria-live': 'polite' });
    shell.appendChild(consentEl);

    // ── Option cards ──
    var sectionLbl = h('div', { class: 'connect-section-label', 'data-reveal': '' }, [
      txt('Choose a connection method')
    ]);
    shell.appendChild(sectionLbl);

    var optionsGrid = h('div', { class: 'connect-options', 'data-reveal': '' });

    BROKER_IDS.forEach(function (bid) {
      var dbBroker = null;
      dbBrokers.forEach(function (b) { if (b.id === bid) dbBroker = b; });
      var card = buildOptionCard(bid, dbBroker, state, consentEl);
      optionsGrid.appendChild(card);
    });

    shell.appendChild(optionsGrid);

    // ── Drop zone (CSV) ──
    var dropZone = buildDropZone(state);
    shell.appendChild(dropZone);

    // CSV preview area
    var csvPreview = h('div', { class: 'connect-csv-preview' });
    shell.appendChild(csvPreview);

    // ── Manual form ──
    var manualForm = buildManualForm(state);
    shell.appendChild(manualForm);

    // ── Continue CTA ──
    var hasPreConnected = state.connectedBrokers.length > 0;

    var continueBtn = h('button', {
      class: 'btn btn-primary btn-block',
      type: 'button',
      disabled: !hasPreConnected
    }, [txt('Continue to personalise your advice')]);

    var skipBtn = h('button', {
      class: 'connect-skip',
      type: 'button',
      'aria-label': 'Skip connecting a portfolio for now'
    }, [txt('Skip for now — I\'ll connect later')]);

    var actionsEl = h('div', { class: 'connect-actions', 'data-reveal': '' }, [
      continueBtn,
      skipBtn
    ]);

    if (!hasPreConnected) {
      actionsEl.style.opacity = '0.4';
      actionsEl.style.pointerEvents = 'none';
    }

    continueBtn.addEventListener('click', function () {
      App.go('onboarding');
    });

    skipBtn.addEventListener('click', function () {
      App.toast('You can connect your portfolio anytime in Settings.', 'info');
      App.go('onboarding');
    });

    shell.appendChild(actionsEl);

    // ── Mount into host ──
    el.appendChild(root);

    // ── Reveal animation ──
    App.reveal(root);
  }

  // ── Unmount ───────────────────────────────────────────────

  function unmount() {
    _state = null;
  }

  // ── Register ──────────────────────────────────────────────

  App.register('connect', {
    chrome: 'flow',
    title: 'Connect Portfolio',
    mount: mount,
    unmount: unmount
  });

}());


/* ===================== screen: dashboard.js ===================== */
/* =============================================================================
   SCREEN: dashboard — Home
   chrome: app | registers via App.register('dashboard', …)
   ============================================================================= */
(function () {
  'use strict';

  /* ── helpers ─────────────────────────────────────────────────────────────── */
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        if (k === 'className') { node.className = attrs[k]; }
        else if (k === 'innerHTML') { node.innerHTML = attrs[k]; }
        else if (k === 'textContent') { node.textContent = attrs[k]; }
        else if (k === 'style') { node.style.cssText = attrs[k]; }
        else if (k.startsWith('data-')) { node.setAttribute(k, attrs[k]); }
        else if (k === 'aria-label' || k === 'role' || k === 'type' || k === 'aria-live') {
          node.setAttribute(k, attrs[k]);
        } else { node[k] = attrs[k]; }
      });
    }
    if (children) {
      children.forEach(function (c) {
        if (!c) { return; }
        if (typeof c === 'string') { node.insertAdjacentHTML('beforeend', c); }
        else { node.appendChild(c); }
      });
    }
    return node;
  }

  function div(cls, children) { return el('div', { className: cls }, children); }
  function span(cls, text) { var s = el('span', { className: cls }); s.textContent = text; return s; }
  function btn(cls, html, onClick) {
    var b = el('button', { className: cls, type: 'button', innerHTML: html });
    b.addEventListener('click', onClick);
    return b;
  }

  function deltaClass(d) {
    if (d > 0) { return 'up'; }
    if (d < 0) { return 'down'; }
    return 'flat';
  }
  function deltaIcon(d) {
    if (d > 0) { return App.icon('arrow-up'); }
    if (d < 0) { return App.icon('arrow-down'); }
    return App.icon('dot');
  }

  /* safe get — returns undefined instead of throwing */
  function get(obj) {
    var keys = Array.prototype.slice.call(arguments, 1);
    var cur = obj;
    for (var i = 0; i < keys.length; i++) {
      if (cur == null) { return undefined; }
      cur = cur[keys[i]];
    }
    return cur;
  }

  /* ── colour palette (canvas cannot read CSS vars) ─────────────────────────── */
  var C = {
    gold:    '#C8A45A',
    goldFill:'rgba(200,164,90,.13)',
    pos:     '#29B37A',
    neg:     '#E5484D',
    warn:    '#E0A93B',
    info:    '#4C8DFF',
    text:    '#EDF0F4',
    dim:     '#A6AEBC',
    mute:    '#6B7280',
    line:    '#262B33',
    panel:   '#12151A',
    ground:  '#0B0D10'
  };

  /* score ring colours */
  function scoreColor(key, value) {
    if (key === 'risk') { return value > 70 ? C.warn : C.gold; }
    if (key === 'diversification') { return value < 60 ? C.warn : C.pos; }
    return value >= 70 ? C.pos : (value >= 50 ? C.gold : C.neg);
  }

  /* ── section builders ─────────────────────────────────────────────────────── */

  /* HERO -------------------------------------------------------------------- */
  function buildHero(db) {
    var pf = db.portfolio || {};
    var user = db.user || {};
    var eng = db.engine || {};
    var total   = pf.totalValue    || 0;
    var dayAbs  = pf.dayChange     || 0;
    var dayPct  = pf.dayChangePct  || 0;
    var plAbs   = pf.totalPL       || 0;
    var plPct   = pf.totalPLPct    || 0;

    var card = div('card hero', []);
    card.setAttribute('data-reveal', '');

    /* greeting row */
    var greet = el('h1', { className: 'hero-greet' });
    greet.textContent = 'Good evening, ' + (user.first || 'Aly');

    /* big total */
    var total_el = el('p', { className: 'hero-total' });
    total_el.textContent = App.fmt.money(total);

    /* day P/L + total P/L */
    var dayDC = deltaClass(dayAbs);
    var plDC  = deltaClass(plAbs);

    var plBlock = div('hero-pl', [
      div('pl-item', [
        span('pl-lbl', 'Today'),
        div('pl-val', [
          el('span', { className: 'pl-abs ' + dayDC, textContent: App.fmt.money(dayAbs, { sign: true }) }),
          el('span', { className: 'delta ' + dayDC, innerHTML: deltaIcon(dayAbs) + App.fmt.pct(dayPct, { sign: true }) })
        ])
      ]),
      div('pl-item', [
        span('pl-lbl', 'Total return'),
        div('pl-val', [
          el('span', { className: 'pl-abs ' + plDC, textContent: App.fmt.money(plAbs, { sign: true }) }),
          el('span', { className: 'delta ' + plDC, innerHTML: deltaIcon(plAbs) + App.fmt.pct(plPct, { sign: true }) })
        ])
      ])
    ]);

    /* range segmented toggle */
    var ranges = pf.ranges || {};
    var rangeKeys = ['1M', '3M', '6M'];
    var activeRange = '3M';
    var chartCanvas = document.createElement('canvas');
    chartCanvas.setAttribute('aria-label', 'Portfolio value over time');

    function getPoints(rk) {
      var pts = ranges[rk] || pf.history || [];
      return Array.isArray(pts) ? pts : [];
    }

    function drawChart() {
      Charts.area(chartCanvas, getPoints(activeRange), { color: C.gold, fill: true, height: 220 });
    }

    var segs = rangeKeys.map(function (rk) {
      var s = btn('seg' + (rk === activeRange ? ' is-on' : ''), rk, function () {
        if (activeRange === rk) { return; }
        activeRange = rk;
        segs.forEach(function (ss, si) {
          ss.className = 'seg' + (rangeKeys[si] === rk ? ' is-on' : '');
        });
        drawChart();
      });
      return s;
    });

    var segmented = div('segmented hero-range', segs);

    var chartWrap = div('hero-chart', [chartCanvas]);

    var foot = div('hero-foot', [
      el('span', { textContent: 'As of ' + (eng.asOf || ''), style: 'color:var(--aly-mute);font-size:12px' }),
      div('', [ el('span', { className: 'ev ev--fact', textContent: 'Fact' }) ])
    ]);

    card.appendChild(greet);
    card.appendChild(total_el);
    card.appendChild(plBlock);
    card.appendChild(segmented);
    card.appendChild(chartWrap);
    card.appendChild(foot);

    App.onResize(drawChart);

    return card;
  }

  /* SCORE RINGS ------------------------------------------------------------- */
  function buildScores(db) {
    var sc = db.scores || {};
    var defs = [
      { key: 'health',        label: 'Portfolio Health', sub: function (s) { return get(s, 'health', 'band') || ''; }, val: function (s) { return get(s, 'health', 'value') || 0; }, delta: function (s) { return get(s, 'health', 'delta') || 0; } },
      { key: 'diversification', label: 'Diversification', sub: function (s) { return get(s, 'diversification', 'band') || ''; }, val: function (s) { return get(s, 'diversification', 'value') || 0; }, delta: function (s) { return get(s, 'diversification', 'delta') || 0; } },
      { key: 'confidence',    label: 'Confidence', sub: function (s) { return 'AI Confidence'; }, val: function (s) { return get(s, 'confidence', 'value') || 0; }, delta: function (s) { return get(s, 'confidence', 'delta') || 0; } },
      { key: 'risk',          label: 'Risk Score',  sub: function (s) { return get(s, 'risk', 'bandLabel') || get(s, 'risk', 'band') || ''; }, val: function (s) { return get(s, 'risk', 'value') || 0; }, delta: function (s) { return get(s, 'risk', 'delta') || 0; } }
    ];

    var wrap = div('col-full scores-grid');
    wrap.setAttribute('data-reveal', '');

    defs.forEach(function (def) {
      var value = def.val(sc);
      var delta = def.delta(sc);
      var band  = def.sub(sc);
      var dc    = deltaClass(delta);
      var col   = scoreColor(def.key, value);
      var isConf = def.key === 'confidence';

      /* sub-label text */
      var sublabel = isConf ? App.fmt.pct(value) : String(value);

      var cv = document.createElement('canvas');
      cv.setAttribute('aria-label', def.label + ' score: ' + value);

      var ring = div('ring-wrap', [cv]);

      /* delta badge */
      var deltaBadge = el('span', {
        className: 'delta ' + dc,
        innerHTML: deltaIcon(delta) + App.fmt.num(Math.abs(delta), { frac: 0 })
      });

      var meta = div('sc-meta', [
        span('sc-name', def.label),
        div('metric', [
          el('span', { className: 'metric-val', textContent: sublabel }),
          deltaBadge
        ]),
        span('sc-band', band)
      ]);

      var card = div('card scorecard', []);
      card.appendChild(div('card-bd', [
        div('', [ ring, meta ], [])
      ]));

      /* make card-bd flex */
      var bd = card.querySelector('.card-bd');
      bd.style.cssText = 'display:flex;align-items:center;gap:16px;';
      bd.replaceChildren(ring, meta);

      wrap.appendChild(card);

      App.onResize(function () {
        Charts.ring(cv, value, {
          label: isConf ? App.fmt.pct(value) : String(value),
          sublabel: isConf ? 'Confidence' : def.label,
          color: col,
          track: C.line,
          height: 84
        });
      });
    });

    return wrap;
  }

  /* ADVISOR MESSAGE ---------------------------------------------------------- */
  function buildAdvisor(db) {
    var adv = db.advisor || {};
    var eng = db.engine || {};
    var briefing = adv.briefing || 'Your portfolio is performing steadily. Review your advisor note for more detail.';

    var card = div('card advisor-card accent', []);
    card.setAttribute('data-reveal', '');

    var head = div('adv-head', [
      div('avatar', [ App.icon('sparkle') ]),
      div('adv-id', [
        el('span', { className: 'adv-role', textContent: 'Your Advisor' }),
        el('span', { className: 'adv-sub',  textContent: 'Grounded in your data · ' + (eng.asOf || '') })
      ])
    ]);

    var body = el('p', { className: 'adv-body', textContent: briefing });

    var evRow = div('adv-ev', [
      el('span', { className: 'ev ev--analysis', textContent: 'Analysis' }),
      el('span', { className: 'ev ev--fact',     textContent: 'Fact' })
    ]);

    var askBtn = btn('btn btn-primary btn-sm', App.icon('sparkle') + ' Ask Your Advisor', function () {
      App.go('advisor');
    });

    card.appendChild(div('card-bd', []));
    var bd = card.querySelector('.card-bd');
    bd.appendChild(head);
    bd.appendChild(body);
    bd.appendChild(evRow);
    bd.appendChild(el('div', { style: 'margin-top:16px' }, [askBtn]));

    return card;
  }

  /* TOP RECOMMENDATION ------------------------------------------------------- */
  function buildRec(db) {
    var timeline = db.timeline || [];
    /* find the most recent active entry */
    var entry = null;
    for (var i = 0; i < timeline.length; i++) {
      if (timeline[i].status === 'active') { entry = timeline[i]; break; }
    }
    if (!entry) { entry = timeline[0] || null; }

    var card = div('card', []);
    card.setAttribute('data-reveal', '');

    var hd = div('card-hd', [
      el('h2', { className: 'card-title', textContent: "Today's Recommendation" }),
      btn('card-more', 'View all ' + App.icon('chevron-right'), function () { App.go('timeline'); })
    ]);
    card.appendChild(hd);

    if (!entry) {
      card.appendChild(div('empty', [ el('p', { textContent: 'No active recommendations.' }) ]));
      return card;
    }

    var instr = get(db, 'instruments', entry.symbol) || {};
    var rec   = instr.rec || {};
    var conf  = rec.confidence || entry.confidence || 0;
    var action     = rec.action     || entry.action     || 'hold';
    var actionLabel = rec.actionLabel || entry.actionLabel || 'Hold';
    var summary    = rec.summary    || entry.reason     || '';

    var recCard = div('rec', []);

    /* top row: symbol chip + rating badge */
    var top = div('rec-top', [
      btn('rec-sym', App.icon('external') + (entry.symbol || ''), function () {
        if (entry.symbol) { App.go('stock', { symbol: entry.symbol }); }
      }),
      el('span', { className: 'rating ' + action, textContent: actionLabel })
    ]);

    /* confidence bar */
    var confRow = div('conf-row', [
      div('confbar', [ el('div', { style: 'width:' + conf + '%;height:100%;background:' + C.gold + ';border-radius:3px' }) ]),
      span('conf-num', App.fmt.pct(conf))
    ]);

    /* what changed one-liner */
    var whatTxt = (entry.whatChanged && entry.whatChanged[0]) || (entry.reason || '');
    var what = el('p', { className: 'rec-what', textContent: whatTxt });

    /* links */
    var links = div('rec-links', [
      btn('btn btn-ghost btn-sm', App.icon('activity') + ' ' + (entry.symbol || 'Stock'), function () {
        if (entry.symbol) { App.go('stock', { symbol: entry.symbol }); }
      }),
      btn('btn btn-ghost btn-sm', App.icon('timeline') + ' Timeline entry', function () {
        App.go('timeline');
      })
    ]);

    var note = el('p', { className: 'rec-note', textContent: 'Analysis only — AlyInvest never places trades.' });

    recCard.appendChild(top);
    if (summary) {
      recCard.appendChild(el('p', { style: 'color:var(--aly-dim);font-size:14px;margin:10px 0 6px', textContent: summary }));
    }
    recCard.appendChild(confRow);
    recCard.appendChild(what);
    recCard.appendChild(links);
    recCard.appendChild(note);

    card.appendChild(div('card-bd', [recCard]));
    return card;
  }

  /* MARKET SUMMARY ----------------------------------------------------------- */
  function buildMarket(db) {
    var mkt = db.market || {};
    var indices = mkt.indices || [];
    var sentiment = mkt.sentiment || 'neutral';

    var sentPill = 'pill';
    if (sentiment === 'risk-on')  { sentPill += ' pos'; }
    else if (sentiment === 'risk-off') { sentPill += ' neg'; }
    else { sentPill += ' mute'; }

    var card = div('card', []);
    card.setAttribute('data-reveal', '');

    var hd = div('card-hd', [
      el('h2', { className: 'card-title', textContent: 'Market' }),
      el('span', { className: sentPill, textContent: sentiment })
    ]);

    var rows = div('mkt-indices', []);
    indices.forEach(function (idx) {
      var chgDC = deltaClass(idx.changePct);
      var row = div('mkt-row', [
        span('mkt-name', idx.name || ''),
        div('mkt-vals', [
          span('mkt-val', App.fmt.num(idx.value, { frac: 2 })),
          el('span', { className: 'mkt-chg ' + chgDC, textContent: App.fmt.pct(idx.changePct, { sign: true }) })
        ])
      ]);
      rows.appendChild(row);
    });

    var summary = el('p', { className: 'mkt-summary', textContent: mkt.summary || '' });
    var prov    = el('p', { className: 'prov', textContent: 'Market data · as of ' + (mkt.asOf || '') });

    var bd = div('card-bd', [rows, summary, prov]);
    card.appendChild(hd);
    card.appendChild(bd);
    return card;
  }

  /* UPCOMING EARNINGS -------------------------------------------------------- */
  function buildEarnings(db) {
    var earnings = db.earnings || [];
    var card = div('card', []);
    card.setAttribute('data-reveal', '');

    var hd = div('card-hd', [
      el('h2', { className: 'card-title', textContent: 'Upcoming Earnings' }),
      btn('card-more', 'Calendar ' + App.icon('chevron-right'), function () { App.go('portfolio'); })
    ]);

    var list = div('earn-list', []);

    earnings.slice(0, 5).forEach(function (e) {
      var imp = e.importance === 'high' ? 'pill warn' : 'pill mute';
      /* parse a short month + day from e.date */
      var dateParts = { m: '', d: '' };
      if (e.date) {
        var d = new Date(e.date + 'T00:00:00');
        if (!isNaN(d)) {
          dateParts.m = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
          dateParts.d = String(d.getDate());
        }
      }

      var row = btn('earn-row', '', function () {
        App.go('stock', { symbol: e.symbol });
      });
      row.setAttribute('aria-label', (e.name || e.symbol) + ' earnings ' + (e.dateLabel || e.date));

      var cal = div('earn-cal', [
        el('div', { className: 'm', textContent: dateParts.m }),
        el('div', { className: 'd', textContent: dateParts.d })
      ]);
      var main = div('earn-main', [
        span('earn-sym', e.symbol || ''),
        span('earn-name', e.name  || '')
      ]);
      var meta = div('earn-meta', [
        el('span', { className: imp, textContent: e.importance === 'high' ? 'High impact' : 'Medium' }),
        el('span', { className: 'earn-when', textContent: e.when || '' })
      ]);

      row.appendChild(cal);
      row.appendChild(main);
      row.appendChild(meta);
      list.appendChild(row);
    });

    if (!earnings.length) {
      list.appendChild(div('empty', [ el('p', { textContent: 'No upcoming earnings.' }) ]));
    }

    card.appendChild(hd);
    card.appendChild(div('card-bd', [list]));
    return card;
  }

  /* RECENT CHANGES ----------------------------------------------------------- */
  function buildRecentChanges(db) {
    var wc    = db.whatChanged || {};
    var diffs = wc.diffs || [];

    var card = div('card', []);
    card.setAttribute('data-reveal', '');

    var hd = div('card-hd', [
      el('h2', { className: 'card-title', textContent: 'Recent Changes' }),
      btn('card-more', 'What Changed ' + App.icon('chevron-right'), function () { App.go('whatchanged'); })
    ]);

    var list = div('rc-list', []);

    if (wc.quietDay && !diffs.length) {
      list.appendChild(div('callout note', [
        el('p', { textContent: 'Quiet day — nothing material changed.' })
      ]));
    } else {
      var shown = diffs.slice(0, 4);
      shown.forEach(function (d) {
        var dc  = d.direction || 'flat';
        var mat = d.materiality === 'notify' ? ' pill warn' : ' pill mute';

        var row = btn('rc-row', '', function () {
          if (d.relatedRecId) { App.go('timeline'); }
          else { App.go('whatchanged'); }
        });
        row.setAttribute('aria-label', (d.label || d.dimension) + ': ' + (d.from || '') + ' → ' + (d.to || ''));

        var mark = div('rc-mark ' + dc, [ App.icon(dc === 'up' ? 'arrow-up' : dc === 'down' ? 'arrow-down' : 'dot') ]);

        var fromTo = div('rc-from-to', [
          span('rc-from', String(d.from || '')),
          span('rc-arrow', ' → '),
          span('rc-to',   String(d.to   || ''))
        ]);

        var titleRow = div('rc-top', [
          el('span', { className: 'rc-title', textContent: d.label || d.dimension || '' }),
          el('span', { className: mat, textContent: d.materiality === 'notify' ? 'Notify' : 'Surface' })
        ]);

        var main = div('rc-main', [ titleRow, fromTo ]);
        if (d.why) {
          main.appendChild(el('span', { style: 'color:var(--aly-mute);font-size:12px', textContent: d.why }));
        }

        row.appendChild(mark);
        row.appendChild(main);
        list.appendChild(row);
      });

      if (!shown.length) {
        list.appendChild(div('callout note', [
          el('p', { textContent: 'No material changes to display.' })
        ]));
      }
    }

    card.appendChild(hd);
    card.appendChild(div('card-bd', [list]));
    return card;
  }

  /* QUICK ACTIONS ------------------------------------------------------------ */
  function buildQuickActions() {
    var actions = [
      { icon: 'sparkle',    t: 'Ask Your Advisor', s: 'Get considered analysis',     route: 'advisor' },
      { icon: 'timeline',   t: 'Review Timeline',  s: 'Your full recommendation log', route: 'timeline' },
      { icon: 'activity',   t: 'What Changed',     s: 'Yesterday vs. today',          route: 'whatchanged' },
      { icon: 'brain',      t: 'Advisor Memory',   s: 'What your advisor remembers',  route: 'memory' }
    ];

    var wrap = div('col-full', []);
    wrap.setAttribute('data-reveal', '');

    var eyebrow = div('section-hd', [
      el('h2', { className: 'section-title', textContent: 'Quick Actions' })
    ]);

    var grid = div('qa-grid', []);
    actions.forEach(function (a) {
      var b = btn('qa-btn', '', function () { App.go(a.route); });
      b.setAttribute('aria-label', a.t);
      b.appendChild(div('qa-ic', [ App.icon(a.icon) ]));
      var lbl = div('qa-lbl', []);
      lbl.appendChild(el('span', { className: 'qa-t', textContent: a.t }));
      lbl.appendChild(el('span', { className: 'qa-s', textContent: a.s }));
      b.appendChild(lbl);
      grid.appendChild(b);
    });

    wrap.appendChild(eyebrow);
    wrap.appendChild(grid);
    return wrap;
  }

  /* ── mount / unmount ───────────────────────────────────────────────────────── */
  App.register('dashboard', {
    chrome: 'app',
    title: 'Dashboard',

    mount: function (el_host, params) {
      var db = App.db;

      var root = div('screen screen-dashboard');
      var cont = div('container');

      /* header eyebrow */
      var eng = (db && db.engine) || {};
      var eyebrow = div('dash-eyebrow dash-head', [
        el('span', { className: 'eyebrow', textContent: 'Overview' }),
        el('span', { className: 'dash-asof', textContent: eng.asOf || '' })
      ]);

      /* master grid */
      var grid = div('dash-grid');

      /* hero col (8) */
      var heroWrap = div('col-hero');
      heroWrap.appendChild(buildHero(db));

      /* side col (4): advisor message stacked over rec */
      var side = div('col-side stack');
      side.appendChild(buildAdvisor(db));
      side.appendChild(buildRec(db));

      /* scores row (full) */
      var scores = buildScores(db);

      /* second row: market (4) + earnings (4) + recent changes (4) */
      var mktWrap = div('col-third');
      mktWrap.appendChild(buildMarket(db));

      var earnWrap = div('col-third');
      earnWrap.appendChild(buildEarnings(db));

      var rcWrap = div('col-third');
      rcWrap.appendChild(buildRecentChanges(db));

      /* quick actions (full) */
      var qa = buildQuickActions();

      grid.appendChild(heroWrap);
      grid.appendChild(side);
      grid.appendChild(scores);
      grid.appendChild(mktWrap);
      grid.appendChild(earnWrap);
      grid.appendChild(rcWrap);
      grid.appendChild(qa);

      cont.appendChild(eyebrow);
      cont.appendChild(grid);
      root.appendChild(cont);
      el_host.appendChild(root);

      App.reveal(root);
    },

    unmount: function () {
      /* App.onResize handlers are auto-cleared by the router on unmount */
    }
  });

}());


/* ===================== screen: memory.js ===================== */
(function () {
  'use strict';

  // Working copy so edits/forgets persist within the session without mutating source.
  var M = null;
  var _editing = {}; // key -> bool
  var _ring = null;

  function make(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  function clone(o) { return JSON.parse(JSON.stringify(o)); }

  function confWrap(conf) {
    var w = make('div', 'mem-conf-wrap');
    w.appendChild(make('span', 'mem-conf-label', 'Confidence'));

  // A generic editable item card. cfg: { key, primary, detail, source, confidence,

  function itemCard(cfg) {

    actions.appendChild(edit);

    var meta = make('div', 'mem-item-meta');

  function section(icon, title, count, bodyEl) {

/* ===================== screen: notifications.js ===================== */
(function () {
  'use strict';

  /* ── module-level cleanup handles ─────────────────── */
  var _resizeCleanup = null;

  /* ── severity helpers ──────────────────────────────── */
  var SEV_ICON = {
    info:        'bell',
    warn:        'alert',
    opportunity: 'target'
  };

  var SEV_LABEL = {
    info:        'Info',
    warn:        'Alert',
    opportunity: 'Opportunity'
  };

  /* ── icon map by notification type ────────────────── */
  var TYPE_ICON = {
    concentration_high:       'layers',
    diversification_decreasing:'activity',
    upcoming_earnings:        'calendar',
    valuation_change:         'scale',
    dividend_announcement:    'coins',
    missed_contribution:      'clock',
    memory_updated:           'brain',
    daily_digest:             'mail'
  };

  /* ── in-memory read state (keyed by notification id) */
  var _readState = {};

  /* ── active filter ─────────────────────────────────── */
  var _filter = 'all'; // 'all' | 'unread'

  /* ── helper: mark a notification as read ──────────── */
  function markRead(id) {
    _readState[id] = true;
  }

  function isRead(n) {
    return _readState[n.id] || n.read === true;
  }

  /* ── helper: group notifications into Today / Earlier */
  function groupNotifications(list, asOfIso) {
    var today = asOfIso || '2026-06-30';
    var groups = { today: [], earlier: [] };
    list.forEach(function (n) {
      if (n.ts && n.ts.slice(0, 10) === today) {
        groups.today.push(n);
      } else {
        groups.earlier.push(n);
      }
    });
    return groups;
  }

  /* ── render: build the full notifications DOM ──────── */
  function render(el, notifications, asOfIso) {
    /* clear */
    el.innerHTML = '';

    var root = document.createElement('div');
    root.className = 'screen screen-notifications container';

    /* ── page header ─────────────────────────────────── */
    var unreadCount = notifications.filter(function (n) { return !isRead(n); }).length;

    var pagHd = document.createElement('div');
    pagHd.className = 'notif-page-hd';
    pagHd.setAttribute('data-reveal', '');

    var titleRow = document.createElement('div');
    titleRow.className = 'notif-title-row';

    var h1 = document.createElement('h1');
    h1.textContent = 'Notifications';

    titleRow.appendChild(h1);

    if (unreadCount > 0) {
      var badge = document.createElement('span');
      badge.className = 'notif-unread-total';
      badge.textContent = unreadCount + ' unread';
      titleRow.appendChild(badge);
    }

    pagHd.appendChild(titleRow);

    var calmNote = document.createElement('p');
    calmNote.className = 'notif-calm-note';
    calmNote.innerHTML = App.icon('shield') +
      'Calm by default — we only reach out when something material changes. ' +
      'Price-only moves never trigger a notification. Quiet hours respected.';
    pagHd.appendChild(calmNote);

    root.appendChild(pagHd);

    /* ── two-column layout ──────────────────────────── */
    var layout = document.createElement('div');
    layout.className = 'notif-layout';

    /* LEFT: sidebar */
    var sidebar = document.createElement('aside');
    sidebar.className = 'notif-sidebar';
    sidebar.setAttribute('data-reveal', '');

    /* filter buttons */
    var filterGroup = document.createElement('div');
    filterGroup.className = 'notif-filter-group';

    var filters = [
      { key: 'all',    icon: 'bell',  label: 'All notifications' },
      { key: 'unread', icon: 'dot',   label: 'Unread only' }
    ];

    filters.forEach(function (f) {
      var btn = document.createElement('button');
      btn.className = 'notif-filter-btn' + (_filter === f.key ? ' is-active' : '');
      btn.setAttribute('aria-pressed', _filter === f.key ? 'true' : 'false');

      var count = f.key === 'all'
        ? notifications.length
        : notifications.filter(function (n) { return !isRead(n); }).length;

      btn.innerHTML = App.icon(f.icon) + '<span>' + f.label + '</span>';

      var countEl = document.createElement('span');
      countEl.className = 'notif-filter-count';
      countEl.textContent = count;
      btn.appendChild(countEl);

      btn.addEventListener('click', function () {
        _filter = f.key;
        render(el, notifications, asOfIso);
      });

      filterGroup.appendChild(btn);
    });

    sidebar.appendChild(filterGroup);

    /* summary stats card */
    var sumCard = document.createElement('div');
    sumCard.className = 'card notif-summary-card';

    var warnCount = notifications.filter(function (n) { return n.severity === 'warn'; }).length;
    var oppCount  = notifications.filter(function (n) { return n.severity === 'opportunity'; }).length;
    var infoCount = notifications.filter(function (n) { return n.severity === 'info'; }).length;

    var summaryRows = [
      { label: 'Alerts',       val: warnCount },
      { label: 'Opportunities',val: oppCount },
      { label: 'Info',         val: infoCount },
      { label: 'Total',        val: notifications.length }
    ];

    summaryRows.forEach(function (row) {
      var r = document.createElement('div');
      r.className = 'notif-summary-row';
      r.innerHTML = '<span class="label">' + row.label + '</span>' +
                    '<span class="val">' + row.val + '</span>';
      sumCard.appendChild(r);
    });

    sidebar.appendChild(sumCard);

    /* mark all read button */
    if (unreadCount > 0) {
      var markAllBtn = document.createElement('button');
      markAllBtn.className = 'btn btn-ghost btn-sm notif-mark-all';
      markAllBtn.textContent = 'Mark all read';
      markAllBtn.setAttribute('aria-label', 'Mark all notifications as read');
      markAllBtn.addEventListener('click', function () {
        notifications.forEach(function (n) { markRead(n.id); });
        App.toast('All notifications marked as read', 'ok');
        render(el, notifications, asOfIso);
      });
      sidebar.appendChild(markAllBtn);
    }

    layout.appendChild(sidebar);

    /* RIGHT: notification list */
    var main = document.createElement('div');
    main.className = 'notif-main';

    /* apply filter */
    var visible = _filter === 'unread'
      ? notifications.filter(function (n) { return !isRead(n); })
      : notifications.slice();

    if (visible.length === 0) {
      /* empty state */
      var empty = document.createElement('div');
      empty.className = 'empty notif-empty';
      empty.setAttribute('data-reveal', '');
      empty.innerHTML = App.icon('bell') +
        '<p>No unread notifications.</p>' +
        '<p style="font-size:.8125rem;color:var(--aly-mute)">You\'re all caught up.</p>';
      main.appendChild(empty);
    } else {
      /* group */
      var groups = groupNotifications(visible, asOfIso);
      var groupDefs = [
        { key: 'today',   label: 'Today' },
        { key: 'earlier', label: 'Earlier' }
      ];

      groupDefs.forEach(function (gd) {
        var items = groups[gd.key];
        if (!items || items.length === 0) return;

        var groupEl = document.createElement('div');
        groupEl.className = 'notif-group';
        groupEl.setAttribute('data-reveal', '');

        /* group header */
        var ghd = document.createElement('div');
        ghd.className = 'notif-group-hd';

        var glabel = document.createElement('span');
        glabel.className = 'notif-group-label';
        glabel.textContent = gd.label;

        var gdivider = document.createElement('div');
        gdivider.className = 'notif-group-divider';

        var gcountBadge = document.createElement('span');
        gcountBadge.className = 'badge';
        gcountBadge.textContent = items.length;

        ghd.appendChild(glabel);
        ghd.appendChild(gdivider);
        ghd.appendChild(gcountBadge);
        groupEl.appendChild(ghd);

        /* cards */
        items.forEach(function (n) {
          var card = buildCard(n, notifications, asOfIso, el);
          groupEl.appendChild(card);
        });

        main.appendChild(groupEl);
      });
    }

    layout.appendChild(main);
    root.appendChild(layout);
    el.appendChild(root);

    App.reveal(el);
  }

  /* ── build a single notification card ──────────────── */
  function buildCard(n, allNotifications, asOfIso, containerEl) {
    var sev   = n.severity || 'info';
    var read  = isRead(n);
    var icon  = TYPE_ICON[n.type] || SEV_ICON[sev] || 'bell';

    var card = document.createElement('div');
    card.className = 'card notif-card sev-' + sev + (read ? ' is-read' : ' is-unread');
    card.setAttribute('role', 'article');
    card.setAttribute('aria-label', n.title + (read ? '' : ' (unread)'));
    card.setAttribute('tabindex', '0');

    /* icon bucket */
    var iconBucket = document.createElement('div');
    iconBucket.className = 'notif-icon';
    iconBucket.setAttribute('aria-hidden', 'true');
    iconBucket.innerHTML = App.icon(icon);
    card.appendChild(iconBucket);

    /* body */
    var body = document.createElement('div');
    body.className = 'notif-body';

    var titleEl = document.createElement('p');
    titleEl.className = 'notif-card-title';
    titleEl.textContent = n.title || '';
    body.appendChild(titleEl);

    var bodyEl = document.createElement('p');
    bodyEl.className = 'notif-card-body';
    bodyEl.textContent = n.body || '';
    body.appendChild(bodyEl);

    /* footer: timestamp + severity pill + CTA */
    var footer = document.createElement('div');
    footer.className = 'notif-card-footer';

    var ts = document.createElement('span');
    ts.className = 'notif-ts';
    ts.textContent = n.dateLabel || (n.ts ? App.fmt.date(n.ts.slice(0, 10)) : '');
    footer.appendChild(ts);

    var sevPill = document.createElement('span');
    sevPill.className = 'notif-sev-pill sev-' + sev;
    sevPill.textContent = SEV_LABEL[sev] || sev;
    footer.appendChild(sevPill);

    if (n.cta && n.cta.label && n.cta.route) {
      var ctaBtn = document.createElement('button');
      ctaBtn.className = 'btn btn-ghost btn-sm notif-cta-btn';
      ctaBtn.textContent = n.cta.label;
      ctaBtn.setAttribute('aria-label', n.cta.label + ' — ' + n.title);
      ctaBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        markRead(n.id);
        App.go(n.cta.route, n.cta.params || undefined);
      });
      footer.appendChild(ctaBtn);
    }

    body.appendChild(footer);
    card.appendChild(body);

    /* click card → mark read and re-render */
    function handleActivate(e) {
      if (!isRead(n)) {
        markRead(n.id);
        render(containerEl, allNotifications, asOfIso);
      }
    }

    card.addEventListener('click', handleActivate);
    card.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handleActivate(e);
      }
    });

    return card;
  }

  /* ── App.register ───────────────────────────────────── */
  App.register('notifications', {
    chrome: 'app',
    title: 'Notifications',

    mount: function (el, params) {
      var notifications = (App.db && App.db.notifications) ? App.db.notifications : [];
      var asOfIso = (App.db && App.db.engine && App.db.engine.asOfIso)
        ? App.db.engine.asOfIso
        : '2026-06-30';

      /* reset filter on fresh mount */
      _filter = 'all';

      render(el, notifications, asOfIso);
    },

    unmount: function () {
      /* nothing global was registered beyond App.onResize,
         which the kernel auto-clears on unmount */
      _resizeCleanup = null;
    }
  });

}());

(function () {
  'use strict';

  /* -------------------------------------------------------------------------
     Local state — reset on every mount
  ------------------------------------------------------------------------- */
  var S = null;           // active local state object
  var _resizeCleanup = []; // refs to canvases needing cleanup if needed

  function freshState() {
    return {
      step: 0,            // 0-indexed: steps 0-8
      risk: {
        drawdown: null,   // 0=calm, 1=worried, 2=exit
        dependency: null, // 0=no, 1=maybe, 2=yes
        experience: null  // 0=beginner, 1=intermediate, 2=advanced
      },
      goals: new Set(),
      prefs: {
        etfFocus: false,
        dividends: false,
        esg: false,
        avoidTech: false,
        lowVol: false
      },
      horizonYears: 11,
      sectors: {
        Technology:   'neutral',
        Healthcare:   'neutral',
        Energy:       'neutral',
        Financials:   'neutral',
        Consumer:     'neutral',
        Industrials:  'neutral',
        Communication:'neutral',
        Utilities:    'neutral'
      },
      monthly: 1500,
      monthlyDay: 2,
      reminder: true
    };
  }

  /* -------------------------------------------------------------------------
     Risk computation (behavioral 3-question, 0-100 scale)
  ------------------------------------------------------------------------- */
  var RISK_BANDS = [
    { max: 20,  label: 'Conservative',          color: '#4C8DFF' },
    { max: 40,  label: 'Moderately Conservative',color: '#29B37A' },
    { max: 60,  label: 'Moderate',              color: '#C8A45A' },
    { max: 80,  label: 'Moderately Aggressive', color: '#E0A93B' },
    { max: 100, label: 'Aggressive',            color: '#E5484D' }
  ];

  function computeRiskScore(risk) {
    if (risk.drawdown === null || risk.dependency === null || risk.experience === null) return null;
    // drawdown: 0=calm(high risk), 1=worried(med), 2=exit(low)
    // dependency: 0=no(high), 1=maybe(med), 2=yes(low)
    // experience: 0=beginner(low), 1=intermediate(med), 2=advanced(high)
    var score = 0;
    score += [35, 20, 5][risk.drawdown];
    score += [30, 15, 5][risk.dependency];
    score += [5, 15, 30][risk.experience];
    return Math.min(100, Math.max(0, score));
  }

  function getRiskBand(score) {
    if (score === null) return { label: '—', color: '#6B7280' };
    for (var i = 0; i < RISK_BANDS.length; i++) {

    }
    return RISK_BANDS[RISK_BANDS.length - 1];
  }

  /* -------------------------------------------------------------------------
     Main render loop — mounts the current step
  ------------------------------------------------------------------------- */
  var _el = null;

  function renderStep() {
    if (!_el) return;

    // Clear previous step content
    var oldStage = _el.querySelector('.ob-stage');
    if (oldStage) oldStage.remove();
    var oldNav = _el.querySelector('.ob-nav');
    if (oldNav) oldNav.remove();

    // Re-render stepper
    var oldStepper = _el.querySelector('.ob-stepper');
    if (oldStepper) {
      var newStepper = document.createElement('div');
      newStepper.className = 'stepper ob-stepper';
      newStepper.setAttribute('aria-label', 'Onboarding steps');
      STEPS.forEach(function (st, i) {
        var item = div(
          'step' +
          (i < S.step ? ' is-done' : '') +
          (i === S.step ? ' is-now' : ''),
          st.label
        );
        item.setAttribute('aria-current', i === S.step ? 'step' : 'false');
        newStepper.appendChild(item);
      });
      oldStepper.replaceWith(newStepper);
    }

    var stage = div('ob-stage');
    var panel = div('ob-panel' + (S.step === 8 ? ' wide' : ''));
    stage.appendChild(panel);
    _el.appendChild(stage);

    // Mount step content
    switch (S.step) {
      case 0: mountStep0(panel); break;
      case 1: mountStep1(panel); break;
      case 2: mountStep2(panel); break;
      case 3: mountStep3(panel); break;
      case 4: mountStep4(panel); break;
      case 5: mountStep5(panel); break;
      case 6: mountStep6(panel); break;
      case 7: mountStep7(panel, function () {
        S.step = 8;
        renderStep();
      }); break;
      case 8: mountStep8(panel); break;
    }

    // --- Footer nav ---
    var nav = div('ob-nav');

    if (S.step > 0 && S.step < 8) {
      var backBtn = btn('btn-ghost btn-sm', App.icon('chevron-left') + ' Back', 'Go back');
      backBtn.addEventListener('click', function () {
        if (buildingTimer) { clearTimeout(buildingTimer); buildingTimer = null; }
        S.step = Math.max(0, S.step - 1);
        renderStep();
      });
      nav.appendChild(backBtn);
    } else {
      nav.appendChild(div(''));
    }

    if (S.step < 7) {
      nav.appendChild(div('prog', (S.step + 1) + ' / ' + STEPS.length));
    }
    nav.appendChild(div('spacer'));

    if (S.step === 8) {
      // Final CTA
      var enterBtn = btn('btn-primary', 'Enter AlyInvest ' + App.icon('chevron-right'), 'Enter AlyInvest');
      enterBtn.addEventListener('click', function () {
        App.state.onboarded = true;
        App.toast('Welcome to AlyInvest. Your strategy is ready.', 'ok');
        App.go('dashboard');
      });
      nav.appendChild(enterBtn);
    } else if (S.step < 7) {
      var nextBtn = btn('btn-primary', 'Continue ' + App.icon('chevron-right'), 'Continue to next step');
      nextBtn.addEventListener('click', function () {
        S.step = Math.min(8, S.step + 1);
        renderStep();
      });
      nav.appendChild(nextBtn);
    }

    _el.appendChild(nav);

    // Animate new content in
    App.reveal(stage);
  }

  /* -------------------------------------------------------------------------
     App.register
  ------------------------------------------------------------------------- */
  App.register('onboarding', {
    chrome: 'flow',
    title: 'Get started',

    mount: function (el, params) {
      _el = el;
      S = freshState();
      buildingTimer = null;
      riskRingCanvas = null;
      buildingRingCanvas = null;
      revealDonutCanvas = null;
      revealRiskCanvas = null;
      revealConeCanvas = null;

      // If already onboarded, jump straight to reveal for review
      if (params && params.review) {
        S.step = 8;
      }

      // Build screen skeleton
      var screen = div('screen screen-onboarding');

      // Top bar
      var top = div('ob-top');

      var brand = div('ob-brand');
      brand.innerHTML = '<span class="mark" aria-hidden="true">A</span>' +

      // Placeholder stepper (gets replaced in renderStep)
      var stepperEl = div('stepper ob-stepper');
      stepperEl.setAttribute('aria-label', 'Onboarding steps');
      STEPS.forEach(function (st, i) {
        var item = div(
          'step' + (i === S.step ? ' is-now' : ''),
          st.label
        );
        item.setAttribute('aria-current', i === S.step ? 'step' : 'false');
        stepperEl.appendChild(item);
      });
      top.appendChild(stepperEl);

      // Skip button
      var skipBtn = btn('btn-ghost btn-sm ob-skip', 'Skip for now', 'Skip onboarding and go to dashboard');
      skipBtn.addEventListener('click', function () {
        if (buildingTimer) { clearTimeout(buildingTimer); buildingTimer = null; }
        S.step = 8;
        renderStep();
      });
      top.appendChild(skipBtn);

      screen.appendChild(top);
      el.appendChild(screen);

      // Store reference to screen (renderStep uses _el to find .ob-stage etc.)
      _el = screen;

      renderStep();
    },

    unmount: function () {
      if (buildingTimer) {
        clearTimeout(buildingTimer);
        buildingTimer = null;
      }
      riskRingCanvas = null;
      buildingRingCanvas = null;
      revealDonutCanvas = null;
      revealRiskCanvas = null;
      revealConeCanvas = null;
      _el = null;
      S = null;
    }
  });

}());

      Object.keys(attrs).forEach(function (k) {
        if (k === 'html') { node.innerHTML = attrs[k]; }

        else { node.setAttribute(k, attrs[k]); }

    if (v > 0) return 'delta up';
    if (v < 0) return 'delta down';

  function deltaStr(v, fmt) {
    return fmt ? fmt(v, { sign: true }) : (v >= 0 ? '+' : '') + v;
  }

    if (v > 0) return App.icon('arrow-up');
    if (v < 0) return App.icon('arrow-down');

  function sortHoldings(rows) {
    var col = sortState.col;
    var dir = sortState.dir === 'asc' ? 1 : -1;
    return rows.slice().sort(function (a, b) {
      var av = a[col] !== undefined ? a[col] : 0;
      var bv = b[col] !== undefined ? b[col] : 0;
      if (typeof av === 'string') return dir * av.localeCompare(bv);
      return dir * (av - bv);
    });
  }
