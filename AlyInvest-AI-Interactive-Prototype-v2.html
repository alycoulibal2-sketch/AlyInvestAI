  line-height: 1.5;
  flex: 1;
}

.screen-memory .mem-item-detail {
  font-size: 0.8125rem;
  color: var(--aly-dim);
  margin-top: var(--sp-1);
  line-height: 1.55;
}

/* ─── Item actions ─── */
.screen-memory .mem-item-actions {
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 150ms var(--aly-ease);
}

.screen-memory .mem-item:hover .mem-item-actions,
.screen-memory .mem-item.is-editing .mem-item-actions {
  opacity: 1;
}

/* ─── Item meta row (provenance + confidence) ─── */
.screen-memory .mem-item-meta {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-top: var(--sp-3);
  padding-top: var(--sp-2);
  border-top: 1px solid var(--aly-line);
  flex-wrap: wrap;
}

.screen-memory .mem-conf-wrap {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-shrink: 0;
}

.screen-memory .mem-conf-label {
  font-size: 0.6875rem;
  color: var(--aly-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

.screen-memory .mem-conf-bar-track {
  width: 64px;
  height: 3px;
  background: var(--aly-line);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}

.screen-memory .mem-conf-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--aly-gold);
  transition: width 400ms var(--aly-ease);
}

.screen-memory .mem-conf-val {
  font-family: var(--aly-mono);
  font-size: 0.6875rem;
  color: var(--aly-dim);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* ─── Inline edit form ─── */
.screen-memory .mem-edit-form {
  margin-top: var(--sp-3);
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
}

.screen-memory .mem-edit-actions {
  display: flex;
  gap: var(--sp-2);
  align-items: center;
}

/* ─── Risk section specifics ─── */
.screen-memory .mem-risk-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: var(--sp-4);
  align-items: start;
}

.screen-memory .mem-risk-ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-2);
}

.screen-memory .mem-risk-ring-label {
  font-size: 0.75rem;
  color: var(--aly-dim);
  text-align: center;
}

.screen-memory .mem-risk-details {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
}

.screen-memory .mem-risk-band-display {
  font-family: var(--aly-serif);
  font-size: 1.125rem;
  font-weight: 600;
  color: var(--aly-text);
}

.screen-memory .mem-risk-summary {
  font-size: 0.875rem;
  color: var(--aly-dim);
  line-height: 1.55;
}

.screen-memory .mem-risk-factors {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1);
  margin-top: var(--sp-2);
}

.screen-memory .mem-risk-factor-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: var(--sp-3);
  padding: var(--sp-1) 0;
  border-bottom: 1px solid var(--aly-line);
}

.screen-memory .mem-risk-factor-row:last-child {
  border-bottom: none;
}

.screen-memory .mem-factor-key {
  font-size: 0.8125rem;
  color: var(--aly-dim);
}

.screen-memory .mem-factor-val {
  font-family: var(--aly-mono);
  font-size: 0.8125rem;
  color: var(--aly-text);
  font-variant-numeric: tabular-nums;
}

/* ─── Habits section ─── */
.screen-memory .mem-habits-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-3);
  margin-bottom: var(--sp-4);
}

.screen-memory .mem-habit-stat {
  background: var(--aly-panel-2);
  border: 1px solid var(--aly-line);
  border-radius: var(--radius-md);
  padding: var(--sp-3);
  display: flex;
  flex-direction: column;
  gap: var(--sp-1);
}

.screen-memory .mem-habit-stat-lbl {
  font-size: 0.6875rem;
  color: var(--aly-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.screen-memory .mem-habit-stat-val {
  font-family: var(--aly-mono);
  font-size: 1.125rem;
  color: var(--aly-text);
  font-variant-numeric: tabular-nums;
}

.screen-memory .mem-habits-chart-wrap {
  margin-top: var(--sp-3);
}

.screen-memory .mem-habits-chart-label {
  font-size: 0.75rem;
  color: var(--aly-mute);
  margin-bottom: var(--sp-2);
}

/* ─── Sectors section ─── */
.screen-memory .mem-sectors-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--sp-3);
}

.screen-memory .mem-sector-card {
  background: var(--aly-panel);
  border: 1px solid var(--aly-line);
  border-radius: var(--radius-md);
  padding: var(--sp-3) var(--sp-4);
  transition: border-color 150ms var(--aly-ease);
}

.screen-memory .mem-sector-card:hover {
  border-color: color-mix(in srgb, var(--aly-gold) 30%, var(--aly-line));
}

.screen-memory .mem-sector-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-2);
}

.screen-memory .mem-sector-name {
  font-size: 0.9375rem;
  color: var(--aly-text);
  font-weight: 500;
}

.screen-memory .mem-sector-weight {
  font-family: var(--aly-mono);
  font-size: 0.8125rem;
  color: var(--aly-dim);
  font-variant-numeric: tabular-nums;
}

.screen-memory .mem-sector-note {
  font-size: 0.8125rem;
  color: var(--aly-dim);
  line-height: 1.5;
}

/* ─── Stance pills ─── */
.screen-memory .stance-favored {
  background: color-mix(in srgb, #29B37A 12%, transparent);
  color: #29B37A;
  border-color: color-mix(in srgb, #29B37A 25%, transparent);
}

.screen-memory .stance-cautious {
  background: color-mix(in srgb, #E0A93B 12%, transparent);
  color: #E0A93B;
  border-color: color-mix(in srgb, #E0A93B 25%, transparent);
}

.screen-memory .stance-neutral {
  background: color-mix(in srgb, #A6AEBC 10%, transparent);
  color: #A6AEBC;
  border-color: color-mix(in srgb, #A6AEBC 20%, transparent);
}

/* ─── Behavioral observations ─── */
.screen-memory .mem-behavioral-item {
  display: flex;
  gap: var(--sp-3);
  align-items: flex-start;
}

.screen-memory .mem-behavioral-icon {
  width: 32px;
  height: 32px;
  background: var(--aly-panel-2);
  border: 1px solid var(--aly-line);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.screen-memory .mem-behavioral-icon .ic {
  color: var(--aly-gold);
  opacity: 0.75;
}

.screen-memory .mem-behavioral-body {
  flex: 1;
  min-width: 0;
}

.screen-memory .mem-behavioral-obs {
  font-size: 0.9375rem;
  color: var(--aly-text);
  line-height: 1.5;
}

.screen-memory .mem-behavioral-date {
  font-family: var(--aly-mono);
  font-size: 0.75rem;
  color: var(--aly-mute);
  margin-top: var(--sp-1);
  font-variant-numeric: tabular-nums;
}

/* ─── Version badge in header ─── */
.screen-memory .mem-version-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--aly-mono);
  font-size: 0.6875rem;
  color: var(--aly-mute);
  background: var(--aly-panel-2);
  border: 1px solid var(--aly-line);
  border-radius: 10px;
  padding: 2px 8px;
  letter-spacing: 0.04em;
}

.screen-memory .mem-version-badge .ic {
  color: var(--aly-gold);
  opacity: 0.7;
}

/* ─── Goals section ─── */
.screen-memory .mem-goal-chip-row {
  display: flex;
  gap: var(--sp-2);
  flex-wrap: wrap;
  margin-bottom: var(--sp-2);
}

/* ─── Responsive ─── */
@media (max-width: 900px) {
  .screen-memory .mem-habits-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .screen-memory .mem-risk-grid {
    grid-template-columns: 1fr;
  }

  .screen-memory .mem-risk-ring-wrap {
    flex-direction: row;
    gap: var(--sp-3);
  }
}

@media (max-width: 640px) {
  .screen-memory .mem-habits-grid {
    grid-template-columns: 1fr 1fr;
  }

  .screen-memory .mem-sectors-grid {
    grid-template-columns: 1fr;
  }

  .screen-memory .mem-headline {
    font-size: 1.4rem;
  }

  .screen-memory .mem-item-actions {
    opacity: 1;
  }
}

@media (max-width: 480px) {
  .screen-memory .mem-habits-grid {
    grid-template-columns: 1fr;
  }
}


/* ===================== screen: notifications.css ===================== */
/* =========================================================
   notifications.css — all selectors scoped under .screen-notifications
   Do NOT redefine tokens or shared component classes.
   ========================================================= */

/* ── Layout shell ─────────────────────────────────────── */

.screen-notifications {
  min-height: 100%;
  padding-block: var(--aly-sp-6, 2.5rem);
}

.screen-notifications .notif-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: var(--aly-sp-6, 2.5rem);
  align-items: start;
}

@media (max-width: 900px) {
  .screen-notifications .notif-layout {
    grid-template-columns: 1fr;
  }
}

/* ── Page header ──────────────────────────────────────── */

.screen-notifications .notif-page-hd {
  margin-bottom: var(--aly-sp-6, 2.5rem);
}

.screen-notifications .notif-page-hd .notif-title-row {
  display: flex;
  align-items: baseline;
  gap: var(--aly-sp-3, 1rem);
  flex-wrap: wrap;
}

.screen-notifications .notif-page-hd h1 {
  font-family: var(--aly-serif);
  font-size: clamp(1.5rem, 2.5vw, 2rem);
  font-weight: 500;
  color: var(--aly-text);
  letter-spacing: -0.01em;
  margin: 0;
}

.screen-notifications .notif-unread-total {
  font-family: var(--aly-mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--aly-ground);
  background: var(--aly-gold);
  border-radius: 999px;
  padding: 0.15em 0.55em;
  letter-spacing: 0.03em;
  line-height: 1.6;
}

.screen-notifications .notif-calm-note {
  margin-top: var(--aly-sp-2, 0.5rem);
  font-size: 0.8125rem;
  color: var(--aly-mute);
  line-height: 1.55;
  max-width: 640px;
}

.screen-notifications .notif-calm-note .ic {
  width: 13px;
  height: 13px;
  vertical-align: -0.12em;
  margin-right: 0.3em;
  opacity: 0.6;
}

/* ── Left sidebar: filter + summary ──────────────────── */

.screen-notifications .notif-sidebar {
  position: sticky;
  top: var(--aly-sp-5, 2rem);
  display: flex;
  flex-direction: column;
  gap: var(--aly-sp-4, 1.5rem);
}

@media (max-width: 900px) {
  .screen-notifications .notif-sidebar {
    position: static;
  }
}

/* Filter pills */
.screen-notifications .notif-filter-group {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.screen-notifications .notif-filter-btn {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.5rem 0.75rem;
  border-radius: var(--aly-radius, 8px);
  border: none;
  background: transparent;
  color: var(--aly-dim);
  font-family: var(--aly-sans);
  font-size: 0.8125rem;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  text-align: left;
  width: 100%;
}

.screen-notifications .notif-filter-btn:hover {
  background: var(--aly-panel-2, rgba(255,255,255,0.04));
  color: var(--aly-text);
}

.screen-notifications .notif-filter-btn.is-active {
  background: var(--aly-panel-2, rgba(255,255,255,0.06));
  color: var(--aly-text);
  font-weight: 500;
}

.screen-notifications .notif-filter-btn .ic {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
}

.screen-notifications .notif-filter-count {
  margin-left: auto;
  font-family: var(--aly-mono);
  font-size: 0.7rem;
  color: var(--aly-mute);
  background: var(--aly-panel-2, rgba(255,255,255,0.05));
  border-radius: 999px;
  padding: 0.1em 0.45em;
  line-height: 1.6;
}

.screen-notifications .notif-filter-btn.is-active .notif-filter-count {
  background: rgba(200, 164, 90, 0.15);
  color: var(--aly-gold);
}

/* Summary stats in sidebar */
.screen-notifications .notif-summary-card {
  padding: var(--aly-sp-3, 1rem);
}

.screen-notifications .notif-summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-block: 0.45rem;
  border-bottom: 1px solid var(--aly-line);
  font-size: 0.8rem;
}

.screen-notifications .notif-summary-row:last-child {
  border-bottom: none;
}

.screen-notifications .notif-summary-row .label {
  color: var(--aly-mute);
  font-family: var(--aly-sans);
}

.screen-notifications .notif-summary-row .val {
  font-family: var(--aly-mono);
  color: var(--aly-dim);
  font-size: 0.8125rem;
}

/* Mark all read button */
.screen-notifications .notif-mark-all {
  width: 100%;
}

/* ── Main content: notification list ─────────────────── */

.screen-notifications .notif-main {
  display: flex;
  flex-direction: column;
  gap: var(--aly-sp-5, 2rem);
}

/* Group header */
.screen-notifications .notif-group {
  display: flex;
  flex-direction: column;
  gap: var(--aly-sp-2, 0.75rem);
}

.screen-notifications .notif-group-hd {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.screen-notifications .notif-group-label {
  font-family: var(--aly-sans);
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--aly-mute);
}

.screen-notifications .notif-group-divider {
  flex: 1;
  height: 1px;
  background: var(--aly-line);
}

/* ── Notification card ────────────────────────────────── */

.screen-notifications .notif-card {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: var(--aly-sp-3, 1rem);
  padding: var(--aly-sp-3, 1rem) var(--aly-sp-4, 1.5rem);
  border-radius: var(--aly-radius, 8px);
  cursor: pointer;
  transition: opacity 0.25s, background 0.15s;
  overflow: hidden;
}

/* left severity stripe */
.screen-notifications .notif-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}

.screen-notifications .notif-card.sev-info::before  { background: #4C8DFF; }
.screen-notifications .notif-card.sev-warn::before  { background: #E0A93B; }
.screen-notifications .notif-card.sev-opportunity::before { background: #29B37A; }

.screen-notifications .notif-card:hover {
  background: var(--aly-panel-2, rgba(255,255,255,0.025));
}

/* Unread indicator dot */
.screen-notifications .notif-card.is-unread::after {
  content: '';
  position: absolute;
  top: 1rem;
  right: 1.25rem;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--aly-gold);
  box-shadow: 0 0 0 2px var(--aly-panel);
}

/* Read → dim gently */
.screen-notifications .notif-card.is-read {
  opacity: 0.6;
}

.screen-notifications .notif-card.is-read:hover {
  opacity: 0.85;
}

/* Icon bucket */
.screen-notifications .notif-icon {
  flex-shrink: 0;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 0.1rem;
}

.screen-notifications .notif-card.sev-info .notif-icon {
  background: rgba(76, 141, 255, 0.12);
  color: #4C8DFF;
}

.screen-notifications .notif-card.sev-warn .notif-icon {
  background: rgba(224, 169, 59, 0.12);
  color: #E0A93B;
}

.screen-notifications .notif-card.sev-opportunity .notif-icon {
  background: rgba(41, 179, 122, 0.12);
  color: #29B37A;
}

.screen-notifications .notif-icon .ic {
  width: 16px;
  height: 16px;
}

/* Card body */
.screen-notifications .notif-body {
  flex: 1;
  min-width: 0;
}

.screen-notifications .notif-card-title {
  font-family: var(--aly-sans);
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--aly-text);
  margin: 0 0 0.25rem;
  padding-right: 1.25rem; /* clear the unread dot */
  line-height: 1.4;
}

.screen-notifications .notif-card-body {
  font-family: var(--aly-sans);
  font-size: 0.8125rem;
  color: var(--aly-dim);
  line-height: 1.55;
  margin: 0 0 0.6rem;
}

.screen-notifications .notif-card-footer {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.screen-notifications .notif-ts {
  font-family: var(--aly-mono);
  font-size: 0.7rem;
  color: var(--aly-mute);
  letter-spacing: 0.01em;
}

.screen-notifications .notif-cta-btn {
  font-size: 0.75rem;
  padding: 0.2em 0.65em;
}

/* severity pill override for notification context */
.screen-notifications .notif-sev-pill {
  font-size: 0.65rem;
  padding: 0.15em 0.5em;
  border-radius: 999px;
  font-family: var(--aly-mono);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.screen-notifications .notif-sev-pill.sev-info       { background: rgba(76,141,255,.15);  color: #4C8DFF; }
.screen-notifications .notif-sev-pill.sev-warn       { background: rgba(224,169,59,.15);  color: #E0A93B; }
.screen-notifications .notif-sev-pill.sev-opportunity{ background: rgba(41,179,122,.15);  color: #29B37A; }

/* ── Empty state ──────────────────────────────────────── */

.screen-notifications .notif-empty {
  text-align: center;
  padding: var(--aly-sp-7, 4rem) var(--aly-sp-4, 1.5rem);
}

.screen-notifications .notif-empty .ic {
  width: 36px;
  height: 36px;
  color: var(--aly-mute);
  margin-bottom: var(--aly-sp-3, 1rem);
}

/* ── Responsive tweaks ────────────────────────────────── */

@media (max-width: 560px) {
  .screen-notifications .notif-card {
    padding: var(--aly-sp-3, 1rem) var(--aly-sp-3, 1rem);
  }

  .screen-notifications .notif-card::after {
    right: 0.75rem;
  }

  .screen-notifications .notif-card-footer {
    gap: 0.5rem;
  }
}


/* ===================== screen: onboarding.css ===================== */
/* =========================================================================
   ONBOARDING — conversational 9-step flow ending in Strategy Reveal.
   All selectors scoped under .screen-onboarding. Reuses shared components;
   redefines NO design tokens. Layout + step-specific polish only.
   ========================================================================= */

.screen-onboarding{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(1100px 620px at 78% -6%, var(--aly-gold-soft), transparent 60%),
    radial-gradient(820px 520px at 6% 108%, rgba(120,165,140,.05), transparent 55%);
}

/* ---- Top bar: brand mark + stepper + skip ---- */
.screen-onboarding .ob-top{
  position:sticky;top:0;z-index:5;
  display:flex;align-items:center;justify-content:space-between;gap:var(--s-4);
  padding:var(--s-4) var(--s-6);
  background:linear-gradient(180deg, var(--aly-ground) 62%, transparent);
  backdrop-filter:saturate(120%) blur(6px);
}
.screen-onboarding .ob-brand{
  display:inline-flex;align-items:center;gap:var(--s-3);
  font-family:var(--aly-serif);font-size:var(--fs-h2);font-weight:600;color:var(--aly-text);
  letter-spacing:.005em;
}
.screen-onboarding .ob-brand .mark{
  width:30px;height:30px;flex:none;border-radius:8px;display:grid;place-items:center;
  background:linear-gradient(155deg,var(--aly-gold-hi),var(--aly-gold) 66%,#9c7c39);
  color:#1a1408;font-weight:700;font-size:16px;box-shadow:var(--e-1);
}
.screen-onboarding .ob-stepper{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex:1;justify-content:center}
.screen-onboarding .ob-stepper::-webkit-scrollbar{display:none}
.screen-onboarding .ob-skip{white-space:nowrap}

/* ---- Center stage ---- */
.screen-onboarding .ob-stage{
  flex:1;display:flex;justify-content:center;
  padding:var(--s-5) var(--s-6) var(--s-8);
}
.screen-onboarding .ob-panel{
  width:100%;max-width:760px;
  display:flex;flex-direction:column;gap:var(--s-5);
}
.screen-onboarding .ob-panel.wide{max-width:940px}

/* ---- Advisor presence line ---- */
.screen-onboarding .ob-advisor{
  display:flex;align-items:flex-start;gap:var(--s-3);
  padding:var(--s-3) var(--s-4);
  border:1px solid var(--aly-line);border-left:2px solid var(--aly-gold);
  border-radius:var(--r-md);
  background:linear-gradient(90deg, var(--aly-gold-soft), transparent 52%), var(--aly-panel);
}
.screen-onboarding .ob-advisor .who{
  font-size:var(--fs-micro);text-transform:uppercase;letter-spacing:.13em;
  color:var(--aly-gold);font-weight:600;margin-bottom:2px;
}
.screen-onboarding .ob-advisor .say{
  font-family:var(--aly-serif);font-size:var(--fs-body);line-height:1.5;color:var(--aly-text);
}

/* ---- Step heading ---- */
.screen-onboarding .ob-head .eyebrow{margin-bottom:var(--s-3)}
.screen-onboarding .ob-title{
  font-family:var(--aly-serif);font-size:var(--fs-display);line-height:var(--lh-display);
  font-weight:600;color:var(--aly-text);letter-spacing:-.012em;
}
.screen-onboarding .ob-lede{
  font-size:var(--fs-body);line-height:1.6;color:var(--aly-dim);max-width:60ch;margin-top:var(--s-3);
}

/* ---- Choice cards (risk questions, big selectable options) ---- */
.screen-onboarding .ob-qgroup{display:flex;flex-direction:column;gap:var(--s-2)}
.screen-onboarding .ob-qlabel{
  font-size:var(--fs-cap);font-weight:600;color:var(--aly-dim);
  display:flex;align-items:baseline;gap:var(--s-2);
}
.screen-onboarding .ob-qlabel .n{
  font-family:var(--aly-mono);color:var(--aly-gold);font-size:var(--fs-micro);
}
.screen-onboarding .ob-choices{display:grid;gap:var(--s-3)}
.screen-onboarding .ob-choice{
  display:flex;align-items:flex-start;gap:var(--s-3);text-align:left;width:100%;
  padding:var(--s-4);border-radius:var(--r-md);cursor:pointer;
  background:var(--aly-panel-2);border:1px solid var(--aly-line);
  color:var(--aly-dim);
  transition:border-color var(--dur-fast) var(--aly-ease),
             background var(--dur-fast) var(--aly-ease),
             transform var(--dur-fast) var(--aly-ease);
}
.screen-onboarding .ob-choice:hover{border-color:var(--aly-line-strong);transform:translateY(-1px)}
.screen-onboarding .ob-choice:focus-visible{outline:none;border-color:var(--aly-gold-line);box-shadow:0 0 0 3px var(--aly-gold-soft)}
.screen-onboarding .ob-choice.is-on{
  border-color:var(--aly-gold-line);color:var(--aly-text);
  background:linear-gradient(90deg,var(--aly-gold-soft),transparent 60%),var(--aly-panel);
}
.screen-onboarding .ob-choice .tick{
  width:20px;height:20px;flex:none;margin-top:1px;border-radius:var(--r-full);
  border:1px solid var(--aly-line-strong);display:grid;place-items:center;
  color:transparent;background:var(--aly-panel);
  transition:all var(--dur-fast) var(--aly-ease);
}
.screen-onboarding .ob-choice .tick .ic{font-size:12px}
.screen-onboarding .ob-choice.is-on .tick{
  background:var(--aly-gold);border-color:transparent;color:#1a1408;
}
.screen-onboarding .ob-choice .ctxt{display:flex;flex-direction:column;gap:2px}
.screen-onboarding .ob-choice .ctitle{font-weight:600;color:var(--aly-text);font-size:14px}
.screen-onboarding .ob-choice .csub{font-size:var(--fs-cap);color:var(--aly-mute);line-height:1.45}

/* ---- Live risk read-out ---- */
.screen-onboarding .ob-riskout{
  display:flex;align-items:center;gap:var(--s-5);
  padding:var(--s-4);border-radius:var(--r-md);
  background:var(--aly-panel-2);border:1px solid var(--aly-line);
}
.screen-onboarding .ob-riskout .rr{width:96px;height:96px;flex:none}
.screen-onboarding .ob-riskout .rr canvas{width:100%;height:100%}
.screen-onboarding .ob-riskout .rmeta{display:flex;flex-direction:column;gap:var(--s-1);min-width:0}
.screen-onboarding .ob-riskout .rband{
  font-family:var(--aly-serif);font-size:var(--fs-h2);font-weight:600;color:var(--aly-text);
}
.screen-onboarding .ob-riskout .rhint{font-size:var(--fs-cap);color:var(--aly-mute);line-height:1.5}
.screen-onboarding .ob-riskout.is-empty{opacity:.6}

/* ---- Chip grids ---- */
.screen-onboarding .ob-chipwrap{display:flex;flex-wrap:wrap;gap:var(--s-2)}
.screen-onboarding .ob-chip-lg{padding:9px 15px;font-size:14px}

/* ---- Sector stance rows ---- */
.screen-onboarding .ob-sectors{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--s-3)}
.screen-onboarding .ob-sector{
  display:flex;align-items:center;justify-content:space-between;gap:var(--s-3);
  padding:var(--s-3) var(--s-4);border-radius:var(--r-md);
  background:var(--aly-panel-2);border:1px solid var(--aly-line);
}
.screen-onboarding .ob-sector .sname{
  display:flex;align-items:center;gap:var(--s-2);font-weight:600;font-size:14px;color:var(--aly-text);
}
.screen-onboarding .ob-sector .sdot{width:9px;height:9px;border-radius:var(--r-full);flex:none}
.screen-onboarding .ob-stance{padding:2px}
.screen-onboarding .ob-stance .seg{padding:5px 10px;font-size:var(--fs-micro)}

/* ---- Preferences toggle rows ---- */
.screen-onboarding .ob-prefs{display:flex;flex-direction:column}
.screen-onboarding .ob-prefrow{
  display:flex;align-items:center;justify-content:space-between;gap:var(--s-4);
  padding:var(--s-4) 0;border-bottom:1px solid var(--aly-line);
}
.screen-onboarding .ob-prefrow:last-child{border-bottom:0}
.screen-onboarding .ob-prefrow .pmeta{display:flex;flex-direction:column;gap:2px;min-width:0}
.screen-onboarding .ob-prefrow .plabel{font-weight:600;font-size:14px;color:var(--aly-text)}
.screen-onboarding .ob-prefrow .pdesc{font-size:var(--fs-cap);color:var(--aly-mute);line-height:1.45}

/* ---- Horizon slider ---- */
.screen-onboarding .ob-horizon{display:flex;flex-direction:column;gap:var(--s-4)}
.screen-onboarding .ob-horizon .hval{
  display:flex;align-items:baseline;gap:var(--s-2);
}
.screen-onboarding .ob-horizon .hyears{
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:44px;line-height:1;
  font-weight:600;color:var(--aly-text);letter-spacing:-.02em;
}
.screen-onboarding .ob-horizon .hunit{font-size:var(--fs-body);color:var(--aly-mute)}
.screen-onboarding .ob-horizon .hticks{
  display:flex;justify-content:space-between;
  font-family:var(--aly-mono);font-size:var(--fs-micro);color:var(--aly-mute);margin-top:6px;
}
.screen-onboarding .ob-horizon .hinterp{
  font-family:var(--aly-serif);font-size:var(--fs-body);color:var(--aly-dim);line-height:1.5;
}
.screen-onboarding .ob-horizon .hinterp b{color:var(--aly-text);font-weight:600}

/* ---- Habits ---- */
.screen-onboarding .ob-habits{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--s-4)}
.screen-onboarding .ob-amount{position:relative;display:flex;align-items:center}
.screen-onboarding .ob-amount .cur{
  position:absolute;left:12px;font-family:var(--aly-mono);color:var(--aly-mute);pointer-events:none;
}
.screen-onboarding .ob-amount .input{padding-left:26px;font-family:var(--aly-mono);font-variant-numeric:tabular-nums}
.screen-onboarding .ob-habit-note{grid-column:1/-1}

/* ---- Building-your-strategy analysis moment ---- */
.screen-onboarding .ob-building{
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--s-5);
  padding:var(--s-7) var(--s-5);
}
.screen-onboarding .ob-building .halo{
  position:relative;width:150px;height:150px;
}
.screen-onboarding .ob-building .halo canvas{position:absolute;inset:0;width:100%;height:100%}
.screen-onboarding .ob-building .halo .core{
  position:absolute;inset:0;display:grid;place-items:center;
  color:var(--aly-gold);
}
.screen-onboarding .ob-building .halo .core .ic{font-size:40px;animation:ob-pulse 1.8s var(--aly-ease) infinite}
@keyframes ob-pulse{0%,100%{opacity:.55;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}}
.screen-onboarding .ob-steps{
  display:flex;flex-direction:column;gap:var(--s-3);width:100%;max-width:360px;text-align:left;
}
.screen-onboarding .ob-tick{
  display:flex;align-items:center;gap:var(--s-3);
  font-size:14px;color:var(--aly-mute);
  transition:color var(--dur-base) var(--aly-ease);
}
.screen-onboarding .ob-tick .dot{
  width:20px;height:20px;flex:none;border-radius:var(--r-full);display:grid;place-items:center;
  border:1px solid var(--aly-line);background:var(--aly-panel-2);color:transparent;
  transition:all var(--dur-base) var(--aly-ease);
}
.screen-onboarding .ob-tick .dot .ic{font-size:12px}
.screen-onboarding .ob-tick .dot .spin{
  width:11px;height:11px;border-radius:var(--r-full);
  border:1.5px solid var(--aly-gold-line);border-top-color:var(--aly-gold);
  animation:ob-spin .7s linear infinite;
}
@keyframes ob-spin{to{transform:rotate(360deg)}}
.screen-onboarding .ob-tick.is-active{color:var(--aly-text)}
.screen-onboarding .ob-tick.is-active .dot{border-color:var(--aly-gold-line)}
.screen-onboarding .ob-tick.is-done{color:var(--aly-dim)}
.screen-onboarding .ob-tick.is-done .dot{background:var(--aly-gold);border-color:transparent;color:#1a1408}

/* ---- Strategy reveal ---- */
.screen-onboarding .ob-reveal-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-4)}
.screen-onboarding .ob-alloc{display:flex;align-items:center;gap:var(--s-4)}
.screen-onboarding .ob-alloc .dwrap{width:150px;height:150px;flex:none}
.screen-onboarding .ob-alloc .dwrap canvas{width:100%;height:100%}
.screen-onboarding .ob-legend{display:flex;flex-direction:column;gap:var(--s-2);min-width:0;flex:1}
.screen-onboarding .ob-legend .lrow{
  display:flex;align-items:center;gap:var(--s-2);font-size:var(--fs-cap);
}
.screen-onboarding .ob-legend .lswatch{width:10px;height:10px;border-radius:3px;flex:none}
.screen-onboarding .ob-legend .llabel{color:var(--aly-dim);flex:1}
.screen-onboarding .ob-legend .lval{font-family:var(--aly-mono);font-variant-numeric:tabular-nums;color:var(--aly-text);font-weight:600}

.screen-onboarding .ob-riskcard{display:flex;align-items:center;gap:var(--s-4)}
.screen-onboarding .ob-riskcard .rr{width:118px;height:118px;flex:none}
.screen-onboarding .ob-riskcard .rr canvas{width:100%;height:100%}
.screen-onboarding .ob-riskcard .rmeta{display:flex;flex-direction:column;gap:var(--s-2)}
.screen-onboarding .ob-riskcard .rband{font-family:var(--aly-serif);font-size:var(--fs-h1);font-weight:600;color:var(--aly-text);line-height:1.1}

.screen-onboarding .ob-cone-wrap{width:100%}
.screen-onboarding .ob-cone-wrap canvas{width:100%}
.screen-onboarding .ob-scen{display:flex;flex-wrap:wrap;gap:var(--s-3);margin-top:var(--s-3)}
.screen-onboarding .ob-scen .scell{
  flex:1;min-width:120px;
  display:flex;flex-direction:column;gap:2px;
  padding:var(--s-3);border-radius:var(--r-md);
  background:var(--aly-panel-2);border:1px solid var(--aly-line);
}
.screen-onboarding .ob-scen .slabel{font-size:var(--fs-micro);text-transform:uppercase;letter-spacing:.1em;color:var(--aly-mute);font-weight:600}
.screen-onboarding .ob-scen .sret{font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:var(--fs-h2);font-weight:600}
.screen-onboarding .ob-scen .sprob{font-size:var(--fs-cap);color:var(--aly-mute);font-family:var(--aly-mono)}
.screen-onboarding .ob-scen .sret.up{color:var(--aly-pos)}
.screen-onboarding .ob-scen .sret.down{color:var(--aly-neg)}
.screen-onboarding .ob-scen .sret.base{color:var(--aly-gold)}

.screen-onboarding .ob-seed{
  display:flex;align-items:center;gap:var(--s-3);
}
.screen-onboarding .ob-seed .ic{color:var(--aly-gold);font-size:18px;flex:none}

/* ---- Sticky footer nav ---- */
.screen-onboarding .ob-nav{
  position:sticky;bottom:0;z-index:5;
  display:flex;align-items:center;justify-content:space-between;gap:var(--s-4);
  padding:var(--s-4) var(--s-6);
  background:linear-gradient(0deg, var(--aly-ground) 62%, transparent);
  backdrop-filter:saturate(120%) blur(6px);
}
.screen-onboarding .ob-nav .prog{
  font-family:var(--aly-mono);font-size:var(--fs-cap);color:var(--aly-mute);
  font-variant-numeric:tabular-nums;
}
.screen-onboarding .ob-nav .spacer{flex:1}

/* ---- Responsive ---- */
@media (max-width:760px){
  .screen-onboarding .ob-top,
  .screen-onboarding .ob-nav{padding-left:var(--s-4);padding-right:var(--s-4)}
  .screen-onboarding .ob-stage{padding:var(--s-4) var(--s-4) var(--s-7)}
  .screen-onboarding .ob-reveal-grid{grid-template-columns:1fr}
  .screen-onboarding .ob-sectors{grid-template-columns:1fr}
  .screen-onboarding .ob-habits{grid-template-columns:1fr}
  .screen-onboarding .ob-stepper{display:none}
  .screen-onboarding .ob-title{font-size:26px;line-height:32px}
}
@media (max-width:560px){
  .screen-onboarding .ob-alloc{flex-direction:column;align-items:center;text-align:center}
  .screen-onboarding .ob-riskcard{flex-direction:column;align-items:center;text-align:center}
  .screen-onboarding .ob-riskout{flex-direction:column;text-align:center}
  .screen-onboarding .ob-brand span.wm{display:none}
}


/* ===================== screen: portfolio.css ===================== */
/* ============================================================
   portfolio.css — scoped entirely under .screen-portfolio
   Only layout rules unique to this screen; no token redefs.
   ============================================================ */

.screen-portfolio {
  padding-block: var(--sp-6, 2.5rem);
}

/* ── Hero stats bar ─────────────────────────────────────────── */
.screen-portfolio .pf-hero {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: var(--sp-4, 1.5rem) var(--sp-6, 2.5rem);
  margin-bottom: var(--sp-6, 2.5rem);
}

.screen-portfolio .pf-hero-total {
  flex: 1 1 220px;
}

.screen-portfolio .pf-hero-total .eyebrow {
  margin-bottom: var(--sp-1, 0.25rem);
}

.screen-portfolio .pf-hero-val {
  font-family: var(--aly-mono);
  font-size: clamp(2rem, 4vw, 2.75rem);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--aly-text);
}

.screen-portfolio .pf-hero-deltas {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2, 0.5rem) var(--sp-4, 1.5rem);
  margin-top: var(--sp-2, 0.5rem);
  align-items: center;
}

.screen-portfolio .pf-hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-4, 1.5rem);
  align-items: flex-end;
  flex: 2 1 340px;
  justify-content: flex-end;
}

/* ── Chart + Donut two-column grid ──────────────────────────── */
.screen-portfolio .pf-chart-row {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: var(--sp-4, 1.5rem);
  margin-bottom: var(--sp-4, 1.5rem);
  align-items: start;
}

/* ── Area chart card ────────────────────────────────────────── */
.screen-portfolio .pf-chart-card .card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--sp-2, 0.5rem);
}

.screen-portfolio .pf-chart-wrap {
  position: relative;
  width: 100%;
  margin-top: var(--sp-3, 1rem);
}

.screen-portfolio .pf-chart-wrap canvas {
  display: block;
  width: 100%;
}

/* ── Donut card ─────────────────────────────────────────────── */
.screen-portfolio .pf-donut-card {
  display: flex;
  flex-direction: column;
}

.screen-portfolio .pf-donut-wrap {
  position: relative;
  width: 100%;
  margin: var(--sp-2, 0.5rem) 0 var(--sp-3, 1rem);
}

.screen-portfolio .pf-donut-wrap canvas {
  display: block;
  width: 100%;
}

.screen-portfolio .pf-donut-legend {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2, 0.5rem);
  margin-top: var(--sp-1, 0.25rem);
}

.screen-portfolio .pf-legend-row {
  display: flex;
  align-items: center;
  gap: var(--sp-2, 0.5rem);
  font-size: 0.8125rem;
  line-height: 1;
}

.screen-portfolio .pf-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.screen-portfolio .pf-legend-name {
  flex: 1;
  color: var(--aly-dim);
}

.screen-portfolio .pf-legend-val {
  font-family: var(--aly-mono);
  font-variant-numeric: tabular-nums;
  color: var(--aly-text);
  font-size: 0.8125rem;
}

/* ── Diversification card ───────────────────────────────────── */
.screen-portfolio .pf-divcard-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-4, 1.5rem);
  margin-bottom: var(--sp-4, 1.5rem);
}

.screen-portfolio .pf-stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-3, 1rem) var(--sp-4, 1.5rem);
  margin: var(--sp-3, 1rem) 0 var(--sp-2, 0.5rem);
}

.screen-portfolio .pf-divider-note {
  font-size: 0.8125rem;
  color: var(--aly-dim);
  line-height: 1.5;
  margin-top: var(--sp-3, 1rem);
  padding-top: var(--sp-3, 1rem);
  border-top: 1px solid var(--aly-line);
}

/* ── Score rings row ────────────────────────────────────────── */
.screen-portfolio .pf-scores-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--sp-4, 1.5rem);
  margin-bottom: var(--sp-4, 1.5rem);
}

.screen-portfolio .pf-score-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: var(--sp-4, 1.5rem) var(--sp-3, 1rem);
}

.screen-portfolio .pf-score-card .ring-wrap {
  width: 100%;
  max-width: 100px;
  margin: 0 auto var(--sp-2, 0.5rem);
}

.screen-portfolio .pf-score-card .ring-wrap canvas {
  display: block;
  width: 100%;
}

.screen-portfolio .pf-score-label {
  font-size: 0.75rem;
  color: var(--aly-mute);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: var(--sp-1, 0.25rem);
}

/* ── Holdings table card ────────────────────────────────────── */
.screen-portfolio .pf-table-card {
  margin-bottom: var(--sp-4, 1.5rem);
}

.screen-portfolio .pf-table-card .card-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--sp-2, 0.5rem);
}

.screen-portfolio .pf-table-scroll {
  overflow-x: auto;
  margin-top: var(--sp-3, 1rem);
  -webkit-overflow-scrolling: touch;
}

.screen-portfolio .pf-table-scroll .tbl {
  min-width: 760px;
  width: 100%;
}

/* Clickable rows */
.screen-portfolio .pf-row-link {
  cursor: pointer;
  transition: background-color 0.15s ease;
}

.screen-portfolio .pf-row-link:hover {
  background: rgba(200, 164, 90, 0.06);
}

.screen-portfolio .pf-row-link:focus-visible {
  outline: 2px solid var(--aly-gold);
  outline-offset: -2px;
}

.screen-portfolio .pf-sym {
  font-family: var(--aly-mono);
  font-weight: 600;
  font-size: 0.875rem;
  color: var(--aly-text);
}

.screen-portfolio .pf-name {
  font-size: 0.75rem;
  color: var(--aly-dim);
  margin-top: 2px;
}

/* Cash row */
.screen-portfolio .pf-cash-row td {
  color: var(--aly-dim);
  font-style: italic;
}

.screen-portfolio .pf-cash-row .pf-sym {
  color: var(--aly-mute);
}

/* Sort buttons in th */
.screen-portfolio .pf-sort-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  cursor: pointer;
  padding: 0;
  white-space: nowrap;
}

.screen-portfolio .pf-sort-btn:hover {
  color: var(--aly-text);
}

.screen-portfolio .pf-sort-btn .ic {
  width: 12px;
  height: 12px;
  opacity: 0.4;
  transition: opacity 0.15s;
}

.screen-portfolio .pf-sort-btn.is-sorted .ic {
  opacity: 1;
  color: var(--aly-gold);
}

/* ── Concentration callout ──────────────────────────────────── */
.screen-portfolio .pf-concentration-bar {
  height: 6px;
  border-radius: 3px;
  background: var(--aly-line);
  overflow: hidden;
  margin: var(--sp-2, 0.5rem) 0 var(--sp-1, 0.25rem);
}

.screen-portfolio .pf-concentration-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--aly-gold);
  transition: width 0.6s var(--aly-ease, ease);
}

.screen-portfolio .pf-concentration-fill.over {
  background: var(--aly-warn);
}

/* ── Responsive breakpoints ─────────────────────────────────── */
@media (max-width: 1060px) {
  .screen-portfolio .pf-chart-row {
    grid-template-columns: 1fr;
  }

  .screen-portfolio .pf-donut-wrap {
    max-width: 260px;
    margin-inline: auto;
  }

  .screen-portfolio .pf-donut-card .card-bd {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen-portfolio .pf-donut-legend {
    width: 100%;
    max-width: 360px;
  }
}

@media (max-width: 860px) {
  .screen-portfolio .pf-scores-row {
    grid-template-columns: repeat(2, 1fr);
  }

  .screen-portfolio .pf-divcard-row {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 560px) {
  .screen-portfolio {
    padding-block: var(--sp-4, 1.5rem);
  }

  .screen-portfolio .pf-scores-row {
    grid-template-columns: repeat(2, 1fr);
    gap: var(--sp-3, 1rem);
  }

  .screen-portfolio .pf-hero-meta {
    justify-content: flex-start;
  }

  .screen-portfolio .pf-stat-grid {
    grid-template-columns: 1fr;
  }
}


/* ===================== screen: settings.css ===================== */
/* ============================================================
   settings.css — all selectors scoped under .screen-settings
   Do NOT redefine tokens or shared component classes.
   ============================================================ */

/* ── Root layout ──────────────────────────────────────────── */
.screen-settings {
  display: flex;
  align-items: flex-start;
  gap: 0;
  min-height: 100%;
}

/* ── Sticky left sub-nav ──────────────────────────────────── */
.settings-subnav {
  position: sticky;
  top: 0;
  flex: 0 0 220px;
  min-width: 0;
  padding: 2rem 0 3rem;
  border-right: 1px solid var(--aly-line);
  align-self: flex-start;
  height: 100vh;
  overflow-y: auto;
  box-sizing: border-box;
}

.settings-subnav-label {
  font-family: var(--aly-sans);
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--aly-mute);
  padding: 0 1.5rem 0.75rem;
  margin-top: 0.5rem;
}

.settings-nav-item {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  width: 100%;
  padding: 0.625rem 1.5rem;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  color: var(--aly-dim);
  font-family: var(--aly-sans);
  font-size: 0.875rem;
  text-align: left;
  cursor: pointer;
  transition: color 0.15s var(--aly-ease), background 0.15s var(--aly-ease), border-color 0.15s var(--aly-ease);
  box-sizing: border-box;
  line-height: 1.3;
}

.settings-nav-item .ic {
  flex-shrink: 0;
  width: 1rem;
  height: 1rem;
  opacity: 0.7;
  transition: opacity 0.15s;
}

.settings-nav-item:hover {
  color: var(--aly-text);
  background: rgba(255,255,255,0.03);
}

.settings-nav-item:hover .ic {
  opacity: 1;
}

.settings-nav-item.is-active {
  color: var(--aly-gold);
  border-left-color: var(--aly-gold);
  background: var(--aly-gold-soft);
  font-weight: 500;
}

.settings-nav-item.is-active .ic {
  opacity: 1;
}

.settings-nav-item:focus-visible {
  outline: 2px solid var(--aly-gold);
  outline-offset: -2px;
}

/* ── Main content area ────────────────────────────────────── */
.settings-main {
  flex: 1 1 0;
  min-width: 0;
  padding: 2rem 2.5rem 4rem;
}

/* ── Section fade transition ─────────────────────────────── */
.settings-section {
  display: none;
  animation: settings-fade-in 0.22s var(--aly-ease) both;
}

.settings-section.is-active {
  display: block;
}

@keyframes settings-fade-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .settings-section {
    animation: none;
  }
}

/* ── Section headers ─────────────────────────────────────── */
.settings-section-hd {
  margin-bottom: 1.75rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--aly-line);
}

.settings-section-hd .section-title {
  margin-bottom: 0.375rem;
}

/* ── Broker cards ─────────────────────────────────────────── */
.broker-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.broker-card {
  display: grid;
  grid-template-columns: 3rem 1fr auto;
  align-items: center;
  gap: 1rem 1.25rem;
}

.broker-avatar {
  width: 3rem;
  height: 3rem;
  border-radius: 0.625rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--aly-sans);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  flex-shrink: 0;
  border: 1px solid var(--aly-line);
}

.broker-info {
  min-width: 0;
}

.broker-name {
  font-family: var(--aly-sans);
  font-size: 0.9375rem;
  font-weight: 600;
  color: var(--aly-text);
  margin-bottom: 0.25rem;
}

.broker-meta {
  font-family: var(--aly-sans);
  font-size: 0.75rem;
  color: var(--aly-dim);
  margin-bottom: 0.5rem;
}

.broker-scopes {
  display: flex;
  flex-wrap: wrap;
  gap: 0.375rem;
}

.broker-scope-chip {
  font-family: var(--aly-mono);
  font-size: 0.7rem;
  padding: 0.2em 0.6em;
  border-radius: 0.25rem;
  background: rgba(76, 141, 255, 0.1);
  color: #4C8DFF;
  border: 1px solid rgba(76, 141, 255, 0.2);
}

.broker-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.5rem;
  flex-shrink: 0;
}

.broker-status-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #29B37A;
  box-shadow: 0 0 6px rgba(41,179,122,0.5);
  vertical-align: middle;
  margin-right: 0.4em;
}

.broker-readonly-note {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1rem;
  border-radius: 0.5rem;
  background: rgba(41,179,122,0.06);
  border: 1px solid rgba(41,179,122,0.15);
  margin-top: 1.25rem;
  font-family: var(--aly-sans);
  font-size: 0.8rem;
  color: var(--aly-dim);
  line-height: 1.5;
}

.broker-readonly-note .ic {
  flex-shrink: 0;
  color: #29B37A;
  width: 1rem;
  height: 1rem;
}

/* Available broker cards */
.broker-available-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.875rem;
  margin-top: 1.5rem;
}

.broker-available-card {
  display: flex;
  align-items: center;
  gap: 0.875rem;
  padding: 1rem 1.125rem;
  border-radius: 0.625rem;
  border: 1px solid var(--aly-line);
  background: var(--aly-panel);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-family: var(--aly-sans);
  font-size: 0.875rem;
  color: var(--aly-dim);
}

.broker-available-card:hover {
  border-color: var(--aly-gold);
  background: var(--aly-panel-2);
  color: var(--aly-text);
}

.broker-available-card .ic {
  color: var(--aly-gold);
  flex-shrink: 0;
}

/* ── Privacy section ─────────────────────────────────────── */
.privacy-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.privacy-store-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.privacy-store-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.625rem 0;
  border-bottom: 1px solid var(--aly-line);
  font-family: var(--aly-sans);
  font-size: 0.8125rem;
  color: var(--aly-dim);
}

.privacy-store-item:last-child {
  border-bottom: none;
}

.privacy-store-item .ic {
  width: 0.875rem;
  height: 0.875rem;
  color: var(--aly-gold);
  flex-shrink: 0;
}

.privacy-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--aly-line);
}

.privacy-toggle-row:last-child {
  border-bottom: none;
}

.privacy-toggle-label {
  font-family: var(--aly-sans);
  font-size: 0.875rem;
  color: var(--aly-text);
  margin-bottom: 0.2rem;
}

.privacy-toggle-sub {
  font-family: var(--aly-sans);
  font-size: 0.75rem;
  color: var(--aly-dim);
}

/* ── Memory summary section ──────────────────────────────── */
.memory-summary-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.875rem;
  margin-bottom: 1.5rem;
}

.memory-stat {
  text-align: center;
  padding: 1.125rem 1rem;
}

.memory-stat-val {
  font-family: var(--aly-mono);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--aly-gold);
  display: block;
  margin-bottom: 0.25rem;
  font-variant-numeric: tabular-nums;
}

.memory-stat-lbl {
  font-family: var(--aly-sans);
  font-size: 0.75rem;
  color: var(--aly-dim);
}

/* ── Notifications section ────────────────────────────────── */
.notif-trigger-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.notif-trigger-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--aly-line);
}

.notif-trigger-row:last-child {
  border-bottom: none;
}

.notif-trigger-info {
  flex: 1 1 0;
  min-width: 0;
}

.notif-trigger-label {
  font-family: var(--aly-sans);
  font-size: 0.875rem;
  color: var(--aly-text);
  margin-bottom: 0.2rem;
}

.notif-trigger-desc {
  font-family: var(--aly-sans);
  font-size: 0.75rem;
  color: var(--aly-dim);
  line-height: 1.5;
}

.notif-quiet-hours {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-top: 1.25rem;
}

/* ── AI Transparency section ─────────────────────────────── */
.ai-engine-diagram {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 1.5rem;
  position: relative;
}

.ai-engine-node {
  display: grid;
  grid-template-columns: 3.5rem 1fr;
  align-items: start;
  gap: 1.25rem;
  padding: 1.375rem 1.5rem;
  position: relative;
}

.ai-engine-node + .ai-engine-node {
  border-top: 1px solid var(--aly-line);
}

.ai-node-icon {
  width: 3rem;
  height: 3rem;
  border-radius: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--aly-line);
  flex-shrink: 0;
}

.ai-node-icon.is-engine  { background: rgba(41,179,122,0.08); }
.ai-node-icon.is-gpt     { background: rgba(76,141,255,0.08); }
.ai-node-icon.is-advisor { background: rgba(200,164,90,0.1); }

.ai-node-icon .ic {
  width: 1.25rem;
  height: 1.25rem;
}

.ai-node-icon.is-engine  .ic { color: #29B37A; }
.ai-node-icon.is-gpt     .ic { color: #4C8DFF; }
.ai-node-icon.is-advisor .ic { color: #C8A45A; }

.ai-node-body {}

.ai-node-title {
  font-family: var(--aly-sans);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--aly-text);
  margin-bottom: 0.3rem;
}

.ai-node-subtitle {
  font-family: var(--aly-mono);
  font-size: 0.7rem;
  color: var(--aly-mute);
  margin-bottom: 0.5rem;
}

.ai-node-desc {
  font-family: var(--aly-sans);
  font-size: 0.8125rem;
  color: var(--aly-dim);
  line-height: 1.6;
}

.ai-flow-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.125rem 0;
  color: var(--aly-mute);
  font-family: var(--aly-sans);
  font-size: 0.7rem;
  gap: 0.375rem;
  border-top: 1px solid var(--aly-line);
  border-bottom: 1px solid var(--aly-line);
  background: var(--aly-ground);
  position: relative;
  z-index: 1;
}

.ai-flow-arrow .ic {
  width: 0.875rem;
  height: 0.875rem;
}

.ai-toggle-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.ai-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--aly-line);
}

.ai-toggle-row:last-child {
  border-bottom: none;
}

.ai-toggle-label {
  font-family: var(--aly-sans);
  font-size: 0.875rem;
  color: var(--aly-text);
  margin-bottom: 0.15rem;
}

.ai-toggle-sub {
  font-family: var(--aly-sans);
  font-size: 0.75rem;
  color: var(--aly-dim);
}

/* ── Appearance section ──────────────────────────────────── */
.appearance-theme-options {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.875rem;
  margin-bottom: 1.5rem;
}

.theme-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.625rem;
  padding: 1.125rem 1rem;
  border-radius: 0.75rem;
  border: 2px solid var(--aly-line);
  cursor: pointer;
  transition: border-color 0.15s;
  background: none;
  width: 100%;
}

.theme-swatch.is-selected {
  border-color: var(--aly-gold);
}

.theme-swatch:hover:not(.is-selected) {
  border-color: var(--aly-dim);
}

.theme-swatch-preview {
  width: 100%;
  height: 52px;
  border-radius: 0.375rem;
  overflow: hidden;
  position: relative;
}

.theme-swatch-preview-dark {
  background: #0B0D10;
}

.theme-swatch-preview-dark::after {
  content: '';
  position: absolute;
  left: 8px; top: 10px;
  width: 40%; height: 6px;
  background: #C8A45A;
  border-radius: 2px;
  opacity: 0.9;
}

.theme-swatch-preview-dark::before {
  content: '';
  position: absolute;
  left: 8px; bottom: 10px;
  width: 60%; height: 4px;
  background: #262B33;
  border-radius: 2px;
}

.theme-swatch-preview-light {
  background: #F7F8FA;
}

.theme-swatch-preview-light::after {
  content: '';
  position: absolute;
  left: 8px; top: 10px;
  width: 40%; height: 6px;
  background: #B08840;
  border-radius: 2px;
  opacity: 0.9;
}

.theme-swatch-preview-light::before {
  content: '';
  position: absolute;
  left: 8px; bottom: 10px;
  width: 60%; height: 4px;
  background: #E0E3E8;
  border-radius: 2px;
}

.theme-swatch-label {
  font-family: var(--aly-sans);
  font-size: 0.8rem;
  color: var(--aly-dim);
  font-weight: 500;
}

.theme-swatch.is-selected .theme-swatch-label {
  color: var(--aly-gold);
}

.accent-palette {
  display: flex;
  gap: 0.625rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}

.accent-dot {
  width: 2rem;
  height: 2rem;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.12s, border-color 0.12s;
  padding: 0;
  background-color: var(--dot-color);
}

.accent-dot.is-selected {
  border-color: var(--aly-text);
  transform: scale(1.15);
}

.accent-dot:hover:not(.is-selected) {
  transform: scale(1.1);
}

.density-options {
  display: flex;
  gap: 0.75rem;
}

.density-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  padding: 0.875rem 1.25rem;
  border-radius: 0.625rem;
  border: 2px solid var(--aly-line);
  cursor: pointer;
  background: none;
  transition: border-color 0.15s;
}

.density-option.is-selected {
  border-color: var(--aly-gold);
}

.density-option:hover:not(.is-selected) {
  border-color: var(--aly-dim);
}

.density-bars {
  display: flex;
  flex-direction: column;
  gap: 3px;
  width: 28px;
}

.density-bars span {
  display: block;
  background: var(--aly-mute);
  border-radius: 1px;
}

.density-option.is-selected .density-bars span {
  background: var(--aly-gold);
}

.density-label {
  font-family: var(--aly-sans);
  font-size: 0.75rem;
  color: var(--aly-dim);
}

.density-option.is-selected .density-label {
  color: var(--aly-gold);
}

/* ── Responsive breakpoints ──────────────────────────────── */
@media (max-width: 900px) {
  .screen-settings {
    flex-direction: column;
  }

  .settings-subnav {
    position: static;
    flex: none;
    width: 100%;
    height: auto;
    padding: 1.25rem 0 0;
    border-right: none;
    border-bottom: 1px solid var(--aly-line);
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    gap: 0;
  }

  .settings-subnav-label {
    display: none;
  }

  .settings-nav-item {
    border-left: none;
    border-bottom: 2px solid transparent;
    padding: 0.625rem 1rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .settings-nav-item.is-active {
    border-left-color: transparent;
    border-bottom-color: var(--aly-gold);
    background: none;
  }

  .settings-main {
    padding: 1.5rem 1.25rem 3rem;
  }

  .privacy-grid {
    grid-template-columns: 1fr;
  }

  .memory-summary-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .broker-card {
    grid-template-columns: 3rem 1fr;
  }

  .broker-actions {
    grid-column: 2;
    flex-direction: row;
    align-items: center;
  }
}

@media (max-width: 560px) {
  .memory-summary-grid {
    grid-template-columns: 1fr 1fr;
  }

  .broker-available-grid {
    grid-template-columns: 1fr;
  }

  .notif-quiet-hours {
    grid-template-columns: 1fr;
  }

  .appearance-theme-options {
    grid-template-columns: 1fr 1fr;
  }
}


/* ===================== screen: signup.css ===================== */
/* =========================================================================
   SCREEN: signup  (chrome: flow) — Elegant account creation
   All selectors scoped under .screen-signup. Reuses shared component classes;
   adds only layout + a few screen-local micro-interactions. No token redefs.
   ========================================================================= */

.screen-signup{
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  overflow-y: auto;
}

/* Two-column editorial layout: an aside "brand rail" + the form panel.
   Collapses to a single centered column on narrow viewports. */
.screen-signup .su-wrap{
  width:100%;
  max-width:1060px;
  margin:0 auto;
  display:grid;
  grid-template-columns:minmax(0,0.92fr) minmax(0,1.08fr);
  gap:var(--s-8);
  align-items:center;
  padding:var(--s-8) var(--s-6);
}

/* ---- Brand / value rail (left) ---- */
.screen-signup .su-aside{
  display:flex;
  flex-direction:column;
  gap:var(--s-6);
  padding-right:var(--s-4);
}
.screen-signup .su-mark{
  display:flex;align-items:center;gap:var(--s-3);
}
.screen-signup .su-mark .su-a{
  width:40px;height:40px;flex:none;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--aly-serif);font-weight:600;font-size:23px;color:#1a1408;
  background:linear-gradient(155deg,var(--aly-gold-hi),var(--aly-gold) 66%,#9c7c39);
  box-shadow:0 2px 12px rgba(200,164,90,.22);
}
.screen-signup .su-mark .su-word{
  font-family:var(--aly-serif);font-size:21px;font-weight:600;letter-spacing:-.01em;
}
.screen-signup .su-headline{
  font-family:var(--aly-serif);
  font-size:var(--fs-display);line-height:var(--lh-display);
  font-weight:600;letter-spacing:-.015em;
  max-width:16ch;
}
.screen-signup .su-headline .su-em{color:var(--aly-gold)}
.screen-signup .su-lede{
  font-size:var(--fs-body);line-height:1.6;color:var(--aly-dim);
  max-width:42ch;
}

/* value bullets on the rail */
.screen-signup .su-points{
  display:flex;flex-direction:column;gap:var(--s-4);
  margin-top:var(--s-1);
}
.screen-signup .su-point{
  display:flex;gap:var(--s-3);align-items:flex-start;
}
.screen-signup .su-point .su-ico{
  width:30px;height:30px;flex:none;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  background:var(--aly-gold-soft);border:1px solid var(--aly-gold-line);
  color:var(--aly-gold);
}
.screen-signup .su-point .su-ico .ic{font-size:16px}
.screen-signup .su-point .su-pt-t{font-weight:600;color:var(--aly-text);font-size:var(--fs-cap)}
.screen-signup .su-point .su-pt-d{font-size:var(--fs-cap);line-height:1.5;color:var(--aly-mute)}

/* ---- Form panel (right) ---- */
.screen-signup .su-panel{
  width:100%;
  max-width:520px;
  margin:0 auto;
}
.screen-signup .su-panel .card-bd{
  display:flex;flex-direction:column;gap:var(--s-5);
}
.screen-signup .su-legend{
  display:flex;flex-direction:column;gap:var(--s-1);
}
.screen-signup .su-legend h1{
  font-family:var(--aly-serif);font-size:var(--fs-h1);line-height:var(--lh-h1);font-weight:600;
}
.screen-signup .su-legend p{
  font-size:var(--fs-cap);color:var(--aly-mute);
}

/* social auth row */
.screen-signup .su-social{
  display:grid;grid-template-columns:1fr 1fr;gap:var(--s-3);
}
.screen-signup .su-social .btn{width:100%}
.screen-signup .su-social .btn .su-glyph{
  font-family:var(--aly-serif);font-weight:700;font-size:15px;line-height:1;
  width:16px;text-align:center;
}

/* "or continue with email" divider with centered label */
.screen-signup .su-or{
  display:flex;align-items:center;gap:var(--s-3);
  color:var(--aly-mute);font-size:var(--fs-micro);

/* submit + footnote */

.screen-signup .su-reassure{

.screen-signup .su-signin button{

/* read-only / no-custody micro reassurance under the panel */

}

/* ---- entrance reveal: the kernel adds .is-in to [data-reveal] nodes.
   Scope the visible state here so cards animate in (and never stay hidden). ---- */
.screen-signup [data-reveal]{opacity:0;transform:translateY(10px)}
.screen-signup [data-reveal].is-in{
  opacity:1;transform:none;
  transition:opacity var(--dur-base) var(--aly-ease),transform var(--dur-base) var(--aly-ease);
}

/* ---- responsive ---- */
@media (max-width:900px){
  .screen-signup .su-wrap{

    gap:var(--s-6);
    max-width:560px;
    padding:var(--s-7) var(--s-5);

  .screen-signup .su-aside{padding-right:0}
  .screen-signup .su-points{

}
@media (max-width:560px){
  .screen-signup .su-wrap{padding:var(--s-6) var(--s-4)}
  .screen-signup .su-social{grid-template-columns:1fr}
  .screen-signup .su-row2{grid-template-columns:1fr}
  .screen-signup .su-points{grid-template-columns:1fr}
  .screen-signup .su-headline{font-size:26px;line-height:32px}
}

@media (prefers-reduced-motion:reduce){
  .screen-signup [data-reveal]{opacity:1;transform:none}
  .screen-signup [data-reveal].is-in{transition:none}
  .screen-signup .su-meter i,
  .screen-signup .su-err{transition:none}
}


/* ===================== screen: splash.css ===================== */
/* =========================================================================
   SPLASH — premium brand splash (chrome: flow). All selectors scoped
   under .screen-splash. Reuses design tokens from the shell; adds only
   layout + the bespoke mark-draw / wordmark / shimmer motion.
   ========================================================================= */

.screen-splash{
  position:relative;
  min-height:100vh;
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:var(--s-8) var(--s-6);
  text-align:center;
  cursor:pointer;
  overflow:hidden;
  /* Deep, quiet ground with a single restrained gold breath behind the mark. */
  background:
    radial-gradient(120% 90% at 50% 34%, rgba(200,164,90,.09), transparent 58%),
    radial-gradient(140% 120% at 50% 120%, rgba(11,13,16,.0), var(--aly-ground) 70%),
    var(--aly-ground);
  -webkit-tap-highlight-color:transparent;
}

/* The kernel adds .is-in to [data-reveal] nodes; make our content block resolve
   to visible (our own choreography handles the actual entrance below). */
.screen-splash [data-reveal]{opacity:1}

/* Centered content stack */
.screen-splash .splash-inner{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:var(--s-5);
  max-width:520px;
  width:100%;
}

/* ---- The gold "A" mark: a soft-glass tile with a stroke-drawn letterform ---- */
.screen-splash .splash-mark{
  position:relative;
  width:96px;height:96px;
  border-radius:22px;
  display:grid;place-items:center;
  background:linear-gradient(158deg, rgba(218,187,116,.16), rgba(200,164,90,.06) 60%, rgba(156,124,57,.10));
  border:1px solid var(--aly-gold-line);
  box-shadow:
    0 1px 0 rgba(255,255,255,.05) inset,
    0 18px 60px -22px rgba(200,164,90,.55),
    var(--e-2, 0 10px 30px -12px rgba(0,0,0,.6));
  opacity:0;transform:translateY(10px) scale(.94);
  animation:splash-mark-in 720ms var(--aly-ease) 120ms both;
}
/* Ambient halo that fades up behind the tile */
.screen-splash .splash-mark::before{
  content:"";
  position:absolute;inset:-34% ;
  border-radius:50%;
  background:radial-gradient(circle at 50% 50%, rgba(200,164,90,.22), transparent 62%);
  opacity:0;filter:blur(2px);
  animation:splash-halo 1600ms var(--aly-ease) 200ms both;
  z-index:-1;pointer-events:none;
}
.screen-splash .splash-mark svg{width:52px;height:52px;display:block;overflow:visible}
.screen-splash .splash-mark .glyph{
  fill:none;
  stroke:url(#splashGold);
  stroke-width:6;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:var(--len,240);
  stroke-dashoffset:var(--len,240);
  animation:splash-draw 1100ms var(--aly-ease) 320ms forwards;
}

/* ---- Wordmark ---- */
.screen-splash .splash-word{
  margin:0;
  font-family:var(--aly-serif);
  font-weight:600;
  letter-spacing:-.012em;
  line-height:1.05;
  font-size:clamp(34px, 7vw, 52px);
  color:var(--aly-text);
  opacity:0;transform:translateY(12px);
  animation:splash-fade-up 760ms var(--aly-ease) 480ms both;
}
.screen-splash .splash-word b{color:var(--aly-gold);font-weight:600}

/* Hairline underline that draws outward from center */
.screen-splash .splash-rule{
  width:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--aly-gold-line) 22%, var(--aly-gold) 50%, var(--aly-gold-line) 78%, transparent);
  border-radius:var(--r-full);
  animation:splash-rule 900ms var(--aly-ease) 720ms both;
}

/* Whisper-quiet tagline */
.screen-splash .splash-tag{
  margin:0;
  font-family:var(--aly-serif);
  font-style:italic;
  font-size:clamp(15px,2.4vw,18px);
  color:var(--aly-dim);
  letter-spacing:.01em;
  opacity:0;
  animation:splash-fade-up 820ms var(--aly-ease) 900ms both;
}

/* ---- Indeterminate progress shimmer ---- */
.screen-splash .splash-progress{
  position:relative;
  width:clamp(140px, 42vw, 200px);
  height:2px;
  margin-top:var(--s-3);
  border-radius:var(--r-full);
  background:var(--aly-line);
  overflow:hidden;
  opacity:0;
  animation:splash-fade-up 700ms var(--aly-ease) 1040ms both;
}
.screen-splash .splash-progress::after{
  content:"";
  position:absolute;top:0;left:0;height:100%;
  width:42%;
  border-radius:var(--r-full);
  background:linear-gradient(90deg, transparent, var(--aly-gold) 50%, transparent);
  transform:translateX(-120%);
  animation:splash-shimmer 1450ms var(--aly-ease) 1140ms infinite;
}

/* Quiet affordance hint at the very bottom */
.screen-splash .splash-hint{
  position:absolute;
  left:0;right:0;bottom:max(var(--s-6), env(safe-area-inset-bottom, 0px));
  margin:0;
  font-family:var(--aly-sans);
  font-size:11.5px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--aly-mute);
  opacity:0;
  animation:splash-hint 900ms var(--aly-ease) 1500ms both;
}

.screen-splash:focus-visible{outline:none}
.screen-splash:focus-visible .splash-mark{
  box-shadow:
    0 0 0 3px var(--aly-gold-soft),
    0 18px 60px -22px rgba(200,164,90,.55);
}

/* =========================================================================
   KEYFRAMES (scoped names to avoid collision with shell keyframes)
   ========================================================================= */
@keyframes splash-mark-in{
  from{opacity:0;transform:translateY(10px) scale(.94)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes splash-halo{
  0%{opacity:0}
  55%{opacity:1}
  100%{opacity:.72}
}
@keyframes splash-draw{
  to{stroke-dashoffset:0}
}
@keyframes splash-fade-up{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes splash-rule{
  from{width:0;opacity:0}
  to{width:min(240px,64%);opacity:1}
}
@keyframes splash-shimmer{
  0%{transform:translateX(-140%)}
  100%{transform:translateX(360%)}
}
@keyframes splash-hint{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:.9;transform:translateY(0)}
}

/* =========================================================================
   REDUCED MOTION — present everything instantly, no shimmer sweep.
   (The shell also globally clamps durations; this guarantees end-states.)
   ========================================================================= */
@media (prefers-reduced-motion:reduce){
  .screen-splash .splash-mark,
  .screen-splash .splash-mark::before,
  .screen-splash .splash-word,
  .screen-splash .splash-tag,
  .screen-splash .splash-progress,
  .screen-splash .splash-hint{
    animation:none !important;
    opacity:1 !important;
    transform:none !important;
  }
  .screen-splash .splash-mark .glyph{
    animation:none !important;
    stroke-dashoffset:0 !important;
  }
  .screen-splash .splash-rule{
    animation:none !important;
    width:min(240px,64%) !important;
    opacity:1 !important;
  }
  .screen-splash .splash-progress::after{
    animation:none !important;
    transform:translateX(0) !important;
    width:100% !important;
    opacity:.5;
  }
}

/* =========================================================================
   RESPONSIVE
   ========================================================================= */
@media (max-width:560px){
  .screen-splash{padding:var(--s-7) var(--s-5)}
  .screen-splash .splash-mark{width:84px;height:84px;border-radius:20px}
  .screen-splash .splash-mark svg{width:46px;height:46px}
  .screen-splash .splash-inner{gap:var(--s-4)}
}
