/* =========================================================
   stock.js — Stock Tear Sheet screen
   Registers: App.register("stock", { chrome, title, mount, unmount })
   ========================================================= */
(function () {
  'use strict';

  /* ── Palette hexes (canvas cannot read CSS vars) ───────── */
  var HEX = {
    gold:    '#C8A45A',
    goldSoft:'rgba(200,164,90,.13)',
    pos:     '#29B37A',
    neg:     '#E5484D',
    warn:    '#E0A93B',
    info:    '#4C8DFF',
    text:    '#EDF0F4',
    dim:     '#A6AEBC',
    mute:    '#6B7280',
    line:    '#262B33',
    panel:   '#12151A',
    ground:  '#0B0D10'
  };

  /* ── Helpers ────────────────────────────────────────────── */
  function el(tag, cls, attrs) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        if (k === 'html') { e.innerHTML = attrs[k]; }
        else if (k === 'text') { e.textContent = attrs[k]; }
        else { e.setAttribute(k, attrs[k]); }
      });
    }
    return e;
  }

  function append(parent /* , ...children */) {
    for (var i = 1; i < arguments.length; i++) {
      var c = arguments[i];
      if (c) parent.appendChild(typeof c === 'string' ? (function(s){var t=document.createElement('span');t.innerHTML=s;return t;} )(c) : c);
    }
    return parent;
  }

  function fmtPct(n, sign) {
    return App.fmt.pct(n, sign ? { sign: true } : undefined);
  }

  function deltaClass(n) {
    if (n > 0) return 'up';
    if (n < 0) return 'down';
    return 'flat';
  }

  function colorForState(state) {
    if (state === 'undervalued') return HEX.pos;
    if (state === 'overvalued') return HEX.neg;
    return HEX.gold;
  }

  function safeGet(obj, path, fallback) {
    var parts = path.split('.');
    var cur = obj;
    for (var i = 0; i < parts.length; i++) {
      if (cur == null) return fallback !== undefined ? fallback : null;
      cur = cur[parts[i]];
    }
    return cur != null ? cur : (fallback !== undefined ? fallback : null);
  }

  /* ── Evidence chip builder ─────────────────────────────── */
  function evChip(type, text) {
    var chip = el('span', 'ev ev--' + type);
    chip.textContent = text;
    return chip;
  }

  /* ── Rating badge HTML ──────────────────────────────────── */
  function ratingBadge(action, actionLabel) {
    var badge = el('span', 'rating ' + (action || 'hold'));
    badge.textContent = actionLabel || action || 'Hold';
    return badge;
  }

  /* ── Build a canvas and register resize/draw fn ─────────── */
  function makeCanvas(container, drawFn) {
    var cv = document.createElement('canvas');
    container.appendChild(cv);
    App.onResize(function () { drawFn(cv); });
    return cv;
  }

  /* ─────────────────────────────────────────────────────────
     SECTION BUILDERS
  ───────────────────────────────────────────────────────── */

  /* ── 1. Header price block ──────────────────────────────── */
  function buildHeader(inst, holding) {
    var wrap = el('div', 'stock-header', { 'data-reveal': '' });

    var ident = el('div', 'stock-ident');
    var symbolEl = el('div', 'stock-symbol');
    symbolEl.textContent = inst.symbol;

    var nameEl = el('h1', 'stock-name');
    nameEl.textContent = inst.name;

    var sectorPill = el('span', 'pill mute');
    sectorPill.textContent = inst.sector || '';

    append(ident, symbolEl, nameEl, sectorPill);

    var priceBlock = el('div', 'stock-price-block');
    var priceEl = el('div', 'stock-price');
    priceEl.textContent = App.fmt.money(inst.price);

    var dayChg = el('div', 'stock-day-change');
    var dayPct = safeGet(inst, 'dayChangePct', 0);
    var dc = deltaClass(dayPct);
    var dcPill = el('span', 'delta ' + dc);
    dcPill.innerHTML = App.icon(dayPct >= 0 ? 'arrow-up' : 'arrow-down') +
      '<span>' + fmtPct(Math.abs(dayPct)) + '</span>';
    append(dayChg, dcPill);

    /* if we have a holding, show P/L */
    if (holding) {
      var plPct = safeGet(holding, 'plPct', 0);
      var plAbs = safeGet(holding, 'plAbs', 0);
      var plPill = el('span', 'pill ' + (plPct >= 0 ? 'pos' : 'neg'));
      plPill.textContent = App.fmt.money(plAbs, { sign: true }) + '  ' + fmtPct(plPct, true);
      append(dayChg, plPill);
    }

    append(priceBlock, priceEl, dayChg);
    append(wrap, ident, priceBlock);
    return wrap;
  }

  /* ── 2. Price history area chart ──────────────────────────  */
  function buildPriceChart(inst) {
    var card = el('div', 'card', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var title = el('h2', 'card-title');
    title.textContent = 'Price History';
    var prov = el('div', 'prov');
    prov.textContent = 'Daily closes · fin-engine';
    append(hd, title, prov);

    var bd = el('div', 'card-bd stock-chart-wrap');
    var pts = safeGet(inst, 'history', []);
    makeCanvas(bd, function (cv) {
      Charts.area(cv, pts, { color: HEX.gold, fill: true, height: 220 });
    });

    append(card, hd, bd);
    return card;
  }

  /* ── 3. Advisor Recommendation ────────────────────────────  */
  function buildRec(inst, symbol) {
    var rec = safeGet(inst, 'rec', {});
    var why = safeGet(inst, 'why', []);

    var card = el('div', 'card accent', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var eyebrow = el('div', 'eyebrow');
    eyebrow.textContent = 'Advisor Recommendation';
    append(hd, eyebrow);

    var bd = el('div', 'card-bd');

    /* ring + content row */
    var ringRow = el('div', 'rec-ring-row');
    var ringCol = el('div', 'rec-ring-col');

    /* confidence ring */
    var conf = safeGet(rec, 'confidence', 0);
    makeCanvas(ringCol, function (cv) {
      Charts.ring(cv, conf, {
        label: String(conf),
        sublabel: 'Confidence',
        color: HEX.gold,
        track: HEX.line,
        height: 100
      });
    });

    var recContent = el('div', 'rec-content');

    /* action badge row */
    var actionRow = el('div', 'rec-action');
    append(actionRow,
      ratingBadge(rec.action, rec.actionLabel),
      (function () {
        var confPill = el('span', 'confpill');
        confPill.textContent = conf + '% Confidence';
        return confPill;
      })()
    );

    /* summary */
    var summaryEl = el('p', 'rec-summary-text');
    summaryEl.textContent = safeGet(rec, 'summary', '');

    /* why list */
    var whyTitle = el('div', 'metric-group-title');
    whyTitle.textContent = 'Why this recommendation';
    var whyList = el('ul', 'rec-why-list');
    why.forEach(function (w) {
      var li = el('li');
      li.textContent = w;
      whyList.appendChild(li);
    });

    /* updated */
    var updatedEl = el('div', 'prov');
    updatedEl.textContent = 'Recommendation · updated ' + App.fmt.date(safeGet(rec, 'updated', ''));

    /* actions row */
    var actionsRow = el('div', 'rec-actions-row');
    var advisorBtn = el('button', 'btn btn-ghost btn-sm');
    advisorBtn.innerHTML = App.icon('advisor') + ' Ask Your Advisor about ' + symbol;
    advisorBtn.addEventListener('click', function () {
      App.go('advisor');
    });

    var watchBtn = el('button', 'btn btn-ghost btn-sm');
    watchBtn.innerHTML = App.icon('eye') + ' Add to watchlist';
    watchBtn.addEventListener('click', function () {
      App.toast(symbol + ' added to watchlist.', 'ok');
    });

    append(actionsRow, advisorBtn, watchBtn);

    append(recContent, actionRow, summaryEl, whyTitle, whyList, updatedEl, actionsRow);
    append(ringRow, ringCol, recContent);

    /* rec-note disclaimer — required by read-only law */
    var note = el('div', 'rec-note');
    note.textContent = 'Analysis only — AlyInvest never places trades.';

    append(bd, ringRow, note);
    append(card, hd, bd);
    return card;
  }

  /* ── 4. Health & Risk scores ────────────────────────────── */
  function buildScores(inst) {
    var card = el('div', 'card', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var title = el('h2', 'card-title');
    title.textContent = 'Health & Risk';
    append(hd, title);

    var bd = el('div', 'card-bd');
    var grid = el('div', 'stock-scores');

    function scoreCard(labelText, value, band, delta, ringColor) {
      var sc = el('div', 'score-card');
      var ringWrap = el('div', 'score-ring-wrap');
      makeCanvas(ringWrap, function (cv) {
        Charts.ring(cv, value, {
          label: String(value),
          sublabel: '',
          color: ringColor,
          track: HEX.line,
          height: 80
        });
      });

      var meta = el('div', 'score-meta');
      var lbl = el('div', 'score-label');
      lbl.textContent = labelText;
      var val = el('div', 'score-value');
      val.textContent = value;
      var bnd = el('div', 'score-band');

      var deltaEl = el('span', 'delta ' + deltaClass(delta));
      deltaEl.innerHTML = App.icon(delta >= 0 ? 'arrow-up' : 'arrow-down') +
        '<span>' + (delta >= 0 ? '+' : '') + delta + '</span>';

      bnd.appendChild(document.createTextNode((band || '') + '  '));
      bnd.appendChild(deltaEl);

      append(meta, lbl, val, bnd);
      append(sc, ringWrap, meta);
      return sc;
    }

    var health = safeGet(inst, 'health', 0);
    var healthDelta = safeGet(inst, 'health_delta', 0);
    var risk = safeGet(inst, 'risk', 0);
    var riskLabel = safeGet(inst, 'riskLabel', '');

    var healthColor = health >= 70 ? HEX.pos : health >= 50 ? HEX.warn : HEX.neg;
    var riskColor = risk >= 70 ? HEX.warn : HEX.gold;

    grid.appendChild(scoreCard('Health Score', health, 'Strong', healthDelta, healthColor));
    grid.appendChild(scoreCard('Risk Score', risk, riskLabel, 0, riskColor));

    append(bd, grid);
    append(card, hd, bd);
    return card;
  }

  /* ── 5. Valuation gauge ─────────────────────────────────── */
  function buildValuation(inst) {
    var card = el('div', 'card', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var title = el('h2', 'card-title');
    title.textContent = 'Valuation';
    append(hd, title);

    var bd = el('div', 'card-bd');

    var fairValue = safeGet(inst, 'fairValue', inst.price);
    var price = safeGet(inst, 'price', 0);
    var state = safeGet(inst, 'valuationState', 'fair');
    var marginPct = safeGet(inst, 'marginPct', 0);

    /* gauge range: fairValue ± ~30% */
    var spread = fairValue * 0.35;
    var minVal = fairValue - spread;
    var maxVal = fairValue + spread;
    var fairLow = fairValue * 0.97;
    var fairHigh = fairValue * 1.03;

    var gaugeWrap = el('div', 'valuation-gauge-wrap');
    makeCanvas(gaugeWrap, function (cv) {
      Charts.gauge(cv, {
        value: price,
        min: minVal,
        max: maxVal,
        fairLow: fairLow,
        fairHigh: fairHigh,
        price: price,
        height: 110
      });
    });

    var stateRow = el('div', 'valuation-state-row');
    var statePillClass = state === 'undervalued' ? 'pos' : state === 'overvalued' ? 'neg' : 'mute';
    var statePill = el('span', 'pill ' + statePillClass);
    statePill.textContent = state.charAt(0).toUpperCase() + state.slice(1);

    var fairLine = el('div', 'valuation-margin');
    fairLine.textContent = 'Fair value ' + App.fmt.money(fairValue) +
      ' · Margin ' + (marginPct >= 0 ? '+' : '') + App.fmt.pct(marginPct);

    append(stateRow, statePill, fairLine);

    var ev1 = evChip('analysis', 'Intrinsic value estimate');
    var ev2 = evChip('assumption', 'DCF model');

    var evRow = el('div', 'cluster');
    evRow.style.marginTop = '0.5rem';
    append(evRow, ev1, ev2);

    append(bd, gaugeWrap, stateRow, evRow);
    append(card, hd, bd);
    return card;
  }

  /* ── 6. Financial summary ───────────────────────────────── */
  function buildFinancialSummary(inst) {
    var fs = safeGet(inst, 'financialSummary', {});

    var card = el('div', 'card', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var title = el('h2', 'card-title');
    title.textContent = 'Financial Summary';
    var prov = el('div', 'prov');
    prov.textContent = 'Trailing twelve months · fin-engine';
    append(hd, title, prov);

    var bd = el('div', 'card-bd');
    var grid = el('div', 'fin-grid');

    function finItem(label, value) {
      var item = el('div', 'fin-item');
      var lbl = el('div', 'fin-label');
      lbl.textContent = label;
      var val = el('div', 'fin-value');
      val.textContent = value != null ? value : '—';
      append(item, lbl, val);
      return item;
    }

    var revenue = safeGet(fs, 'revenue', null);
    var revenueGrowth = safeGet(fs, 'revenueGrowth', null);
    var netMargin = safeGet(fs, 'netMargin', null);
    var fcf = safeGet(fs, 'fcf', null);
    var dte = safeGet(fs, 'debtToEquity', null);
    var divYield = safeGet(fs, 'dividendYield', null);

    grid.appendChild(finItem('Revenue', revenue != null ? App.fmt.compact(revenue) : '—'));
    grid.appendChild(finItem('Revenue Growth', revenueGrowth != null ? fmtPct(revenueGrowth, true) : '—'));
    grid.appendChild(finItem('Net Margin', netMargin != null ? fmtPct(netMargin) : '—'));
    grid.appendChild(finItem('Free Cash Flow', fcf != null ? App.fmt.compact(fcf) : '—'));
    grid.appendChild(finItem('Debt / Equity', dte != null ? App.fmt.num(dte) : '—'));
    grid.appendChild(finItem('Dividend Yield', divYield != null ? fmtPct(divYield) : '—'));

    append(bd, grid);
    append(card, hd, bd);
    return card;
  }

  /* ── 7. Metric groups ───────────────────────────────────── */
  function buildMetrics(inst) {
    var metrics = safeGet(inst, 'metrics', {});
    var groups = [
      { key: 'valuation', label: 'Valuation' },
      { key: 'growth',    label: 'Growth' },
      { key: 'quality',   label: 'Quality' },
      { key: 'risk',      label: 'Risk' }
    ];

    var card = el('div', 'card', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var title = el('h2', 'card-title');
    title.textContent = 'Key Metrics';
    append(hd, title);

    var bd = el('div', 'card-bd metric-groups');

    groups.forEach(function (g) {
      var items = safeGet(metrics, g.key, []);
      if (!items.length) return;

      var groupEl = el('div', 'metric-group');
      var groupTitle = el('div', 'metric-group-title');
      groupTitle.textContent = g.label;

      var kvList = el('ul', 'metric-kv-list');
      items.forEach(function (item) {
        var li = el('li', 'metric-kv-item');
        var key = el('span', 'metric-kv-key');
        key.textContent = item.k || '';
        var val = el('span', 'metric-kv-val');
        val.textContent = item.v != null ? String(item.v) : '—';
        append(li, key, val);
        kvList.appendChild(li);
      });

      append(groupEl, groupTitle, kvList);
      bd.appendChild(groupEl);
    });

    append(card, hd, bd);
    return card;
  }

  /* ── 8. Scenarios cone ──────────────────────────────────── */
  function buildScenarios(inst) {
    var scenarios = safeGet(inst, 'scenarios', {});
    var bear = safeGet(scenarios, 'bear', { prob: 20, ret: -15, price: 0 });
    var base = safeGet(scenarios, 'base', { prob: 55, ret: 8, price: 0 });
    var bull = safeGet(scenarios, 'bull', { prob: 25, ret: 25, price: 0 });

    var price = safeGet(inst, 'price', 100);

    /* Build cone points from current price */
    var pts = 12;
    function buildSeries(finalRet) {
      var arr = [];
      for (var i = 0; i <= pts; i++) {
        arr.push(price * (1 + (finalRet / 100) * (i / pts)));
      }
      return arr;
    }

    var basePts = buildSeries(base.ret);
    var bearPts = buildSeries(bear.ret);
    var bullPts = buildSeries(bull.ret);

    var card = el('div', 'card', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var eyebrow = el('div', 'eyebrow');
    eyebrow.textContent = 'Scenarios';
    var title = el('h2', 'card-title');
    title.textContent = 'Probability Scenarios';
    append(hd, eyebrow, title);

    var bd = el('div', 'card-bd');

    var coneWrap = el('div', 'scenarios-wrap');
    makeCanvas(coneWrap, function (cv) {
      Charts.cone(cv, { base: basePts, bear: bearPts, bull: bullPts }, {
        color: HEX.gold,
        height: 180
      });
    });

    /* cone-note disclaimer */
    var coneNote = el('div', 'cone-note');
    coneNote.textContent = 'Scenario, not a forecast.';

    /* scenario breakdown */
    var probRow = el('div', 'scenarios-prob-row');

    function scenarioItem(label, ret, prob, targetPrice, retClass) {
      var item = el('div', 'scenario-item');
      var lbl = el('div', 'scenario-label');
      lbl.textContent = label;
      var retEl = el('div', 'scenario-ret ' + retClass);
      retEl.textContent = (ret >= 0 ? '+' : '') + App.fmt.pct(ret);
      var probEl = el('div', 'scenario-prob');
      probEl.textContent = prob + '% probability';
      var priceEl = el('div', 'scenario-price');
      priceEl.textContent = targetPrice > 0 ? App.fmt.money(targetPrice) : '';
      append(item, lbl, retEl, probEl, priceEl);
      return item;
    }

    probRow.appendChild(scenarioItem('Bear', bear.ret, bear.prob, bear.price, 'neg'));
    probRow.appendChild(scenarioItem('Base', base.ret, base.prob, base.price, 'flat'));
    probRow.appendChild(scenarioItem('Bull', bull.ret, bull.prob, bull.price, 'pos'));

    /* evidence chips */
    var evRow = el('div', 'cluster');
    evRow.style.marginTop = '0.75rem';
    append(evRow,
      evChip('assumption', 'Probability weights'),
      evChip('analysis', 'Monte Carlo simulation'),
      evChip('uncertain', 'Forward estimates')
    );

    append(bd, coneWrap, coneNote, probRow, evRow);
    append(card, hd, bd);
    return card;
  }

  /* ── 9. Timeline for this symbol ────────────────────────── */
  function buildTimeline(symbol) {
    var entries = (App.db.timeline || []).filter(function (e) {
      return e.symbol === symbol;
    });

    var recHistory = safeGet(App.db.instruments, symbol + '.recHistory', []);

    var card = el('div', 'card', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var eyebrow = el('div', 'eyebrow');
    eyebrow.textContent = 'Investment Timeline';
    var title = el('h2', 'card-title');
    title.textContent = 'Recommendation History';
    var sub = el('div', 'card-sub');
    sub.textContent = 'Immutable ledger · nothing is ever deleted';
    append(hd, eyebrow, title, sub);

    var bd = el('div', 'card-bd');

    if (!entries.length && !recHistory.length) {
      var empty = el('div', 'empty');
      empty.textContent = 'No timeline entries for ' + symbol + ' yet.';
      append(bd, empty);
      append(card, hd, bd);
      return card;
    }

    var list = el('div', 'rec-timeline-list');

    /* merge timeline entries with recHistory */
    var items = entries.length ? entries : recHistory.map(function (r) {
      return {
        id: null,
        dateLabel: App.fmt.date(r.date),
        action: r.action,
        actionLabel: r.actionLabel,
        title: r.note || r.actionLabel,
        confidence: r.confidence,
        status: 'active'
      };
    });

    items.forEach(function (entry, idx) {
      var item = el('div', 'rec-tl-item');
      item.setAttribute('role', 'button');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-label', 'View timeline entry ' + (entry.title || ''));

      var dotCol = el('div', 'rec-tl-dot');
      var circle = el('div', 'rec-tl-dot-circle' + (entry.status === 'superseded' ? ' superseded' : ''));
      var line = el('div', 'rec-tl-line');
      if (idx < items.length - 1) dotCol.appendChild(line);
      dotCol.appendChild(circle);

      var content = el('div', 'rec-tl-content');
      var meta = el('div', 'rec-tl-meta');
      var dateEl = el('span', 'rec-tl-date');
      dateEl.textContent = entry.dateLabel || '';

      var badge = ratingBadge(entry.action, entry.actionLabel);

      var statusPill = entry.status === 'superseded'
        ? (function () { var p = el('span', 'pill mute'); p.textContent = 'Superseded'; return p; })()
        : null;

      var confPill = el('span', 'confpill');
      confPill.textContent = (entry.confidence || 0) + '%';

      append(meta, dateEl, badge, confPill);
      if (statusPill) meta.appendChild(statusPill);

      var titleEl = el('div', 'rec-tl-title');
      titleEl.textContent = entry.title || '';

      /* supersede chain info */
      if (entry.supersedesId) {
        var supersedeEl = el('div', 'rec-tl-supersede');
        supersedeEl.textContent = 'Supersedes ' + entry.supersedesId;
        append(content, meta, titleEl, supersedeEl);
      } else {
        append(content, meta, titleEl);
      }

      var chevron = el('span', 'dim');
      chevron.innerHTML = App.icon('chevron-right');

      append(item, dotCol, content, chevron);

      item.addEventListener('click', function () {
        App.go('timeline');
      });
      item.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); App.go('timeline'); }
      });

      list.appendChild(item);
    });

    append(bd, list);
    append(card, hd, bd);
    return card;
  }

  /* ── 10. Explain everything accordion ──────────────────── */
  function buildExplain(inst) {
    var explains = safeGet(inst, 'explain', []);

    var card = el('div', 'card', { 'data-reveal': '' });
    var hd = el('div', 'card-hd');
    var eyebrow = el('div', 'eyebrow');
    eyebrow.textContent = 'Transparency';
    var title = el('h2', 'card-title');
    title.textContent = 'Explain Everything';
    var sub = el('div', 'card-sub');
    sub.textContent = 'Every statement tagged Fact, Analysis, Assumption, or Uncertain';
    append(hd, eyebrow, title, sub);

    var bd = el('div', 'card-bd');

    if (!explains.length) {
      var empty = el('div', 'empty');
      empty.textContent = 'No explanations available.';
      append(bd, empty);
      append(card, hd, bd);
      return card;
    }

    var list = el('div', 'explain-list');

    explains.forEach(function (item, idx) {
      var accItem = el('div', 'explain-item');

      var trigger = el('button', 'explain-trigger');
      trigger.setAttribute('aria-expanded', 'false');
      trigger.setAttribute('aria-controls', 'explain-body-' + idx);

      var chip = evChip(item.type || 'analysis', (item.type || 'analysis').charAt(0).toUpperCase() + (item.type || 'analysis').slice(1));

      /* short preview — first ~100 chars */
      var preview = el('span', 'explain-text-preview');
      preview.textContent = item.text || '';

      var chevronEl = el('span', 'explain-chevron');
      chevronEl.innerHTML = App.icon('chevron-down');

      append(trigger, chip, preview, chevronEl);

      var body = el('div', 'explain-body');
      body.id = 'explain-body-' + idx;
      var bodyText = el('div', 'explain-body-text');
      bodyText.textContent = item.text || '';
      append(body, bodyText);

      trigger.addEventListener('click', function () {
        var isOpen = accItem.classList.contains('is-open');
        accItem.classList.toggle('is-open', !isOpen);
        trigger.setAttribute('aria-expanded', String(!isOpen));
      });

      append(accItem, trigger, body);
      list.appendChild(accItem);
    });

    append(bd, list);
    append(card, hd, bd);
    return card;
  }

  /* ── Empty / error state ────────────────────────────────── */
  function buildEmpty(symbol) {
    var wrap = el('div', 'screen screen-stock');
    var container = el('div', 'container');
    var emptyEl = el('div', 'stock-empty');

    var icon = el('div', 'stock-empty-icon');
    icon.textContent = '—';
    var title = el('div', 'stock-empty-title');
    title.textContent = 'No data for ' + (symbol || 'this symbol');
    var sub = el('div', 'stock-empty-sub');
    sub.textContent = 'Try navigating to a known holding.';
    var backBtn = el('button', 'btn btn-ghost btn-sm');
    backBtn.innerHTML = App.icon('chevron-left') + ' Back to Portfolio';
    backBtn.addEventListener('click', function () { App.go('portfolio'); });

    append(emptyEl, icon, title, sub, backBtn);
    append(container, emptyEl);
    append(wrap, container);
    return wrap;
  }

  /* ─────────────────────────────────────────────────────────
     REGISTER
  ───────────────────────────────────────────────────────── */
  App.register('stock', {
    chrome: 'app',
    title: 'Stock',

    mount: function (el, params) {
      var symbol = (params && params.symbol) || 'MSFT';

      /* resolve instrument — fall back to first holding */
      var inst = safeGet(App.db, 'instruments.' + symbol, null);
      if (!inst) {
        /* try first known symbol */
        var keys = Object.keys(App.db.instruments || {});
        if (keys.length) {
          symbol = keys[0];
          inst = App.db.instruments[symbol];
        }
      }

      if (!inst) {
        el.appendChild(buildEmpty(symbol));
        return;
      }

      /* find matching holding if held */
      var holding = (App.db.holdings || []).find(function (h) {
        return h.symbol === symbol;
      }) || null;

      /* ── Root wrapper ─────────────────────────────────── */
      var root = document.createElement('div');
      root.className = 'screen screen-stock';
      var container = document.createElement('div');
      container.className = 'container';

      /* ── Back nav ─────────────────────────────────────── */
      var backBtn = document.createElement('button');
      backBtn.className = 'stock-back';
      backBtn.innerHTML = App.icon('chevron-left') + '<span>Portfolio</span>';
      backBtn.setAttribute('aria-label', 'Back to portfolio');
      backBtn.addEventListener('click', function () { App.go('portfolio'); });

      /* ── Assemble sections ────────────────────────────── */
      container.appendChild(backBtn);
      container.appendChild(buildHeader(inst, holding));
      container.appendChild(buildPriceChart(inst));
      container.appendChild(buildRec(inst, symbol));

      /* two-column body */
      var body = document.createElement('div');
      body.className = 'stock-body';

      var main = document.createElement('div');
      main.className = 'stock-main';
      main.appendChild(buildFinancialSummary(inst));
      main.appendChild(buildMetrics(inst));
      main.appendChild(buildScenarios(inst));
      main.appendChild(buildTimeline(symbol));
      main.appendChild(buildExplain(inst));

      var aside = document.createElement('div');
      aside.className = 'stock-aside';
      aside.appendChild(buildScores(inst));
      aside.appendChild(buildValuation(inst));

      body.appendChild(main);
      body.appendChild(aside);
      container.appendChild(body);

      root.appendChild(container);
      el.appendChild(root);

      App.reveal(el);
    },

    unmount: function () {
      /* App.onResize handlers are auto-cleared by the kernel on unmount */
    }
  });

}());


/* ===================== screen: timeline.js ===================== */
(function () {
  'use strict';

  /* ─────────────────────────────────────────────
     Investment Timeline screen
     chrome: app | title: Investment Timeline
     Append-only ledger; entry detail with
     reason / calcs / assumptions / evidence /
     supersede chain.
  ───────────────────────────────────────────── */

  /* ── State ── */
  var _filter = 'all';       // 'all' | 'active' | 'superseded'
  var _symbolFilter = null;  // symbol string or null
  var _expandedIds = {};     // id -> bool

  /* ── Helpers ── */
  function h(tag, attrs, children) {
    var el = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        if (k === 'className') { el.className = attrs[k]; }
        else if (k === 'textContent') { el.textContent = attrs[k]; }
        else if (k === 'innerHTML') { el.innerHTML = attrs[k]; }
        else if (k.startsWith('data-')) { el.setAttribute(k, attrs[k]); }
        else if (k === 'role' || k === 'aria-label' || k === 'aria-expanded' || k === 'tabindex') {
          el.setAttribute(k, attrs[k]);
        }
        else { el[k] = attrs[k]; }
      });
    }
    if (children) {
      children.forEach(function (c) {
        if (c == null) return;
        if (typeof c === 'string') { el.appendChild(document.createTextNode(c)); }
        else { el.appendChild(c); }
      });
    }
    return el;
  }

  /* ── Activity sparkline ── */
  function buildActivityChart(el, entries) {
    var wrap = h('div', { className: 'tl-activity', 'data-reveal': '' });
    var lbl = h('div', { className: 'tl-activity-label', textContent: 'Recommendation activity — last 3 months' });
    wrap.appendChild(lbl);

    var cv = document.createElement('canvas');
    wrap.appendChild(cv);
    el.appendChild(wrap);

    // Build a monthly bucketed count
    App.onResize(function () {
      // Bucket entries by month (YYYY-MM)
      var counts = {};
      entries.forEach(function (e) {
        if (!e.ts) return;
        var month = String(e.ts).slice(0, 7);
        counts[month] = (counts[month] || 0) + 1;
      });
      var keys = Object.keys(counts).sort();
      // Pad to at least 3 months
      if (keys.length < 2) {
        // create a flat line so the chart doesn't crash
        for (var i = 0; i < 3 - keys.length; i++) {
          keys.unshift('2026-0' + (4 + i));
          counts['2026-0' + (4 + i)] = 0;
        }
      }
      var pts = keys.map(function (k) { return counts[k] || 0; });
      Charts.area(cv, pts, { color: '#C8A45A', fill: true, height: 56 });
    });

    return wrap;
  }

  /* ── Controls bar ── */
  function buildControls(el, entries, onFilterChange) {
    var db = App.db;
    var symbols = [];
    (db.timeline || []).forEach(function (e) {
      if (e.symbol && symbols.indexOf(e.symbol) === -1) symbols.push(e.symbol);
    });

    var bar = h('div', { className: 'tl-controls', 'data-reveal': '' });

    // Status segmented
    var segGroup = h('div', { className: 'tl-filter-group' });
    var segLbl = h('div', { className: 'tl-filter-label', textContent: 'Filter' });
    var seg = h('div', { className: 'segmented', role: 'group', 'aria-label': 'Filter by status' });
    [
      { val: 'all',        label: 'All' },
      { val: 'active',     label: 'Active' },
      { val: 'superseded', label: 'Superseded' }
    ].forEach(function (opt) {
      var btn = h('button', {
        className: 'seg' + (opt.val === _filter ? ' is-on' : ''),
        textContent: opt.label,
        'aria-pressed': String(opt.val === _filter)
      });
      btn.addEventListener('click', function () {
        _filter = opt.val;
        onFilterChange();
      });
      seg.appendChild(btn);
    });
    segGroup.appendChild(segLbl);
    segGroup.appendChild(seg);
    bar.appendChild(segGroup);

    // Symbol chips
    if (symbols.length > 0) {
      var chipGroup = h('div', { className: 'tl-filter-group' });
      var chipLbl = h('div', { className: 'tl-filter-label', textContent: 'Symbol' });
      var chips = h('div', { className: 'tl-symbol-chips' });
      symbols.forEach(function (sym) {
        var chip = h('button', {
          className: 'chip' + (sym === _symbolFilter ? ' is-on' : ''),
          textContent: sym,
          'aria-pressed': String(sym === _symbolFilter)
        });
        chip.addEventListener('click', function () {
          _symbolFilter = _symbolFilter === sym ? null : sym;
          onFilterChange();
        });
        chips.appendChild(chip);
      });
      chipGroup.appendChild(chipLbl);
      chipGroup.appendChild(chips);
      bar.appendChild(chipGroup);
    }

    // Count
    var filtered = filterEntries(db.timeline || []);
    var count = h('div', {
      className: 'tl-count-badge',
      textContent: filtered.length + ' of ' + (db.timeline || []).length + ' entries'
    });
    bar.appendChild(count);

    el.appendChild(bar);
    return bar;
  }

  /* ── Filter logic ── */
  function filterEntries(entries) {
    return entries.filter(function (e) {
      if (_filter === 'active' && e.status !== 'active') return false;
      if (_filter === 'superseded' && e.status !== 'superseded') return false;
      if (_symbolFilter && e.symbol !== _symbolFilter) return false;
      return true;
    });
  }

  /* ── Evidence chip ── */
  function buildEvChip(type) {
    var map = { fact: 'ev--fact', analysis: 'ev--analysis', assumption: 'ev--assumption', uncertain: 'ev--uncertain' };
    return h('span', { className: 'ev ' + (map[type] || 'ev--fact'), textContent: type || 'fact' });
  }

  /* ── Rating label ── */
  function ratingClass(action) {
    var map = { add: 'add', hold: 'hold', trim: 'trim', avoid: 'avoid' };
    return 'rating ' + (map[action] || 'hold');
  }

  /* ── Status pill ── */
  function statusPill(status) {
    var cls = status === 'active' ? 'pill pos' : status === 'superseded' ? 'pill mute' : 'pill';
    return h('span', { className: cls, textContent: status || 'active' });
  }

  /* ── Supersede chain banner ── */
  function buildSupersedeChain(entry, allEntries) {
    var parts = [];

    // Does this entry supersede another?
    if (entry.supersedesId) {
      var older = allEntries.find(function (e) { return e.id === entry.supersedesId; });
      if (older) {
        parts.push({ label: 'Supersedes:', id: older.id, date: older.dateLabel || older.ts });
      }
    }

    // Is this entry superseded by something newer?
    var supersededBy = allEntries.find(function (e) { return e.supersedesId === entry.id; });
    if (supersededBy) {
      parts.push({ label: 'Superseded by:', id: supersededBy.id, date: supersededBy.dateLabel || supersededBy.ts });
    }

    if (parts.length === 0) return null;

    var chain = h('div', { className: 'tl-supersede-chain' });
    parts.forEach(function (p, i) {
      if (i > 0) {
        chain.appendChild(h('span', { className: 'tl-supersede-arrow', textContent: '·' }));
      }
      chain.appendChild(h('span', { className: 'tl-supersede-label', textContent: p.label }));
      var link = h('button', {
        className: 'tl-supersede-link',
        textContent: p.id + (p.date ? '  (' + p.date + ')' : '')
      });
      link.addEventListener('click', function (ev) {
        ev.stopPropagation();
        // Scroll to and expand the target entry
        _expandedIds[p.id] = true;
        var target = document.querySelector('[data-entry-id="' + p.id + '"]');
        if (target) {
          var card = target.querySelector('.tl-card');
          if (card) { card.classList.add('is-expanded'); card.setAttribute('aria-expanded', 'true'); }
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
      chain.appendChild(link);
    });

    return chain;
  }

  /* ── Entry detail panel ── */
  function buildDetail(entry, allEntries) {
    var detail = h('div', { className: 'tl-detail', role: 'region', 'aria-label': 'Entry detail' });
    var inner = h('div', { className: 'tl-detail-inner' });

    // ── Reason ──
    if (entry.reason) {
      var reasonSec = h('div', { className: 'tl-section-full' });
      reasonSec.appendChild(h('div', {
        className: 'tl-section-label',
        innerHTML: App.icon('quote') + ' Reason'
      }));
      reasonSec.appendChild(h('p', { className: 'tl-reason-text', textContent: entry.reason }));
      inner.appendChild(reasonSec);
    }

    // ── Confidence bar ──
    var confSec = h('div', {});
    confSec.appendChild(h('div', {
      className: 'tl-section-label',
      innerHTML: App.icon('target') + ' Confidence'
    }));
    var confWrap = h('div', { className: 'tl-conf-wrap' });
    var confRow = h('div', { className: 'tl-conf-row' });
    confRow.appendChild(h('span', { className: 'tl-conf-val', textContent: (entry.confidence || 0) + '%' }));
    confRow.appendChild(statusPill(entry.status));
    confWrap.appendChild(confRow);
    var confBar = h('div', { className: 'confbar', role: 'meter',
      'aria-valuenow': String(entry.confidence || 0), 'aria-valuemin': '0', 'aria-valuemax': '100',
      'aria-label': 'Confidence ' + (entry.confidence || 0) + '%'
    });
    confBar.style.setProperty('--conf', String((entry.confidence || 0) / 100));
    confWrap.appendChild(confBar);
    confSec.appendChild(confWrap);
    inner.appendChild(confSec);

    // ── Action badge ──
    var actionSec = h('div', {});
    actionSec.appendChild(h('div', {
      className: 'tl-section-label',
      innerHTML: App.icon('activity') + ' Recommendation'
    }));
    var actionCluster = h('div', { className: 'cluster' });
    actionCluster.appendChild(h('span', {
      className: ratingClass(entry.action),
      textContent: entry.actionLabel || entry.action || '—'
    }));
    if (entry.symbol) {
      var symPill = h('button', { className: 'btn btn-ghost btn-sm' });
      symPill.innerHTML = App.icon('external') + ' ' + entry.symbol;
      symPill.addEventListener('click', function () { App.go('stock', { symbol: entry.symbol }); });
      actionCluster.appendChild(symPill);
    }
    actionSec.appendChild(actionCluster);
    inner.appendChild(actionSec);

    // ── Calculations ──
    if (entry.calculations && entry.calculations.length > 0) {
      var calcSec = h('div', { className: 'tl-section-full' });
      calcSec.appendChild(h('div', {
        className: 'tl-section-label',
        innerHTML: App.icon('coins') + ' Calculations'
      }));
      var calcWrap = h('div', { className: 'tl-calc-wrap' });
      var tbl = h('table', { className: 'tbl', 'aria-label': 'Calculations for ' + (entry.id || '') });
      var thead = h('thead');
      thead.appendChild(h('tr', {}, [
        h('th', { textContent: 'Factor' }),
        h('th', { textContent: 'Value', className: 'num' })
      ]));
      tbl.appendChild(thead);
      var tbody = h('tbody');
      entry.calculations.forEach(function (row) {
        var tr = h('tr');
        tr.appendChild(h('td', { textContent: row.k || '' }));
        tr.appendChild(h('td', { className: 'num', textContent: row.v || '' }));
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      calcWrap.appendChild(tbl);
      calcSec.appendChild(calcWrap);
      inner.appendChild(calcSec);
    }

    // ── Assumptions ──
    if (entry.assumptions && entry.assumptions.length > 0) {
      var assumeSec = h('div', {});
      assumeSec.appendChild(h('div', {
        className: 'tl-section-label',
        innerHTML: App.icon('info') + ' Assumptions'
      }));
      var ul = h('ul', { className: 'tl-assumptions-list', 'aria-label': 'Assumptions' });
      entry.assumptions.forEach(function (a) {
        ul.appendChild(h('li', {}, [
          h('span', { className: 'ev ev--assumption', textContent: 'assumption' }),
          h('span', { textContent: a })
        ]));
      });
      assumeSec.appendChild(ul);
      inner.appendChild(assumeSec);
    }

    // ── What Changed ──
    if (entry.whatChanged && entry.whatChanged.length > 0) {
      var wcSec = h('div', {});
      wcSec.appendChild(h('div', {
        className: 'tl-section-label',
        innerHTML: App.icon('refresh') + ' What Changed'
      }));
      var wcUl = h('ul', { className: 'tl-changed-list', 'aria-label': 'What changed' });
      entry.whatChanged.forEach(function (w) {
        var li = h('li', {}, [
          h('span', { className: 'ic', innerHTML: App.icon('arrow-up') }),
          h('span', { textContent: w })
        ]);
        wcUl.appendChild(li);
      });
      wcSec.appendChild(wcUl);
      inner.appendChild(wcSec);
    }

    // ── Supporting Evidence ──
    if (entry.evidence && entry.evidence.length > 0) {
      var evSec = h('div', { className: 'tl-section-full' });
      evSec.appendChild(h('div', {
        className: 'tl-section-label',
        innerHTML: App.icon('shield') + ' Supporting Evidence'
      }));
      var evList = h('div', { className: 'tl-evidence-list' });
      entry.evidence.forEach(function (ev) {
        var item = h('div', { className: 'tl-evidence-item' });
        item.appendChild(buildEvChip(ev.type));
        var textWrap = h('div', {});
        textWrap.appendChild(h('div', { className: 'tl-evidence-text', textContent: ev.text || '' }));
        if (ev.source) {
          textWrap.appendChild(h('div', { className: 'tl-evidence-source prov', textContent: ev.source }));
        }
        item.appendChild(textWrap);
        evList.appendChild(item);
      });
      evSec.appendChild(evList);
      inner.appendChild(evSec);
    }

    // ── Supersede chain ──
    var chain = buildSupersedeChain(entry, allEntries);
    if (chain) inner.appendChild(chain);

    // ── Actions ──
    var actionsDiv = h('div', { className: 'tl-detail-actions tl-section-full' });
    if (entry.symbol) {
      var viewBtn = h('button', { className: 'btn btn-ghost btn-sm' });
      viewBtn.innerHTML = App.icon('external') + ' View ' + entry.symbol + ' analysis';
      viewBtn.addEventListener('click', function () { App.go('stock', { symbol: entry.symbol }); });
      actionsDiv.appendChild(viewBtn);
    }
    var advisorBtn = h('button', { className: 'btn btn-ghost btn-sm' });
    advisorBtn.innerHTML = App.icon('sparkle') + ' Ask about this recommendation';
    advisorBtn.addEventListener('click', function () { App.go('advisor'); });
    actionsDiv.appendChild(advisorBtn);

    // Rec-note disclaimer
    var recNote = h('p', { className: 'rec-note', textContent: 'Analysis only — AlyInvest never places trades.' });
    actionsDiv.appendChild(recNote);
    inner.appendChild(actionsDiv);

    detail.appendChild(inner);
    return detail;
  }

  /* ── Build a single entry ── */
  function buildEntry(entry, allEntries) {
    var isActive = entry.status === 'active';
    var isSuperseded = entry.status === 'superseded';

    var row = h('div', {
      className: 'tl-entry' + (isActive ? ' is-active' : '') + (isSuperseded ? ' is-superseded' : ''),
      'data-entry-id': entry.id || ''
    });

    // Spine dot
    var dot = h('div', { className: 'tl-dot', 'aria-hidden': 'true' });
    row.appendChild(dot);

    // Card
    var card = h('div', {
      className: 'tl-card' + (_expandedIds[entry.id] ? ' is-expanded' : ''),
      role: 'button',
      tabindex: '0',
      'aria-expanded': String(!!_expandedIds[entry.id]),
      'aria-label': 'Entry: ' + (entry.title || entry.id)
    });

    // Card head
    var head = h('div', { className: 'tl-card-head' });

    var symEl = h('div', { className: 'tl-card-symbol', textContent: entry.symbol || '—' });
    head.appendChild(symEl);

    var titleArea = h('div', { className: 'tl-card-title-area' });
    titleArea.appendChild(h('div', { className: 'tl-card-title', textContent: entry.title || entry.id || '' }));
    var metaRow = h('div', { className: 'tl-card-meta' });
    metaRow.appendChild(h('span', {
      className: 'tl-card-date',
      textContent: entry.dateLabel || (entry.ts ? App.fmt.date(String(entry.ts).slice(0, 10)) : '—')
    }));
    titleArea.appendChild(metaRow);
    head.appendChild(titleArea);

    // Badges: action, confidence, status
    var badges = h('div', { className: 'tl-card-badges' });
    if (entry.action) {
      badges.appendChild(h('span', {
        className: ratingClass(entry.action),
        textContent: entry.actionLabel || entry.action
      }));
    }
    if (entry.confidence != null) {
      badges.appendChild(h('span', { className: 'confpill', textContent: entry.confidence + '%' }));
    }
    badges.appendChild(statusPill(entry.status));
    badges.appendChild(h('span', { className: 'tl-chevron', innerHTML: App.icon('chevron-right'), 'aria-hidden': 'true' }));
    head.appendChild(badges);
    card.appendChild(head);

    // Detail (hidden until expanded)
    var detail = buildDetail(entry, allEntries);
    card.appendChild(detail);

    // Toggle expand
    function toggleExpand() {
      var expanded = card.classList.toggle('is-expanded');
      _expandedIds[entry.id] = expanded;
      card.setAttribute('aria-expanded', String(expanded));
    }

    card.addEventListener('click', toggleExpand);
    card.addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); toggleExpand(); }
    });

    row.appendChild(card);
    return row;
  }

  /* ── Group entries by month ── */
  function groupByMonth(entries) {
    var groups = [];
    var seen = {};
    entries.forEach(function (e) {
      var key = String(e.ts || '').slice(0, 7);
      if (!seen[key]) {
        seen[key] = true;
        var label;
        if (key) {
          var parts = key.split('-');
          var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          label = months[parseInt(parts[1], 10) - 1] + ' ' + parts[0];
        } else {
          label = 'Unknown';
        }
        groups.push({ key: key, label: label, entries: [] });
      }
      groups[groups.length - 1].entries.push(e);
    });
    return groups;
  }

  /* ── Main render ── */
  function render(el) {
    var db = App.db;
    var allEntries = (db.timeline || []).slice(); // newest first

    // Root
    var root = h('div', { className: 'screen screen-timeline' });
    var container = h('div', { className: 'container' });
    root.appendChild(container);

    // ── Header ──
    var header = h('div', { className: 'tl-header', 'data-reveal': '' });

    var eyebrow = h('div', { className: 'tl-header-eyebrow' });
    eyebrow.innerHTML = App.icon('timeline') + '<span class="eyebrow">Investment Timeline</span>';
    header.appendChild(eyebrow);

    var headline = h('h1', { className: 'section-title' });
    headline.style.cssText = 'font-family:var(--aly-serif);margin:0 0 var(--sp-2,0.5rem)';
    headline.textContent = 'Your investing journey';
    header.appendChild(headline);

    var sub = h('p', { className: 'section-sub' });
    sub.textContent = 'An append-only record. Every recommendation, its reasoning, and what prompted it — preserved in full.';
    header.appendChild(sub);

    var note = h('div', { className: 'tl-immutable-note' });
    note.innerHTML = App.icon('lock') + '<span>Nothing is ever deleted or altered. Entries can only be superseded by newer analysis.</span>';
    header.appendChild(note);

    container.appendChild(header);

    // ── Activity chart ──
    buildActivityChart(container, allEntries);

    // ── Controls ── (re-rendered on filter change)
    var controlsAnchor = h('div', {});
    container.appendChild(controlsAnchor);

    var bodyAnchor = h('div', {});
    container.appendChild(bodyAnchor);

    function rebuildBody() {
      // Controls
      controlsAnchor.innerHTML = '';
      buildControls(controlsAnchor, allEntries, rebuildBody);

      var filtered = filterEntries(allEntries);
      bodyAnchor.innerHTML = '';

      if (filtered.length === 0) {
        var empty = h('div', { className: 'empty tl-empty' });
        empty.innerHTML = App.icon('clock') + '<p>No entries match this filter.</p>';
        bodyAnchor.appendChild(empty);
        return;
      }

      var body = h('div', { className: 'tl-body' });
      var groups = groupByMonth(filtered);

      groups.forEach(function (group) {
        var grpEl = h('div', { className: 'tl-group', 'data-reveal': '' });
        grpEl.appendChild(h('div', { className: 'tl-group-label', textContent: group.label }));

        var spine = h('div', { className: 'tl-spine' });
        group.entries.forEach(function (entry) {
          spine.appendChild(buildEntry(entry, allEntries));
        });
        grpEl.appendChild(spine);
        body.appendChild(grpEl);
      });

      bodyAnchor.appendChild(body);
      App.reveal(bodyAnchor);
    }

    rebuildBody();
    el.appendChild(root);
    App.reveal(container);
  }

  /* ── Register ── */
  App.register('timeline', {
    chrome: 'app',
    title: 'Investment Timeline',
    mount: function (el) {
      _filter = 'all';
      _symbolFilter = null;
      _expandedIds = {};
      render(el);
    },
    unmount: function () {
      _filter = 'all';
      _symbolFilter = null;
      _expandedIds = {};
    }
  });

}());


/* ===================== screen: welcome.js ===================== */
/* ==========================================================================
   SCREEN: welcome  (chrome: flow)
   Editorial welcome — serif hero · four pillars · scenario cone · read-only
   reassurance. Registers via App.register("welcome", …).
   ========================================================================== */
(function () {
  "use strict";

  /* ── Pillar definitions ─────────────────────────────────────────────────── */
  var PILLARS = [
    {
      icon: "sparkle",
      title: "Proactive",
      body: "Your advisor monitors your portfolio daily, surfaces what matters, and reaches out only when something material changes — no noise, no spam."
    },
    {
      icon: "brain",
      title: "Remembers everything",
      body: "Goals, risk tolerance, preferred sectors, behavioral patterns — everything learned is stored in your Investment Memory, versioned and always editable by you."
    },
    {
      icon: "activity",
      title: "Grows with you",
      body: "Every recommendation is logged in an append-only Timeline. Nothing is ever deleted — just superseded as your situation evolves and markets move."
    },

      body: "The same instrument yields opposite advice for different investors. Your 35% technology position shapes every analysis — context is everything."
    }
  ];

  /* ── Helpers ────────────────────────────────────────────────────────────── */
  function el(tag, cls, attrs) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        if (k === "html") { node.innerHTML = attrs[k]; }
        else if (k === "text") { node.textContent = attrs[k]; }
        else { node.setAttribute(k, attrs[k]); }
      });
    }
    return node;
  }

  function append(parent) {
    var children = Array.prototype.slice.call(arguments, 1);
    children.forEach(function (c) { if (c) parent.appendChild(c); });
    return parent;
  }

  /* ── Build hero copy column ─────────────────────────────────────────────── */
  function buildCopy() {
    var copy = el("div", "wl-copy");

    /* Eyebrow */
    var eyebrow = el("p", "eyebrow");
    eyebrow.textContent = "Your personal wealth advisor";
    copy.appendChild(eyebrow);

    /* Headline */
    var h1 = el("h1", "wl-headline");
    h1.innerHTML = "Investing, <em class=\"wl-em\">considered.</em>";
    copy.appendChild(h1);

    /* Lede */
    var lede = el("p", "wl-lede");
    lede.innerHTML =
      "AlyInvest sits <b>above the broker you already use</b>, connects read-only, " +
      "remembers everything about your goals and style, and advises like a personal wealth " +
      "manager &mdash; it <b>never places trades, never holds your money.</b>";
    copy.appendChild(lede);

    /* Read-only reassurance pill */
    var reassure = el("span", "wl-reassure");
    reassure.innerHTML =

      "<span><b>Read-only connection</b>&ensp;&middot;&ensp;We advise. You decide. Your broker executes.</span>";

    var ctas = el("div", "wl-cta");

  /* ── Build scenario cone visual card ────────────────────────────────────── */
  function buildVisual() {
    var wrap = el("div", "wl-visual");
    var card = el("div", "card");

    /* Card header */
    var hd = el("div", "card-hd");
    var titleWrap = el("div");
    var cardTitle = el("p", "card-title");
    cardTitle.textContent = "Portfolio scenario";
    var cardSub = el("p", "card-sub");
    cardSub.textContent = "Based on your risk profile · Jun 2026";
    append(titleWrap, cardTitle, cardSub);
    hd.appendChild(titleWrap);
    card.appendChild(hd);

    /* Card body — canvas */
    var bd = el("div", "card-bd");
    var canvasWrap = el("div", "wl-canvas-wrap");
    var cv = document.createElement("canvas");
    canvasWrap.appendChild(cv);
    bd.appendChild(canvasWrap);
    card.appendChild(bd);

    /* Footer — scenario legend + cone-note */
    var ft = el("div", "card-ft");
    var foot = el("div", "wl-scenario-foot");

    var legend = el("div", "wl-legend");
    var defs = [
      { label: "Bear −25%", color: "#E5484D" },
      { label: "Base +6%",   color: "#C8A45A" },
      { label: "Bull +11%",  color: "#29B37A" }
    ];
    defs.forEach(function (d) {
      var leg = el("span", "wl-leg");
      var sw = el("span", "wl-swatch");
      sw.style.background = d.color;
      var lbl = el("span");
      lbl.textContent = d.label;
      append(leg, sw, lbl);
      legend.appendChild(leg);
    });

    var note = el("span", "cone-note");
    note.textContent = "Scenario, not a forecast.";

    append(foot, legend, note);
    ft.appendChild(foot);
    card.appendChild(ft);
    wrap.appendChild(card);

    /* Register the draw function — runs once immediately + on resize */
    App.onResize(function () {
      var s = App.db && App.db.strategy;
      var base, bear, bull;
      if (s && s.scenarios) {
        /* Derive simple cone arrays from strategy scenarios */
        var baseRet  = (s.scenarios.base  && s.scenarios.base.ret)  || 0.06;
        var bearRet  = (s.scenarios.bear  && s.scenarios.bear.ret)  || -0.06;
        var bullRet  = (s.scenarios.bull  && s.scenarios.bull.ret)  || 0.11;
        var start    = (App.db.portfolio && App.db.portfolio.totalValue) || 88700;
        var pts      = 13; /* ~1 yr of monthly points */
        base = []; bear = []; bull = [];
        for (var i = 0; i <= pts; i++) {
          var t = i / pts;
          base.push(start * Math.pow(1 + baseRet, t));
          bear.push(start * Math.pow(1 + bearRet, t));
          bull.push(start * Math.pow(1 + bullRet, t));
        }
      } else {
        /* Graceful fallback if db not populated */
        base = [88700, 91000, 93000, 95000, 94000, 97000, 99000, 101000, 103000, 105000, 107000, 109000, 111000];
        bear = [88700, 86000, 84000, 82000, 80000, 79000, 78000, 77000, 76500, 76000, 75500, 75000, 74300];
        bull = [88700, 92000, 96000, 100000, 104000, 108000, 112000, 115000, 118000, 121000, 124000, 127000, 130000];
      }
      Charts.cone(cv, { base: base, bear: bear, bull: bull }, { color: "#C8A45A", height: 180 });
    });

    return wrap;
  }

  /* ── Build pillars section ──────────────────────────────────────────────── */

    var grid = el("div", "wl-pillars");

      var body = el("p");

      append(card, iconWrap, title, body);
      grid.appendChild(card);

  /* ── Build footer note ──────────────────────────────────────────────────── */
  function buildFooter() {

    foot.innerHTML =
      App.icon("shield") +
      "<span>AlyInvest never executes trades, never holds assets, never moves funds." +

    prov.textContent = "engine.asOf " + asOf;
    foot.appendChild(prov);

    return foot;
  }

  /* ── mount / unmount ────────────────────────────────────────────────────── */
  App.register("welcome", {
    chrome: "flow",
    title: "Welcome to AlyInvest",

    mount: function (el_host) {
      /* Root wrapper */
      var root = el("div", "screen screen-welcome");
      var inner = el("div", "wl-inner");

      /* Brand line */
      var brand = el("div", "wl-brand");
      var mark = el("div", "wl-mark");
      mark.textContent = "A";
      var wordmark = el("div", "wl-wordmark");
      wordmark.innerHTML = "Aly<span class=\"wl-ai\">Invest</span>";
      append(brand, mark, wordmark);

      /* Hero two-column: copy | visual */
      var hero = el("div", "wl-hero");
      hero.setAttribute("data-reveal", "");
      var copy = buildCopy();
      var visual = buildVisual();
      append(hero, copy, visual);

      /* Pillars */
      var pillars = buildPillars();

      /* Footer */
      var footer = buildFooter();

      append(inner, brand, hero, pillars, footer);
      root.appendChild(inner);
      el_host.appendChild(root);

      /* Kick entrance animation */
      App.reveal(root);
    },

    unmount: function () {
      /* App.onResize handlers are auto-cleared by the router on unmount — nothing extra needed */
    }
  });

}());


/* ===================== screen: whatchanged.js ===================== */
(function () {
  'use strict';

  var DIM_ICON = {
    concentration:   'layers',
    diversification: 'activity',
    confidence:      'brain',
    valuation:       'scale',
    health:          'health',
    earnings:        'calendar',
    risk:            'target',
    news:            'quote',
    holdings:        'portfolio'
  };

  var DIR_ICON = { up: 'arrow-up', down: 'arrow-down', flat: 'dot' };

  var _showQuiet = false; // reviewer preview toggle

  function make(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  function diffCard(d) {
    var isNotify = d.materiality === 'notify';
    var card = make('div', 'wc-diff-card ' + (isNotify ? 'is-notify' : 'is-surface'));

    var icon = make('div', 'wc-diff-icon', App.icon(DIM_ICON[d.dimension] || 'info'));
    card.appendChild(icon);

    var main = make('div', 'wc-diff-main');
    main.appendChild(make('div', 'wc-diff-dim', d.label || d.dimension));
    var vals = make('div', 'wc-diff-values');
    vals.appendChild(make('span', 'wc-diff-from', d.from));
    vals.appendChild(make('span', 'wc-diff-arrow', App.icon('chevron-right')));
    vals.appendChild(make('span', 'wc-diff-to ' + (d.direction || 'flat'), d.to));
    main.appendChild(vals);
    card.appendChild(main);

    card.appendChild(make('div', 'wc-diff-why', d.why || ''));

    var aside = make('div', 'wc-diff-aside');
    aside.appendChild(make('span', 'wc-mat-badge ' + (isNotify ? 'notify' : 'surface'),
      isNotify ? 'Notify' : 'Surface'));
    if (d.relatedRecId) {
      var link = make('a', 'wc-diff-link', 'View recommendation ' + App.icon('chevron-right'));
      link.setAttribute('role', 'link');
      link.setAttribute('tabindex', '0');
      var go = function () { App.go('timeline'); };
      link.addEventListener('click', go);
      link.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); }
      });
      aside.appendChild(link);
    }
    card.appendChild(aside);

    return card;
  }

  function tier(label, diffs) {
    if (!diffs.length) return null;
    var t = make('div', 'wc-tier');
    var hd = make('div', 'wc-tier-header');
    hd.appendChild(make('span', 'wc-tier-label', label));
    hd.appendChild(make('span', 'wc-tier-rule'));
    t.appendChild(hd);
    var list = make('div', 'wc-diff-list');
    diffs.forEach(function (d) { list.appendChild(diffCard(d)); });
    t.appendChild(list);
    return t;
  }

  function quietState(wc) {
    var q = make('div', 'wc-quiet');
    q.setAttribute('data-reveal', '');
    q.appendChild(make('div', 'wc-quiet-icon', App.icon('wave')));
    q.appendChild(make('div', 'wc-quiet-title', 'A quiet day — nothing material changed'));
    q.appendChild(make('div', 'wc-quiet-sub',
      'Your portfolio moved with the market, but no dimension crossed a threshold worth ' +
      'your attention. We stayed quiet on purpose. This is how most days should feel.'));
    var meta = make('div', 'wc-quiet-meta');
    var s1 = make('div', 'wc-quiet-stat');
    s1.appendChild(make('div', 'wc-quiet-stat-val', '0'));
    s1.appendChild(make('div', 'wc-quiet-stat-lbl', 'Notify-level changes'));
    var div = make('div', 'wc-quiet-divider');
    var s2 = make('div', 'wc-quiet-stat');
    s2.appendChild(make('div', 'wc-quiet-stat-val', '9'));
    s2.appendChild(make('div', 'wc-quiet-stat-lbl', 'Dimensions checked'));
    meta.appendChild(s1); meta.appendChild(div); meta.appendChild(s2);
    q.appendChild(meta);
    return q;
  }

  function render(el) {
    el.innerHTML = '';
    var wc = (App.db && App.db.whatChanged) || { diffs: [] };
    var root = make('div', 'screen screen-whatchanged container');

    // Header
    var header = make('div', 'wc-header');
    header.setAttribute('data-reveal', '');
    header.appendChild(make('div', 'eyebrow', 'What Changed'));
    var dateRow = make('div', 'wc-date-row');
    var dates = make('div', 'wc-dates');
    dates.appendChild(make('span', null, wc.prevLabel || 'Yesterday'));
    dates.appendChild(make('span', 'wc-sep', App.icon('chevron-right')));
    dates.appendChild(make('span', null, wc.dateLabel || 'Today'));
    dateRow.appendChild(dates);
    header.appendChild(dateRow);
    header.appendChild(make('div', 'wc-summary-line',
      'A comparison of your portfolio yesterday versus today. We separate changes worth ' +
      'interrupting you for from changes we simply surface. Every change explains why it matters.'));
    root.appendChild(header);

    // Reviewer preview toggle (quiet-day)
    var pt = make('div', 'wc-preview-toggle');
    pt.setAttribute('data-reveal', '');
    pt.appendChild(make('span', 'wc-toggle-label',
      _showQuiet ? 'Showing an example quiet day' : 'Preview a quiet day'));
    var toggle = make('button', 'toggle' + (_showQuiet ? ' is-on' : ''));
    toggle.setAttribute('role', 'switch');
    toggle.setAttribute('aria-checked', _showQuiet ? 'true' : 'false');
    toggle.setAttribute('aria-label', 'Preview a quiet day');
    toggle.addEventListener('click', function () { _showQuiet = !_showQuiet; render(el); });
    pt.appendChild(toggle);
    root.appendChild(pt);

    if (_showQuiet || wc.quietDay) {
      root.appendChild(quietState(wc));
      el.appendChild(root);
      App.reveal(el);
      return;
    }

    // Legend
    var legend = make('div', 'wc-legend');
    legend.setAttribute('data-reveal', '');
    var li1 = make('div', 'wc-legend-item');
    li1.appendChild(make('span', 'wc-legend-dot notify'));
    li1.appendChild(make('span', null, '<b>Notify</b> — material enough to reach out'));
    var li2 = make('div', 'wc-legend-item');
    li2.appendChild(make('span', 'wc-legend-dot surface'));
    li2.appendChild(make('span', null, '<b>Surface</b> — shown here, but we stay quiet'));
    legend.appendChild(li1);
    legend.appendChild(li2);
    legend.appendChild(make('div', 'wc-legend-note',
      'Notify is a strict subset of Surface. A change must clear a wider band to appear at all, ' +
      'and a narrower band to interrupt you.'));
    root.appendChild(legend);

    // Tiers
    var diffs = wc.diffs || [];
    var notify = diffs.filter(function (d) { return d.materiality === 'notify'; });
    var surface = diffs.filter(function (d) { return d.materiality !== 'notify'; });

    var listWrap = make('div', null);
    listWrap.setAttribute('data-reveal', '');
    var tN = tier('Worth your attention', notify);
    var tS = tier('Surfaced, no action needed', surface);
    if (tN) listWrap.appendChild(tN);
    if (tS) listWrap.appendChild(tS);
    root.appendChild(listWrap);

    // Price-only note
    var note = make('div', 'wc-price-note');
    note.setAttribute('data-reveal', '');
    note.innerHTML = App.icon('info') +
      '<span>Price-only moves never reach the notify tier on their own. A falling or rising ' +
      'quote is not, by itself, a reason to change your plan — only a change in what the ' +
      'numbers <i>mean</i> is.</span>';
    root.appendChild(note);

    el.appendChild(root);
    App.reveal(el);
  }

  App.register('whatchanged', {
    chrome: 'app',
    title: 'What Changed',
    mount: function (el) { _showQuiet = false; render(el); },
    unmount: function () {}
  });
}());


document.addEventListener("DOMContentLoaded",function(){App.boot();});
</script>
