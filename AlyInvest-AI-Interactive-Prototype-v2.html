  padding: var(--sp-2, 0.75rem);
  border-radius: var(--rad-md, 0.5rem);
  border: 1px solid var(--aly-line);
  background: var(--aly-panel);
}

.screen-stock .scenario-label {
  font-size: 0.6875rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--aly-mute);
  margin-bottom: 0.25rem;
}

.screen-stock .scenario-ret {
  font-family: var(--aly-mono);
  font-size: 1.0625rem;
  font-weight: 500;
}

.screen-stock .scenario-ret.pos { color: var(--aly-pos); }
.screen-stock .scenario-ret.neg { color: var(--aly-neg); }
.screen-stock .scenario-ret.flat { color: var(--aly-gold); }

.screen-stock .scenario-prob {
  font-family: var(--aly-mono);
  font-size: 0.75rem;
  color: var(--aly-mute);
  margin-top: 0.25rem;
}

.screen-stock .scenario-price {
  font-family: var(--aly-mono);
  font-size: 0.75rem;
  color: var(--aly-dim);
  margin-top: 0.125rem;
}

/* ── Timeline for this symbol ────────────────────────────── */
.screen-stock .rec-timeline-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.screen-stock .rec-tl-item {
  display: flex;
  gap: var(--sp-3, 1rem);
  padding: var(--sp-3, 1rem) 0;
  border-bottom: 1px solid var(--aly-line);
  cursor: pointer;
  transition: background 0.12s;
}

.screen-stock .rec-tl-item:last-child {
  border-bottom: none;
}

.screen-stock .rec-tl-item:hover {
  background: var(--aly-panel-2);
  margin-inline: calc(-1 * var(--sp-3, 1rem));
  padding-inline: var(--sp-3, 1rem);
  border-radius: var(--rad-sm, 0.375rem);
}

.screen-stock .rec-tl-dot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  padding-top: 0.3125rem;
}

.screen-stock .rec-tl-dot-circle {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--aly-gold);
  border: 2px solid var(--aly-panel);
  outline: 1px solid var(--aly-gold);
  flex-shrink: 0;
}

.screen-stock .rec-tl-dot-circle.superseded {
  background: transparent;
  outline-color: var(--aly-mute);
}

.screen-stock .rec-tl-line {
  flex: 1 1 auto;
  width: 1px;
  background: var(--aly-line);
  margin-top: 2px;
}

.screen-stock .rec-tl-content {
  flex: 1 1 auto;
  min-width: 0;
}

.screen-stock .rec-tl-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 0.3125rem;
}

.screen-stock .rec-tl-date {
  font-size: 0.75rem;
  color: var(--aly-mute);
  font-family: var(--aly-mono);
}

.screen-stock .rec-tl-title {
  font-size: 0.875rem;
  color: var(--aly-text);
  margin-bottom: 0.25rem;
}

.screen-stock .rec-tl-supersede {
  font-size: 0.75rem;
  color: var(--aly-mute);
  font-style: italic;
}

/* ── Explain accordion ───────────────────────────────────── */
.screen-stock .explain-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.screen-stock .explain-item {
  border-bottom: 1px solid var(--aly-line);
}

.screen-stock .explain-item:last-child {
  border-bottom: none;
}

.screen-stock .explain-trigger {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: var(--sp-3, 1rem) 0;
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  transition: color 0.12s;
}

.screen-stock .explain-trigger:hover .explain-text-preview {
  color: var(--aly-text);
}

.screen-stock .explain-text-preview {
  flex: 1 1 auto;
  font-size: 0.875rem;
  color: var(--aly-dim);
  line-height: 1.55;
  transition: color 0.12s;
}

.screen-stock .explain-chevron {
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  color: var(--aly-mute);
  transition: transform 0.2s;
  margin-top: 0.125rem;
}

.screen-stock .explain-item.is-open .explain-chevron {
  transform: rotate(180deg);
}

.screen-stock .explain-body {
  display: none;
  padding: 0 0 var(--sp-3, 1rem) calc(0.75rem + 1.5rem + 0.75rem);
}

.screen-stock .explain-item.is-open .explain-body {
  display: block;
}

.screen-stock .explain-body-text {
  font-size: 0.875rem;
  color: var(--aly-dim);
  line-height: 1.7;
}

/* ── Empty state ─────────────────────────────────────────── */
.screen-stock .stock-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 40vh;
  text-align: center;
  gap: var(--sp-3, 1rem);
}

.screen-stock .stock-empty-icon {
  font-size: 2.5rem;
  opacity: 0.35;
}

.screen-stock .stock-empty-title {
  font-family: var(--aly-serif);
  font-size: 1.25rem;
  color: var(--aly-dim);
}

.screen-stock .stock-empty-sub {
  font-size: 0.875rem;
  color: var(--aly-mute);
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 1080px) {
  .screen-stock .stock-body {
    grid-template-columns: 1fr 320px;
    gap: var(--sp-4, 1.5rem);
  }
}

@media (max-width: 900px) {
  .screen-stock .stock-body {
    grid-template-columns: 1fr;
  }

  .screen-stock .stock-aside {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--sp-4, 1.5rem);
  }
}

@media (max-width: 760px) {
  .screen-stock .stock-aside {
    grid-template-columns: 1fr;
  }

  .screen-stock .stock-scores {
    grid-template-columns: 1fr;
  }

  .screen-stock .fin-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .screen-stock .stock-name {
    font-size: 1.375rem;
  }

  .screen-stock .stock-price {
    font-size: 1.75rem;
  }
}

@media (max-width: 560px) {
  .screen-stock .rec-ring-row {
    flex-direction: column;
  }

  .screen-stock .stock-header {
    flex-direction: column;
    gap: var(--sp-3, 1rem);
  }

  .screen-stock .stock-price-block {
    text-align: left;
  }

  .screen-stock .stock-day-change {
    justify-content: flex-start;
  }

  .screen-stock .fin-grid {
    grid-template-columns: 1fr 1fr;
  }

  .screen-stock .scenarios-prob-row {
    grid-template-columns: 1fr;
  }
}


/* ===================== screen: timeline.css ===================== */
/* =========================================================
   TIMELINE SCREEN — .screen-timeline
   All selectors scoped here. Tokens/components from shell.
   ========================================================= */

/* ── Root layout ── */
.screen-timeline {
  min-height: 100%;
  padding-bottom: var(--sp-10, 5rem);
}

.screen-timeline .tl-header {
  padding: var(--sp-8, 3rem) 0 var(--sp-6, 2rem);
  border-bottom: 1px solid var(--aly-line);
}

.screen-timeline .tl-header-eyebrow {
  display: flex;
  align-items: center;
  gap: var(--sp-2, 0.5rem);
  margin-bottom: var(--sp-3, 0.75rem);
}

.screen-timeline .tl-header-eyebrow .ic {
  width: 1.1em;
  height: 1.1em;
  color: var(--aly-gold);
  opacity: 0.85;
}

.screen-timeline .tl-immutable-note {
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-mute);
  letter-spacing: 0.04em;
  font-family: var(--aly-mono);
  display: flex;
  align-items: center;
  gap: var(--sp-2, 0.5rem);
  margin-top: var(--sp-2, 0.5rem);
}

.screen-timeline .tl-immutable-note .lock-ic {
  width: 0.85em;
  height: 0.85em;
  opacity: 0.6;
  flex-shrink: 0;
}

/* ── Activity chart strip ── */
.screen-timeline .tl-activity {
  margin: var(--sp-5, 1.5rem) 0 0;
}

.screen-timeline .tl-activity-label {
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-mute);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: var(--sp-2, 0.5rem);
  font-family: var(--aly-sans);
}

.screen-timeline .tl-activity canvas {
  display: block;
  width: 100%;
  border-radius: var(--radius-sm, 4px);
}

/* ── Controls bar ── */
.screen-timeline .tl-controls {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-4, 1rem);
  padding: var(--sp-5, 1.5rem) 0 var(--sp-4, 1rem);
  flex-wrap: wrap;
}

.screen-timeline .tl-filter-group {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2, 0.5rem);
}

.screen-timeline .tl-filter-label {
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-mute);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-family: var(--aly-sans);
}

.screen-timeline .tl-symbol-chips {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2, 0.5rem);
  align-items: center;
}

.screen-timeline .tl-count-badge {
  font-family: var(--aly-mono);
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-dim);
  margin-left: auto;
  padding: 0 var(--sp-2, 0.5rem);
  align-self: center;
}

/* ── Body layout ── */
.screen-timeline .tl-body {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-6, 2rem);
  margin-top: var(--sp-2, 0.5rem);
}

/* ── Date group ── */
.screen-timeline .tl-group {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1, 0.25rem);
}

.screen-timeline .tl-group-label {
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-mute);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--aly-sans);
  padding: var(--sp-3, 0.75rem) 0 var(--sp-2, 0.5rem);
  display: flex;
  align-items: center;
  gap: var(--sp-3, 0.75rem);
}

.screen-timeline .tl-group-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--aly-line);
}

/* ── Timeline spine ── */
.screen-timeline .tl-spine {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
}

/* Vertical connecting line */
.screen-timeline .tl-spine::before {
  content: '';
  position: absolute;
  left: 1.25rem;
  top: 2rem;
  bottom: 2rem;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--aly-line) 10%, var(--aly-line) 90%, transparent);
  pointer-events: none;
}

/* ── Entry row ── */
.screen-timeline .tl-entry {
  position: relative;
  padding-left: 3.25rem;
  padding-bottom: var(--sp-3, 0.75rem);
}

.screen-timeline .tl-entry:last-child {
  padding-bottom: 0;
}

/* Spine dot */
.screen-timeline .tl-dot {
  position: absolute;
  left: calc(1.25rem - 0.35rem);
  top: 1.15rem;
  width: 0.7rem;
  height: 0.7rem;
  border-radius: 50%;
  background: var(--aly-panel-2, #1a1e26);
  border: 1.5px solid var(--aly-line);
  transition: border-color 0.2s, background 0.2s;
  z-index: 1;
}

.screen-timeline .tl-entry.is-active .tl-dot {
  background: var(--aly-gold);
  border-color: var(--aly-gold);
  box-shadow: 0 0 0 3px rgba(200,164,90,0.15);
}

.screen-timeline .tl-entry.is-superseded .tl-dot {
  background: var(--aly-line);
  border-color: var(--aly-mute);
}

/* ── Entry card ── */
.screen-timeline .tl-card {
  cursor: pointer;
  border: 1px solid var(--aly-line);
  border-radius: var(--radius, 8px);
  background: var(--aly-panel);
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow: hidden;
}

.screen-timeline .tl-card:hover {
  border-color: rgba(200,164,90,0.35);
  box-shadow: 0 2px 16px rgba(0,0,0,0.18);
}

.screen-timeline .tl-card:focus-visible {
  outline: 2px solid var(--aly-gold);
  outline-offset: 2px;
}

.screen-timeline .tl-entry.is-superseded .tl-card {
  opacity: 0.65;
}

.screen-timeline .tl-entry.is-superseded .tl-card:hover {
  opacity: 1;
}

/* ── Card collapsed head ── */
.screen-timeline .tl-card-head {
  display: flex;
  align-items: center;
  gap: var(--sp-3, 0.75rem);
  padding: var(--sp-4, 1rem) var(--sp-5, 1.5rem);
  min-height: 3.75rem;
  user-select: none;
}

.screen-timeline .tl-card-symbol {
  font-family: var(--aly-mono);
  font-size: var(--text-sm, 0.875rem);
  font-weight: 600;
  color: var(--aly-text);
  background: var(--aly-panel-2, #1a1e26);
  border: 1px solid var(--aly-line);
  border-radius: var(--radius-sm, 4px);
  padding: 0.15em 0.55em;
  min-width: 3.25rem;
  text-align: center;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}

.screen-timeline .tl-card-title-area {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.screen-timeline .tl-card-title {
  font-family: var(--aly-serif);
  font-size: var(--text-base, 1rem);
  color: var(--aly-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.screen-timeline .tl-card-meta {
  display: flex;
  align-items: center;
  gap: var(--sp-2, 0.5rem);
  flex-wrap: wrap;
}

.screen-timeline .tl-card-date {
  font-family: var(--aly-mono);
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-mute);
}

.screen-timeline .tl-card-badges {
  display: flex;
  align-items: center;
  gap: var(--sp-2, 0.5rem);
  flex-shrink: 0;
  margin-left: auto;
}

.screen-timeline .tl-chevron {
  color: var(--aly-mute);
  transition: transform 0.25s var(--aly-ease, cubic-bezier(0.4,0,0.2,1));
  flex-shrink: 0;
  width: 1.1em;
  height: 1.1em;
}

.screen-timeline .tl-card.is-expanded .tl-chevron {
  transform: rotate(90deg);
}

/* ── Card expanded detail ── */
.screen-timeline .tl-detail {
  display: none;
  border-top: 1px solid var(--aly-line);
  background: var(--aly-ground);
}

.screen-timeline .tl-card.is-expanded .tl-detail {
  display: block;
  animation: tl-detail-in 0.22s var(--aly-ease, cubic-bezier(0.4,0,0.2,1)) both;
}

@keyframes tl-detail-in {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .screen-timeline .tl-card.is-expanded .tl-detail {
    animation: none;
  }
}

.screen-timeline .tl-detail-inner {
  padding: var(--sp-5, 1.5rem) var(--sp-5, 1.5rem) var(--sp-6, 2rem);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-5, 1.5rem) var(--sp-6, 2rem);
}

/* Full-width sections */
.screen-timeline .tl-section-full {
  grid-column: 1 / -1;
}

.screen-timeline .tl-section-label {
  font-size: var(--text-xs, 0.75rem);
  font-family: var(--aly-sans);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--aly-mute);
  margin-bottom: var(--sp-2, 0.5rem);
  display: flex;
  align-items: center;
  gap: var(--sp-2, 0.5rem);
}

.screen-timeline .tl-section-label .ic {
  width: 0.9em;
  height: 0.9em;
  color: var(--aly-gold);
  opacity: 0.7;
}

.screen-timeline .tl-reason-text {
  font-family: var(--aly-serif);
  font-size: var(--text-base, 1rem);
  color: var(--aly-text);
  line-height: 1.65;
  max-width: 72ch;
}

/* Confidence bar section */
.screen-timeline .tl-conf-wrap {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2, 0.5rem);
}

.screen-timeline .tl-conf-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-3, 0.75rem);
}

.screen-timeline .tl-conf-val {
  font-family: var(--aly-mono);
  font-size: var(--text-sm, 0.875rem);
  color: var(--aly-text);
  font-variant-numeric: tabular-nums;
}

/* Assumptions list */
.screen-timeline .tl-assumptions-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: var(--sp-2, 0.5rem);
}

.screen-timeline .tl-assumptions-list li {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-2, 0.5rem);
  font-size: var(--text-sm, 0.875rem);
  color: var(--aly-dim);
  line-height: 1.5;
}

.screen-timeline .tl-assumptions-list li::before {
  content: '–';
  color: var(--aly-mute);
  flex-shrink: 0;
  line-height: 1.5;
}

/* What Changed list */
.screen-timeline .tl-changed-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: var(--sp-2, 0.5rem);
}

.screen-timeline .tl-changed-list li {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-2, 0.5rem);
  font-size: var(--text-sm, 0.875rem);
  color: var(--aly-dim);
  line-height: 1.5;
}

.screen-timeline .tl-changed-list li .ic {
  width: 0.9em;
  height: 0.9em;
  color: var(--aly-warn);
  opacity: 0.8;
  flex-shrink: 0;
  margin-top: 0.2em;
}

/* Evidence section */
.screen-timeline .tl-evidence-list {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3, 0.75rem);
}

.screen-timeline .tl-evidence-item {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3, 0.75rem);
}

.screen-timeline .tl-evidence-text {
  font-size: var(--text-sm, 0.875rem);
  color: var(--aly-dim);
  line-height: 1.5;
  flex: 1;
}

.screen-timeline .tl-evidence-source {
  font-family: var(--aly-mono);
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-mute);
  margin-top: 0.2em;
}

/* ── Supersede chain ── */
.screen-timeline .tl-supersede-chain {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: var(--sp-3, 0.75rem);
  flex-wrap: wrap;
  padding: var(--sp-3, 0.75rem) var(--sp-4, 1rem);
  background: rgba(200,164,90,0.05);
  border: 1px solid rgba(200,164,90,0.2);
  border-radius: var(--radius-sm, 4px);
}

.screen-timeline .tl-supersede-label {
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-mute);
  letter-spacing: 0.04em;
  font-family: var(--aly-sans);
}

.screen-timeline .tl-supersede-link {
  font-family: var(--aly-mono);
  font-size: var(--text-xs, 0.75rem);
  color: var(--aly-gold);
  text-decoration: none;
  border-bottom: 1px solid rgba(200,164,90,0.3);
  cursor: pointer;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  padding: 0;
  transition: color 0.15s, border-color 0.15s;
}

.screen-timeline .tl-supersede-link:hover {
  color: var(--aly-text);
  border-bottom-color: var(--aly-mute);
}

.screen-timeline .tl-supersede-arrow {
  color: var(--aly-mute);
  font-size: var(--text-xs, 0.75rem);
  font-family: var(--aly-mono);
  opacity: 0.6;
}

/* ── Detail navigation (to stock page) ── */
.screen-timeline .tl-detail-actions {
  grid-column: 1 / -1;
  display: flex;
  gap: var(--sp-3, 0.75rem);
  flex-wrap: wrap;
  padding-top: var(--sp-3, 0.75rem);
  border-top: 1px solid var(--aly-line);
  margin-top: var(--sp-2, 0.5rem);
}

/* ── Empty state ── */
.screen-timeline .tl-empty {
  text-align: center;
  padding: var(--sp-12, 6rem) var(--sp-6, 2rem);
}

/* ── Responsive ── */
@media (max-width: 860px) {
  .screen-timeline .tl-detail-inner {
    grid-template-columns: 1fr;
  }

  .screen-timeline .tl-section-full {
    grid-column: 1;
  }

  .screen-timeline .tl-supersede-chain {
    grid-column: 1;
  }

  .screen-timeline .tl-detail-actions {
    grid-column: 1;
  }
}

@media (max-width: 560px) {
  .screen-timeline .tl-card-head {
    padding: var(--sp-3, 0.75rem) var(--sp-4, 1rem);
    gap: var(--sp-2, 0.5rem);
  }

  .screen-timeline .tl-card-title {
    font-size: var(--text-sm, 0.875rem);
  }

  .screen-timeline .tl-card-badges {

/* ===================== screen: welcome.css ===================== */
/* =========================================================================
   SCREEN: welcome  (chrome: flow)  — v2 final
   Editorial welcome — serif hero, four pillars, scenario cone, read-only reassurance.
   Layout-only; scoped under .screen-welcome. Reuses shared components/tokens.
   ========================================================================= */

.screen-welcome{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:var(--s-7) var(--s-5) var(--s-6);
  /* a whisper of gold at the top-right, a cool wash bottom-left — matches the app ground */
  background:
    radial-gradient(1200px 680px at 88% -12%, rgba(200,164,90,.06), transparent 58%),
    radial-gradient(900px 560px at 4% 112%, rgba(76,141,255,.04), transparent 52%);
}

/* Defensive reveal binding: the kernel adds `.is-in`; ensure our cards animate
   in even where the shell keys its keyframe off a different class. Never leaves
   content hidden if JS/observer is unavailable. */
.screen-welcome [data-reveal].is-in{animation:reveal-in var(--dur-base) var(--aly-ease) both}

.screen-welcome .wl-inner{
  width:100%;
  max-width:1080px;
  margin:0 auto;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:var(--s-7);
}

/* ---- Brand line -------------------------------------------------------- */
.screen-welcome .wl-brand{
  display:flex;align-items:center;gap:var(--s-3);
}
.screen-welcome .wl-mark{
  width:34px;height:34px;flex:none;border-radius:var(--r-sm);
  display:grid;place-items:center;
  font-family:var(--aly-serif);font-weight:600;font-size:20px;line-height:1;
  color:var(--aly-ground);
  background:linear-gradient(150deg,#e6c986,var(--aly-gold) 72%);
  box-shadow:var(--e-1);
}
.screen-welcome .wl-wordmark{
  font-family:var(--aly-serif);font-size:var(--fs-h2);font-weight:600;letter-spacing:.01em;
}
.screen-welcome .wl-wordmark .wl-ai{color:var(--aly-gold)}

/* ---- Hero split (copy + scenario visual) ------------------------------- */
.screen-welcome .wl-hero{
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(0,.85fr);
  gap:var(--s-7);
  align-items:center;
}
.screen-welcome .wl-copy{display:flex;flex-direction:column;gap:var(--s-4);max-width:36ch}

.screen-welcome .wl-headline{
  font-family:var(--aly-serif);font-weight:600;
  font-size:clamp(34px,5.2vw,52px);
  line-height:1.05;letter-spacing:-.015em;
  text-wrap:balance;
}
.screen-welcome .wl-headline .wl-em{color:var(--aly-gold);font-style:italic;font-weight:600}

.screen-welcome .wl-lede{
  font-size:var(--fs-body);line-height:1.6;color:var(--aly-dim);max-width:52ch;
}
.screen-welcome .wl-lede b{color:var(--aly-text);font-weight:600}

/* Read-only / no-custody reassurance line */
.screen-welcome .wl-reassure{
  display:inline-flex;align-items:center;gap:var(--s-2);
  align-self:flex-start;
  padding:var(--s-2) var(--s-3);
  border:1px solid var(--aly-line);border-radius:var(--r-full);
  background:var(--aly-panel-2);
  color:var(--aly-dim);font-size:var(--fs-cap);line-height:1.3;
}
.screen-welcome .wl-reassure .ic{color:var(--aly-gold);font-size:15px}
.screen-welcome .wl-reassure b{color:var(--aly-text);font-weight:600}

/* CTAs */
.screen-welcome .wl-cta{display:flex;flex-wrap:wrap;gap:var(--s-3);margin-top:var(--s-2)}
.screen-welcome .wl-cta .btn{min-width:190px;justify-content:center}
.screen-welcome .wl-cta .btn-primary .ic{font-size:16px}

/* ---- Scenario visual (decorative cone) --------------------------------- */
.screen-welcome .wl-visual{position:relative;min-width:0}
.screen-welcome .wl-visual .card{overflow:hidden}
.screen-welcome .wl-visual .card-hd{align-items:center}
.screen-welcome .wl-canvas-wrap{
  position:relative;width:100%;
}
.screen-welcome .wl-canvas-wrap canvas{display:block;width:100%}
.screen-welcome .wl-scenario-foot{
  display:flex;align-items:center;justify-content:space-between;gap:var(--s-3);
  flex-wrap:wrap;
}
/* small legend dots for bear/base/bull */
.screen-welcome .wl-legend{display:flex;gap:var(--s-4);flex-wrap:wrap}
.screen-welcome .wl-legend .wl-leg{
  display:inline-flex;align-items:center;gap:6px;
  font-size:var(--fs-micro);line-height:1;color:var(--aly-dim);
  font-family:var(--aly-mono);letter-spacing:.02em;
}
.screen-welcome .wl-legend .wl-swatch{width:8px;height:8px;border-radius:2px;flex:none}

/* ---- Pillars ----------------------------------------------------------- */
.screen-welcome .wl-pillars-hd{margin-bottom:var(--s-2)}
.screen-welcome .wl-pillars{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:var(--s-4);
}
.screen-welcome .wl-pillar{
  display:flex;flex-direction:column;gap:var(--s-3);
  padding:var(--s-5);
  transition:border-color var(--dur-fast) var(--aly-ease),
             transform var(--dur-fast) var(--aly-ease),
             box-shadow var(--dur-fast) var(--aly-ease);
}
.screen-welcome .wl-pillar:hover{
  border-color:var(--aly-line-strong);
  transform:translateY(-2px);
  box-shadow:var(--e-2);
}
.screen-welcome .wl-picon{
  width:38px;height:38px;flex:none;border-radius:var(--r-sm);
  display:grid;place-items:center;
  color:var(--aly-gold);
  background:var(--aly-gold-soft);
  border:1px solid var(--aly-gold-line, var(--aly-line));
}
.screen-welcome .wl-picon .ic{font-size:20px}
.screen-welcome .wl-pillar h3{
  font-family:var(--aly-serif);font-size:var(--fs-h2);line-height:var(--lh-h2);font-weight:600;
}
.screen-welcome .wl-pillar p{
  font-size:var(--fs-cap);line-height:1.55;color:var(--aly-dim);margin:0;
}

/* ---- Footer note ------------------------------------------------------- */
.screen-welcome .wl-foot{
  display:flex;align-items:center;justify-content:center;gap:var(--s-2);
  text-align:center;
  color:var(--aly-mute);font-size:var(--fs-cap);line-height:1.4;
}
.screen-welcome .wl-foot .ic{font-size:15px;color:var(--aly-dim)}
.screen-welcome .wl-foot .wl-prov{
  font-family:var(--aly-mono);letter-spacing:.01em;color:var(--aly-mute);
}

/* =========================================================================
   RESPONSIVE
   ========================================================================= */
@media (max-width:1080px){
  .screen-welcome .wl-pillars{grid-template-columns:repeat(2,minmax(0,1fr));}
}
@media (max-width:900px){
  .screen-welcome{padding:var(--s-6) var(--s-4);}
  .screen-welcome .wl-inner{gap:var(--s-6)}
  .screen-welcome .wl-hero{grid-template-columns:1fr;gap:var(--s-5)}
  .screen-welcome .wl-copy{max-width:none}
  /* Put the copy first, scenario below on stacked layouts */
  .screen-welcome .wl-visual{order:2}
  .screen-welcome .wl-copy{order:1}
}
@media (max-width:560px){
  .screen-welcome{padding:var(--s-5) var(--s-4) var(--s-5);}
  .screen-welcome .wl-pillars{grid-template-columns:1fr;gap:var(--s-3)}
  .screen-welcome .wl-cta{flex-direction:column;align-items:stretch}
  .screen-welcome .wl-cta .btn{width:100%;min-width:0}
  .screen-welcome .wl-headline{font-size:clamp(30px,9vw,40px)}
}

<script>
/* ============================================================================
   AlyInvest AI — Interactive Prototype v2
   KERNEL + MOCK DATA ENGINE  (F2)

   Contains, in order:
     (a) window.App        — hash router, chrome toggling, helpers, state
     (b) mulberry32 PRNG   — seeded deterministic price-series generator
     (c) window.Charts     — canvas, DPR-aware, reduced-motion-honoring drawing
     (d) App.db            — rich, internally-consistent mock data for the persona
     (e) buildData()       — aggregation so totals/weights reconcile from holdings

   Persona: Aly Coulibaly, 31, UAE, USD, Intermediate.
   As-of: Jun 30 2026 · 6:05 PM GST. Portfolio ~$89K. Technology ~35% (the
   recurring concentration story). Engine owns numbers; the Advisor narrates.
   Read-only, no custody: never a Buy/Sell/Trade/Rebalance/Execute anywhere.
   ========================================================================== */
(function () {
  "use strict";

  /* --------------------------------------------------------------------------
     0. Small utilities
     ------------------------------------------------------------------------ */
  var doc = document;
  function $(sel, root) { return (root || doc).querySelector(sel); }
  function prefersReducedMotion() {
    try {
      return window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    } catch (e) { return false; }
  }
  function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
  function round(n, d) { var p = Math.pow(10, d || 0); return Math.round(n * p) / p; }

  /* ==========================================================================
     (b) SEEDED PRNG + deterministic price history
     ========================================================================== */
  // mulberry32: fast, tiny, deterministic 32-bit PRNG. Same seed => same series.
  function mulberry32(seed) {
    var a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // genHistory(seed, len, opts) -> number[] of length `len`, a plausible price
  // walk. Deterministic in (seed, len, opts). opts:
  //   start   : first value (default 100)
  //   end     : if set, series is gently pulled toward `end` at the last point
  //   drift   : per-step mean drift as a fraction (default derived / 0)
  //   vol     : per-step volatility as a fraction (default 0.012)
  //   min     : floor value (default 0.01)
  function genHistory(seed, len, opts) {
    opts = opts || {};
    len = Math.max(2, len | 0);
    var start = opts.start != null ? opts.start : 100;
    var end = opts.end;
    var vol = opts.vol != null ? opts.vol : 0.012;
    var floor = opts.min != null ? opts.min : 0.01;
    var rand = mulberry32(seed);
    // If an end is requested, back out a geometric drift that lands near it.
    var drift = opts.drift;
    if (drift == null) {
      drift = end != null && start > 0
        ? Math.pow(end / start, 1 / (len - 1)) - 1
        : 0;
    }
    var out = new Array(len);
    var v = start;
    out[0] = round(v, 4);
    for (var i = 1; i < len; i++) {
      // gaussian-ish shock from two uniforms
      var shock = (rand() + rand() - 1) * vol;
      // mild mean-reversion pull toward the drift-implied path keeps it tidy
      var target = start * Math.pow(1 + drift, i);
      var pull = target > 0 ? (target - v) / target * 0.10 : 0;
      v = v * (1 + drift + shock) + v * pull;
      if (v < floor) v = floor;
      out[i] = round(v, 4);
    }
    // Snap the last point exactly to `end` when requested (clean reconciliation).
    if (end != null) out[len - 1] = round(end, 4);
    return out;
  }

  // Convenience: slice the tail of a series to a length.
  function tail(arr, n) { return arr.slice(Math.max(0, arr.length - n)); }

  /* ==========================================================================
     (a) window.App — router, chrome, helpers, state
     ========================================================================== */
  var registry = {};        // name -> screen module
  var current = null;       // { name, mod }
  var resizeFns = [];       // per-screen redraw registry
  var globalResizeBound = false;
  var toastTimer = null;
  var revealObservers = []; // IntersectionObservers created for the active screen

  function parseHash() {
    var raw = (location.hash || "").replace(/^#\/?/, "");
    if (!raw) return { name: "", params: {} };
    var parts = raw.split("/");
    var name = parts[0];
    var params = {};
    if (parts.length > 1 && parts[1]) params.symbol = decodeURIComponent(parts[1]);
    if (parts.length > 2 && parts[2]) params.extra = decodeURIComponent(parts[2]);
    return { name: name, params: params };
  }

  function setChrome(kind) {
    var appRoot = doc.getElementById("app");
    if (!appRoot) return;
    appRoot.classList.remove("chrome-flow", "chrome-app");
    appRoot.classList.add(kind === "flow" ? "chrome-flow" : "chrome-app");
  }

  function clearResize() {
    resizeFns = [];
    for (var i = 0; i < revealObservers.length; i++) {
      try { revealObservers[i].disconnect(); } catch (e) {}
    }
    revealObservers = [];
  }

  function onWindowResize() {
    // Debounced-ish: run all registered redraws.
    for (var i = 0; i < resizeFns.length; i++) {
      try { resizeFns[i](); } catch (e) {}
    }
  }

  function markActiveNav(name) {
    var items = doc.querySelectorAll(".nav-item");
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var target = it.getAttribute("data-route");
      if (target === name) it.classList.add("is-active");
      else it.classList.remove("is-active");
    }
  }

  var App = {
    db: null,                 // populated below
    state: {
      onboarded: false,       // first-run routes to splash
      theme: "dark",
      knowledgeLevel: "standard",
      onboardingStep: 0
    },

    register: function (name, mod) {
      registry[name] = mod;
    },

    // Which chrome a given route uses.
    _chromeFor: function (name) {
      var flow = { splash: 1, welcome: 1, signup: 1, connect: 1, onboarding: 1 };
      return flow[name] ? "flow" : "app";
    },

    go: function (name, params) {
      if (!name) name = "splash";
      var hash = "#" + name;
      if (params && params.symbol) hash += "/" + encodeURIComponent(params.symbol);
      if (location.hash === hash) {
        // Same hash: hashchange won't fire; mount directly.
        App._mount(name, params || {});
      } else {
        location.hash = hash;
      }
    },

    _mount: function (name, params) {
      var mod = registry[name];
      if (!mod) {
        // Unknown route: fall back to a sensible default.
        name = App.state.onboarded ? "dashboard" : "splash";
        mod = registry[name];
        if (!mod) return; // nothing registered yet
      }
      // Unmount previous.
      if (current && current.mod && typeof current.mod.unmount === "function") {
        try { current.mod.unmount(); } catch (e) {}
      }
      clearResize();

      var chrome = mod.chrome || App._chromeFor(name);
      setChrome(chrome);

      var host = chrome === "flow"
        ? doc.getElementById("flow")
        : doc.getElementById("view");
      var other = chrome === "flow"
        ? doc.getElementById("view")
        : doc.getElementById("flow");
      if (other) other.innerHTML = "";
      if (host) host.innerHTML = "";

      // Reflect page title + active nav + scroll reset.
      if (mod.title) doc.title = mod.title + " · AlyInvest AI";
      if (chrome === "app") markActiveNav(name);
      if (host) host.scrollTop = 0;

      current = { name: name, mod: mod };

      try {
        mod.mount(host, params || {});
      } catch (e) {
        if (host) {
          host.innerHTML =
            '<div class="container"><div class="empty">' +
            '<p>Something went wrong loading this view.</p></div></div>';
        }
        if (window.console && console.error) console.error("mount error:", name, e);
      }

      // Entrance animation for anything the screen flagged.
      if (host) App.reveal(host);
    },

    _route: function () {
      var parsed = parseHash();
      var name = parsed.name;
      if (!name) {
        // Empty hash: first run -> splash, returning user -> dashboard.
        name = App.state.onboarded ? "dashboard" : "splash";
        App.go(name);
        return;
      }
      App._mount(name, parsed.params);
    },

    boot: function () {
      // buildData reconciles derived numbers before anything mounts.
      if (App.db && !App.db.__built) buildData(App.db);

      if (!globalResizeBound) {
        window.addEventListener("resize", onWindowResize);
        window.addEventListener("hashchange", App._route);
        globalResizeBound = true;
      }
      // Greeting + portfolio total in topbar, if the shell provides slots.
      App._paintChrome();
      App._route();
    },

    _paintChrome: function () {
      try {
        var db = App.db;
        var g = doc.getElementById("topbar-greeting");
        if (g) g.textContent = "Good evening, " + db.user.first;
        var t = doc.getElementById("topbar-total");
        if (t) t.textContent = App.fmt.money(db.portfolio.totalValue);
        var badge = doc.getElementById("bell-count");
        if (badge) {
          var unread = 0;
          for (var i = 0; i < db.notifications.length; i++)
            if (!db.notifications[i].read) unread++;
          badge.textContent = unread ? String(unread) : "";

  /* ==========================================================================

  function buildData(d) {
    // 1. Compute per-holding value / P&L from shares & price.
    var invested = 0, dayChangeAbs = 0, prevInvested = 0, costBasis = 0;
    var enriched = HOLDINGS.map(function (h) {
      var value = round(h.price * h.shares, 2);
      var cost = round(h.avgCost * h.shares, 2);
      var plAbs = round(value - cost, 2);
      var plPct = cost > 0 ? round((value / cost - 1) * 100, 2) : 0;
      // prior day value implied by today's day change %
      var prevValue = value / (1 + h.dayChangePct / 100);
      invested += value;
      costBasis += cost;
      prevInvested += prevValue;
      dayChangeAbs += (value - prevValue);
      return {
        symbol: h.symbol, name: h.name, sector: h.sector,
        price: h.price, shares: h.shares, avgCost: h.avgCost,
        value: value, weight: 0, // weight set after total known
        dayChangePct: h.dayChangePct,
        plAbs: plAbs, plPct: plPct,
        rating: h.rating, ratingLabel: h.ratingLabel
      };
    });

    invested = round(invested, 2);
    costBasis = round(costBasis, 2);
    var totalValue = round(invested + d.portfolio.cash, 2);

    // 2. Weights as % of TOTAL (so tech ≈ 35% of the whole portfolio).
    for (var i = 0; i < enriched.length; i++) {
      enriched[i].weight = round((enriched[i].value / totalValue) * 100, 2);
    }

    d.portfolio.invested = invested;
    d.portfolio.totalValue = totalValue;
    d.portfolio.dayChange = round(dayChangeAbs, 2);
    d.portfolio.dayChangePct = prevInvested > 0
      ? round((dayChangeAbs / (prevInvested + d.portfolio.cash)) * 100, 2) : 0;
    d.portfolio.totalPL = round(invested - costBasis, 2);
    d.portfolio.totalPLPct = costBasis > 0 ? round((invested / costBasis - 1) * 100, 2) : 0;
    d.portfolio.costBasis = costBasis;

      risk: { score: 68, band: "moderate_aggressive", bandLabel: "Moderately Aggressive" },
      volatility: { low: 12, high: 17 },

        { label: "Unfavorable", annualized: -6, probability: 20 },

        { label: "Favorable", annualized: 11, probability: 25 }
      ],
      assumptions: [

        "Partial emergency fund in place."
      ],
      // 60-point projection cone (10 years, ~6 pts/yr) for the reveal chart.
      cone: (function () {

        var base = genHistory(9001, n, { start: base0, end: round(base0 * Math.pow(1.06, 10), 2), vol: 0.004 });

/* ===================== screen: _wiring.js ===================== */
/* ============================================================
   SHELL WIRING — binds the persistent topbar/sidebar chrome controls
   that live in shell.html (outside any screen). Uses event delegation
   so it is safe regardless of mount timing. Depends only on window.App.
   ============================================================ */
(function () {
  "use strict";
  if (!window.App) return;
  var doc = document;

  function closest(el, sel) {
    while (el && el.nodeType === 1) {
      if (el.matches && el.matches(sel)) return el;
      el = el.parentElement;
    }
    return null;
  }

  // ---- Delegated clicks for chrome controls ----
  doc.addEventListener("click", function (e) {
    var t = e.target;

    if (closest(t, "[data-ask-advisor]")) { e.preventDefault(); App.go("advisor"); return; }
    if (closest(t, "[data-bell]"))        { e.preventDefault(); App.go("notifications"); return; }

    var toggle = closest(t, "[data-nav-toggle]");
    if (toggle) {
      e.preventDefault();
      var app = doc.getElementById("app");
      if (app) app.classList.toggle("nav-open");
      return;
    }

    // Close the mobile drawer after navigating from the sidebar.
    if (closest(t, ".nav-item") || closest(t, ".brand")) {
      var app2 = doc.getElementById("app");
      if (app2) app2.classList.remove("nav-open");
    }
  });

  // ---- Global search: "/" focuses; Enter resolves to a holding or toasts ----
  function resolveSearch(q) {
    q = (q || "").trim().toLowerCase();
    if (!q) return null;
    var db = App.db || {};
    var inst = db.instruments || {};
    var sym, best = null;
    for (sym in inst) {
      if (!inst.hasOwnProperty(sym)) continue;
      var it = inst[sym];
      var s = (it.symbol || sym).toLowerCase();
      var n = (it.name || "").toLowerCase();
      if (s === q) return it.symbol || sym;
      if (!best && (s.indexOf(q) === 0 || n.indexOf(q) >= 0)) best = it.symbol || sym;
    }
    return best;
  }

  doc.addEventListener("keydown", function (e) {
    var search = doc.querySelector("[data-global-search]");
    // "/" focuses search when not already typing in a field.
    if (e.key === "/" && search) {
      var a = doc.activeElement;
      var typing = a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.isContentEditable);
      if (!typing) { e.preventDefault(); search.focus(); return; }
    }
    if (e.key === "Enter" && search && doc.activeElement === search) {
      e.preventDefault();
      var hit = resolveSearch(search.value);
      if (hit) { App.go("stock", { symbol: hit }); search.blur(); search.value = ""; }
      else if (App.toast) App.toast("No match — try a symbol like MSFT or NVDA", "info");
    }
  });
})();

/* ================================================================
   advisor.js — "Your Advisor" screen
   chrome: app  |  route: #advisor
   Reads entirely from App.db at runtime.
   ================================================================ */
(function () {
  'use strict';

  /* ── helpers ──────────────────────────────────────────────────── */
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        if (k === 'class') { node.className = attrs[k]; }
        else if (k === 'aria-label') { node.setAttribute('aria-label', attrs[k]); }
        else if (k === 'role') { node.setAttribute('role', attrs[k]); }
        else if (k === 'placeholder') { node.setAttribute('placeholder', attrs[k]); }
        else if (k === 'rows') { node.setAttribute('rows', attrs[k]); }
        else if (k === 'disabled') { if (attrs[k]) node.setAttribute('disabled', ''); }
        else { node[k] = attrs[k]; }
      });
    }
    if (children) {
      if (typeof children === 'string') { node.innerHTML = children; }
      else if (Array.isArray(children)) {
        children.forEach(function (c) { if (c) node.appendChild(c); });
      }
    }
    return node;
  }

  function txt(tag, cls, text) {
    var n = document.createElement(tag);
    n.className = cls;
    n.textContent = text;
    return n;
  }

  function div(cls) {
    var n = document.createElement('div');
    n.className = cls;
    return n;
  }

  /* evidence chip */
  function evChip(type, text) {
    var chip = document.createElement('span');
    chip.className = 'ev ev--' + type;
    chip.textContent = text;
    return chip;
  }

  /* format a UTC ISO time to a short clock string */
  function fmtTime(ts) {
    if (!ts) return '';
    try {
      var d = new Date(ts);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    } catch (e) {
      return '';
    }
  }

  /* keyword-match a user question against advisor.qa */
  function matchQa(qa, query) {
    if (!qa || !qa.length) return null;
    var q = query.toLowerCase();
    var best = null;
    var bestScore = 0;
    for (var i = 0; i < qa.length; i++) {
      var item = qa[i];
      var score = 0;
      var kws = item.keywords || [];
      for (var j = 0; j < kws.length; j++) {
        if (q.indexOf(kws[j].toLowerCase()) !== -1) score++;
      }
      /* also check direct substring of the question text */
      if (item.q && q.indexOf(item.q.toLowerCase().slice(0, 12)) !== -1) score += 2;
      if (score > bestScore) { bestScore = score; best = item; }
    }
    return bestScore > 0 ? best : null;
  }

  /* graceful fallback answer */
  function fallbackAnswer(name) {
    return {
      a: 'That\'s a thoughtful question, ' + (name || 'Aly') + '. Let me look more closely at your portfolio data before giving you a considered answer. For now, I\'d note that every observation I make is grounded in your actual holdings and the deterministic engine\'s numbers — I never guess.',
      evidence: [{ type: 'analysis', text: 'Response based on available portfolio context.' }]
    };
  }

  /* ── build advisor note block ─────────────────────────────────── */
  function buildAdvisorNote(text, evidence, ts) {
    var wrap = div('adv-msg');

    var dot = div('adv-msg-dot');
    wrap.appendChild(dot);

    var body = div('adv-msg-body');

    var header = div('adv-msg-header');
    var sender = txt('span', 'adv-msg-sender', 'Your Advisor');
    var timeEl = txt('span', 'adv-msg-ts', fmtTime(ts) || '');
    header.appendChild(sender);
    if (timeEl.textContent) header.appendChild(timeEl);
    body.appendChild(header);

    var msgText = div('adv-msg-text');
    /* split on \n for multi-paragraph */
    var parts = (text || '').split(/\n{2,}/);
    parts.forEach(function (part) {
      var p = document.createElement('p');
      p.textContent = part.trim();
      msgText.appendChild(p);
    });
    body.appendChild(msgText);

    if (evidence && evidence.length) {
      var evRow = div('adv-msg-evidence');
      evidence.forEach(function (ev) {
        evRow.appendChild(evChip(ev.type, ev.text));
      });
      body.appendChild(evRow);
    }

    wrap.appendChild(body);
    return wrap;
  }

  /* ── build user message block ─────────────────────────────────── */
  function buildUserMsg(text, ts) {
    var outer = div('adv-user-msg');
    var bubble = div('adv-user-bubble');
    var t = txt('p', 'adv-user-bubble-text', text);
    bubble.appendChild(t);
    if (ts) {
      var time = txt('p', 'adv-user-bubble-ts', fmtTime(ts));
      bubble.appendChild(time);
    }
    outer.appendChild(bubble);
    return outer;
  }

  /* ── build "considering…" indicator ──────────────────────────── */
  function buildConsidering() {
    var row = div('adv-considering');
    var dotsWrap = div('adv-considering-dots');
    [0, 1, 2].forEach(function () {
      dotsWrap.appendChild(document.createElement('span'));
    });
    var t = txt('span', 'adv-considering-text', 'Considering…');
    row.appendChild(dotsWrap);
    row.appendChild(t);
    return row;
  }

  /* ── build watch-list item ────────────────────────────────────── */
  function buildWatchItem(sym, note) {
    var item = div('adv-watch-item');
    item.setAttribute('role', 'button');
    item.setAttribute('tabindex', '0');
    item.setAttribute('aria-label', 'Ask about ' + sym);
    var symEl = txt('span', 'adv-watch-sym', sym);
    var noteEl = txt('span', 'adv-watch-note', note || '');
    item.appendChild(symEl);
    item.appendChild(noteEl);
    return item;
  }

  /* ── build score mini-row ─────────────────────────────────────── */
  function buildScoreRow(label, value, color) {
    var row = div('adv-score-row');
    var lbl = txt('span', 'adv-score-lbl', label);
    var bar = div('adv-score-bar-wrap');
    var fill = div('adv-score-bar-fill');
    fill.style.width = Math.min(100, Math.max(0, value || 0)) + '%';
    if (color) fill.style.background = color;
    bar.appendChild(fill);
    var val = txt('span', 'adv-score-val', String(value));
    row.appendChild(lbl);
    row.appendChild(bar);
    row.appendChild(val);
    return row;
  }

  /* ── build earnings item ─────────────────────────────────────── */
  function buildEarnItem(item) {
    var row = div('adv-earn-item');
    var sym = txt('span', 'adv-earn-sym', item.symbol || '');

    imp.textContent = item.importance === 'high' ? 'High' : 'Med';
    row.appendChild(sym);
    row.appendChild(date);
    row.appendChild(imp);
    return row;
  }

  /* ── screen state ─────────────────────────────────────────────── */
  var _threadEl = null;
  var _composerInput = null;
  var _sendBtn = null;

  function threadAppend(node) {
    if (!_threadEl) return;
    _threadEl.appendChild(node);
    _threadEl.scrollTop = _threadEl.scrollHeight;
  }

  /* ── handle send ─────────────────────────────────────────────── */
  function handleSend(advisorData) {
    if (!_composerInput || _considering) return;
    var raw = _composerInput.value.trim();
    if (!raw) return;

    _composerInput.style.height = '';

    setTimeout(function () {

        _threadEl.removeChild(indicator);
      }

      var db = window.App && window.App.db;
      var qa = (db && db.advisor && db.advisor.qa) ? db.advisor.qa : [];
      var name = (db && db.user && db.user.first) ? db.user.first : 'Aly';
      var matched = matchQa(qa, raw);
      var answer = matched || fallbackAnswer(name);

      var noteNode = buildAdvisorNote(
        answer.a,
        answer.evidence || [],
        new Date().toISOString()
      );
      noteNode.style.opacity = '0';
      noteNode.style.transform = 'translateY(8px)';
      noteNode.style.transition = 'opacity .3s ease, transform .3s ease';

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          noteNode.style.opacity = '1';
          noteNode.style.transform = 'translateY(0)';
        });
      });

      _considering = false;
      if (_sendBtn) _sendBtn.disabled = false;
      if (_composerInput) _composerInput.focus();
    }, delay);
  }

  /* ── suggest chip clicked ─────────────────────────────────────── */

    /* ── reveal animation ── */
    if (window.App && window.App.reveal) {
      window.App.reveal(root);
    }

    /* ── scroll thread to bottom ── */
    if (_threadEl) {
      _threadEl.scrollTop = _threadEl.scrollHeight;
    }
  }

  /* ── unmount ─────────────────────────────────────────────────── */
  function unmount() {
    _threadEl = null;
    _composerInput = null;
    _sendBtn = null;
    _considering = false;
  }

  /* ── register ────────────────────────────────────────────────── */
  App.register('advisor', {
    chrome: 'app',
    title: 'Your Advisor',
    mount: mount,
    unmount: unmount
  });

}());

/* ============================================================
   connect.js — Connect Portfolio screen
   chrome: flow — shown inside #flow (no sidebar/topbar)
   ============================================================ */
(function () {
  'use strict';

  // ── State local to this screen mount ──
  var _state = null;

  // ── Helpers ──────────────────────────────────────────────

  function h(tag, attrs, children) {
    var el = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function (k) {
        if (k === 'class') {
          el.className = attrs[k];
        } else if (k === 'html') {
          el.innerHTML = attrs[k];
        } else if (k.indexOf('data-') === 0) {
          el.setAttribute(k, attrs[k]);
        } else if (k === 'aria-label' || k === 'role' || k === 'tabindex' || k === 'type' ||
                   k === 'placeholder' || k === 'value' || k === 'step' || k === 'min' ||
                   k === 'max' || k === 'rows' || k === 'for' || k === 'id' || k === 'name') {
          el.setAttribute(k, attrs[k]);
        } else {
          el[k] = attrs[k];
        }
      });
    }
    if (children) {
      children.forEach(function (c) {
        if (c == null) return;
        if (typeof c === 'string') {
          el.appendChild(document.createTextNode(c));
        } else {
          el.appendChild(c);
        }
      });
    }
    return el;
  }

  function icon(name) {
    var wrap = document.createElement('span');
    wrap.innerHTML = App.icon(name);
    return wrap.firstChild;
  }

  function txt(str) {
    return document.createTextNode(str);
  }

  // ── Broker option data (drives the four cards) ──────────

  var BROKER_IDS = ['t212', 'ibkr', 'csv', 'manual'];

  var BROKER_META = {
    t212: {
      logoClass: 't212',

      kind: 'api',
      icon: 'bank'
    },
    ibkr: {
      logoClass: 'ibkr',
      logoText: 'IB',
      name: 'Interactive Brokers',
      desc: 'OAuth read-only connection. Supports all IBKR account types.',
      kind: 'api',
      icon: 'building'
    },
    csv: {
      logoClass: 'csv',
      logoIcon: 'upload',
      name: 'CSV Import',
      desc: 'Export a holdings CSV from any broker and drag it in. We\'ll parse it automatically.',

  // ── Build consent panel for T212 / IBKR ─────────────────

  function buildConsentPanel(brokerId, brokerName, consentEl, onGranted) {
    consentEl.innerHTML = '';

    var hd = h('div', { class: 'connect-consent-hd' }, [
      h('h3', { class: 'connect-consent-title' }, [txt('Connect ' + brokerName)]),
      h('button', {

        'aria-label': 'Close consent panel',
        type: 'button'
      }, [icon('close')])
    ]);

    var scopeRows = [
      {
        granted: true,
        label: 'read:positions',
        sub: 'View your current holdings and weights'
      },
      {
        granted: true,
        label: 'read:transactions',
        sub: 'View historical transaction history'
      },
      {
        granted: false,
        label: 'Cannot place trades',
        sub: 'AlyInvest has no ability to buy or sell'
      },
      {
        granted: false,
        label: 'Cannot move funds',
        sub: 'No withdrawals, deposits, or transfers'
      }
    ];

    var scopeEls = scopeRows.map(function (row) {
      var rowEl = h('div', { class: 'connect-consent-scope-row' + (row.granted ? '' : ' denied') }, [
        h('div', { class: 'connect-consent-scope-icon' }, [
          icon(row.granted ? 'check' : 'close')
