<title>AlyInvest AI</title>
<meta name="description" content="A premium AI wealth advisor that sits above your brokerage — read-only analysis, a versioned Investment Memory, and a permanent Investment Timeline. Analysis only; never places trades.">

<style>
/* =========================================================================
   AlyInvest AI — Design System & App Shell
   Dark-first private-wealth luxury. Tokens adopted from Blueprint v2 §14.
   This is the ONLY place tokens & shared components are defined.
   ========================================================================= */

/* ---- Tokens ---- */
:root{
  /* Surface layers (luminance-expressed depth; near-black, never pure #000) */
  --aly-ground:#0B0D10;      /* app canvas / behind everything */
  --aly-panel:#12151A;       /* primary card / panel surface */
  --aly-panel-2:#191D24;     /* raised element: input, nested tile, hover */
  --aly-line:#262B33;        /* hairline divider / card border */
  --aly-line-strong:#333A45; /* emphasised divider / focus outline base */

  /* Text */
  --aly-text:#EDF0F4;        /* headlines, primary figures */
  --aly-dim:#A6AEBC;         /* body, labels, secondary copy */
  --aly-mute:#6B7280;        /* captions, metadata, provenance */

  /* Accent — one restrained gold. Signals interactivity + advisor voice only. */
  --aly-gold:#C8A45A;
  --aly-gold-soft:rgba(200,164,90,.13);
  --aly-gold-line:rgba(200,164,90,.34);
  --aly-gold-hi:#DABB74;

  /* Semantic trio — reserved EXCLUSIVELY for computed financial state */
  --aly-pos:#29B37A;
  --aly-neg:#E5484D;
  --aly-warn:#E0A93B;
  --aly-info:#4C8DFF;
  --aly-pos-soft:rgba(41,179,122,.13);
  --aly-neg-soft:rgba(229,72,77,.13);
  --aly-warn-soft:rgba(224,169,59,.13);
  --aly-info-soft:rgba(76,141,255,.13);

  /* Fonts */
  --aly-serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --aly-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --aly-mono:ui-monospace,"SF Mono",Menlo,"Cascadia Code","Roboto Mono",Consolas,monospace;

  /* Type scale (size / line-height baked into components) */
  --fs-display:32px; --lh-display:38px;
  --fs-h1:24px;      --lh-h1:30px;
  --fs-h2:19px;      --lh-h2:26px;
  --fs-body:15px;    --lh-body:23px;
  --fs-cap:13px;     --lh-cap:18px;
  --fs-micro:11px;   --lh-micro:15px;

  /* Spacing (4px base) */
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:24px; --s-6:32px; --s-7:48px; --s-8:64px;
  /* Aliases so screens authored against either naming scheme resolve correctly */
  --sp-1:4px; --sp-1h:6px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px; --sp-8:64px; --sp-10:64px;

  /* Radii */
  --r-sm:8px; --r-md:12px; --r-lg:18px; --r-full:999px;
  --radius-sm:8px; --radius-md:12px; --radius-lg:18px; --radius-full:999px;

  /* Elevation (near-invisible; depth is luminance + hairline) */
  --e-1:0 1px 2px rgba(0,0,0,.42);
  --e-2:0 8px 24px rgba(0,0,0,.56);

  /* Motion */
  --aly-ease:cubic-bezier(.22,.61,.36,1);
  --dur-fast:120ms; --dur-base:220ms; --dur-slow:500ms;

  /* Shell metrics */
  --sidebar-w:256px; --topbar-h:64px;
  --maxw:1200px;
}

/* ---- Reset-ish base ---- */
*,*::before,*::after{box-sizing:border-box}
#app,#app *{margin:0}
#app{
  font-family:var(--aly-sans);
  font-size:var(--fs-body); line-height:var(--lh-body);
  color:var(--aly-text);
  background:
    radial-gradient(1100px 620px at 84% -8%, rgba(200,164,90,.05), transparent 60%),
    radial-gradient(900px 560px at 8% 106%, rgba(76,141,255,.035), transparent 55%),
    var(--aly-ground);
  min-height:100vh;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  font-variant-ligatures:common-ligatures;
}
#app button,#app input,#app textarea,#app select{font:inherit;color:inherit}
/* Low-specificity normalize so bare <button>s never show native white chrome;
   any component class (.btn, .chip, .seg, .toggle, …) overrides these per-property. */
button{background:none;border:none;cursor:pointer;padding:0}
#app a{color:inherit;text-decoration:none}
#app h1,#app h2,#app h3,#app h4{font-family:var(--aly-serif);font-weight:600;letter-spacing:-.01em;line-height:1.14;text-wrap:balance}
#app ::selection{background:var(--aly-gold-soft);color:var(--aly-text)}
#app :focus-visible{outline:2px solid var(--aly-gold);outline-offset:2px;border-radius:var(--r-sm)}
#app ::-webkit-scrollbar{width:10px;height:10px}
#app ::-webkit-scrollbar-thumb{background:var(--aly-line-strong);border-radius:var(--r-full);border:2px solid var(--aly-ground)}
#app ::-webkit-scrollbar-track{background:transparent}

/* ---- Icons ---- */
.ic{width:1em;height:1em;display:inline-block;vertical-align:-.14em;stroke:currentColor;fill:none;flex:none}

/* =========================================================================
   SHELL — sidebar + topbar chrome, flow/view hosts
   ========================================================================= */
/* Toggle chrome at the container level so .topbar/.sidebar keep their flex display. */
#app.chrome-flow .shell{display:none}
#app.chrome-app  #flow{display:none}
#app.chrome-flow #flow{display:block}

.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;min-height:100vh}

#flow{display:none;min-height:100vh}

/* ---- Sidebar ---- */
.sidebar{
  grid-row:1 / -1;grid-column:1;
  position:sticky;top:0;align-self:start;height:100vh;
  display:flex;flex-direction:column;
  background:linear-gradient(180deg, rgba(255,255,255,.014), transparent 240px), var(--aly-panel);
  border-right:1px solid var(--aly-line);
  padding:var(--s-5) var(--s-3) var(--s-4);
  z-index:20;
}
.brand{display:flex;align-items:center;gap:var(--s-3);padding:0 var(--s-2) var(--s-2);margin-bottom:var(--s-4)}
.brand-mark{
  width:34px;height:34px;flex:none;border-radius:var(--r-sm);
  display:grid;place-items:center;
  font-family:var(--aly-serif);font-weight:600;font-size:20px;color:#1a1408;
  background:linear-gradient(155deg,var(--aly-gold-hi),var(--aly-gold) 62%,#9c7c39);
  box-shadow:0 1px 0 rgba(255,255,255,.28) inset, 0 2px 8px rgba(200,164,90,.24);
  letter-spacing:0;
}
.brand-name{font-family:var(--aly-serif);font-size:19px;font-weight:600;letter-spacing:-.01em}
.brand-name b{color:var(--aly-gold)}
.brand-name span{color:var(--aly-text)}

.nav-scroll{flex:1 1 auto;overflow-y:auto;display:flex;flex-direction:column;gap:var(--s-5);padding-right:2px}
.nav-group{display:flex;flex-direction:column;gap:2px}
.nav-grp-label{
  font-family:var(--aly-sans);font-size:var(--fs-micro);line-height:var(--lh-micro);
  text-transform:uppercase;letter-spacing:.13em;color:var(--aly-mute);font-weight:600;
  padding:0 var(--s-3) var(--s-1);margin-bottom:2px;
}
.nav-item{
  display:flex;align-items:center;gap:var(--s-3);
  padding:9px var(--s-3);border-radius:var(--r-sm);
  color:var(--aly-dim);font-size:14px;font-weight:500;
  position:relative;cursor:pointer;
  transition:background var(--dur-fast) var(--aly-ease),color var(--dur-fast) var(--aly-ease);
}
.nav-item .ic{font-size:18px;color:var(--aly-mute);transition:color var(--dur-fast) var(--aly-ease)}
.nav-item:hover{background:var(--aly-panel-2);color:var(--aly-text)}
.nav-item:hover .ic{color:var(--aly-dim)}
.nav-item.is-active{background:var(--aly-gold-soft);color:var(--aly-text)}
.nav-item.is-active .ic{color:var(--aly-gold)}
.nav-item.is-active::before{
  content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:var(--r-full);
  background:var(--aly-gold);
}
.nav-item .nav-badge{
  margin-left:auto;font-family:var(--aly-mono);font-size:10px;line-height:1;
  min-width:18px;height:18px;padding:0 5px;border-radius:var(--r-full);
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--aly-gold);color:#1a1408;font-weight:600;
}
.nav-foot{border-top:1px solid var(--aly-line);padding-top:var(--s-3);margin-top:var(--s-3);display:flex;flex-direction:column;gap:2px}
.sidebar-user{
  display:flex;align-items:center;gap:var(--s-3);padding:var(--s-2) var(--s-3);margin-top:var(--s-2);
  border-radius:var(--r-sm);
}
.sidebar-user .who{display:flex;flex-direction:column;min-width:0}
.sidebar-user .who b{font-size:13px;font-weight:600;color:var(--aly-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user .who small{font-size:var(--fs-micro);color:var(--aly-mute)}

/* ---- Topbar ---- */
.topbar{
  grid-row:1;grid-column:2;
  position:sticky;top:0;z-index:15;height:var(--topbar-h);
  display:flex;align-items:center;gap:var(--s-4);
  padding:0 var(--s-6);
  background:rgba(11,13,16,.72);
  -webkit-backdrop-filter:saturate(140%) blur(14px);backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--aly-line);
}
.topbar .greeting{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.topbar .greeting .hi{font-family:var(--aly-serif);font-size:17px;font-weight:600;color:var(--aly-text);white-space:nowrap}
.topbar .greeting .sub{font-size:var(--fs-micro);color:var(--aly-mute);letter-spacing:.02em}
.topsearch{
  flex:1 1 auto;max-width:420px;margin-left:var(--s-3);
  display:flex;align-items:center;gap:var(--s-2);
  height:38px;padding:0 var(--s-3);
  background:var(--aly-panel-2);border:1px solid var(--aly-line);border-radius:var(--r-sm);
  color:var(--aly-mute);transition:border-color var(--dur-fast) var(--aly-ease);
}
.topsearch:focus-within{border-color:var(--aly-gold-line)}
.topsearch .ic{font-size:16px}
.topsearch input{flex:1;background:none;border:0;outline:0;color:var(--aly-text);font-size:14px}
.topsearch input::placeholder{color:var(--aly-mute)}
.topsearch kbd{
  font-family:var(--aly-mono);font-size:10px;color:var(--aly-mute);
  border:1px solid var(--aly-line);border-radius:4px;padding:1px 5px;background:var(--aly-panel);
}
.topbar-stat{
  margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;
  padding-right:var(--s-4);border-right:1px solid var(--aly-line);
}
.topbar-stat .lbl{font-size:var(--fs-micro);color:var(--aly-mute);text-transform:uppercase;letter-spacing:.1em}
.topbar-stat .val{font-family:var(--aly-mono);font-size:16px;font-weight:600;color:var(--aly-text);font-variant-numeric:tabular-nums}
.topbar-stat .val .delta{margin-left:var(--s-2)}
.bell{position:relative}
.bell .dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:var(--r-full);
  background:var(--aly-gold);border:1.5px solid var(--aly-panel);
}

/* ---- View host ---- */
#view{grid-row:2;grid-column:2;padding:var(--s-6);animation:page-fade var(--dur-base) var(--aly-ease) both}
#app.chrome-flow #view{grid-row:1}
.container{max-width:var(--maxw);margin:0 auto;width:100%}

/* =========================================================================
   LAYOUT PRIMITIVES
   ========================================================================= */
.stack{display:flex;flex-direction:column;gap:var(--s-5)}
.stack.tight{gap:var(--s-3)}
.stack.loose{gap:var(--s-6)}
.cluster{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s-3)}
.cluster.tight{gap:var(--s-2)}
.grid{display:grid;gap:var(--s-4)}
.split{display:flex;align-items:center;justify-content:space-between;gap:var(--s-4)}
.split.top{align-items:flex-start}
.grow{flex:1 1 auto;min-width:0}
.right{margin-left:auto}

/* =========================================================================
   SECTION HEADINGS
   ========================================================================= */
.eyebrow{
  font-family:var(--aly-sans);font-size:var(--fs-micro);line-height:var(--lh-micro);
  text-transform:uppercase;letter-spacing:.16em;color:var(--aly-gold);font-weight:600;
  display:inline-flex;align-items:center;gap:var(--s-2);
}
.section-hd{display:flex;flex-direction:column;gap:var(--s-1);margin-bottom:var(--s-2)}
.section-hd .split{margin:0}
.section-title{font-size:var(--fs-h1);line-height:var(--lh-h1)}
.section-sub{font-size:var(--fs-body);color:var(--aly-dim);max-width:64ch}

/* =========================================================================
   CARD
   ========================================================================= */
.card{
  background:linear-gradient(180deg, rgba(255,255,255,.015), transparent 46%), var(--aly-panel);
  border:1px solid var(--aly-line);border-radius:var(--r-md);
  box-shadow:var(--e-1);
  position:relative;
}
.card>.card-hd,.card>.card-bd,.card>.card-ft{padding:var(--s-5)}
.card>.card-hd{padding-bottom:var(--s-3)}
.card>.card-hd+.card-bd{padding-top:0}
.card>.card-bd+.card-ft,.card>.card-hd+.card-ft{padding-top:var(--s-3)}
.card.pad{padding:var(--s-5)}
.card.accent{border-left:2px solid var(--aly-gold)}
.card.hover{transition:border-color var(--dur-fast) var(--aly-ease),transform var(--dur-fast) var(--aly-ease),box-shadow var(--dur-fast) var(--aly-ease);cursor:pointer}
.card.hover:hover{border-color:var(--aly-line-strong);transform:translateY(-1px);box-shadow:var(--e-2)}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s-3)}
.card-title{font-family:var(--aly-serif);font-size:var(--fs-h2);line-height:var(--lh-h2);font-weight:600}
.card-sub{font-size:var(--fs-cap);line-height:var(--lh-cap);color:var(--aly-mute);margin-top:2px}
.card-ft{border-top:1px solid var(--aly-line);display:flex;align-items:center;justify-content:space-between;gap:var(--s-3);color:var(--aly-mute);font-size:var(--fs-cap)}

/* =========================================================================
   METRIC / SCORE / RING
   ========================================================================= */
.metric{display:flex;flex-direction:column;gap:var(--s-1)}
.metric-lbl{font-size:var(--fs-micro);line-height:var(--lh-micro);text-transform:uppercase;letter-spacing:.11em;color:var(--aly-mute);font-weight:600}
.metric-val{font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:var(--fs-display);line-height:1;font-weight:600;color:var(--aly-text);letter-spacing:-.01em}
.metric-val.md{font-size:22px}
.metric-val .u{font-size:.5em;color:var(--aly-mute);margin-left:2px;font-weight:500}

.scorecard{
  background:linear-gradient(180deg, rgba(255,255,255,.015), transparent 46%), var(--aly-panel);
  border:1px solid var(--aly-line);border-radius:var(--r-md);box-shadow:var(--e-1);
  padding:var(--s-5);display:flex;flex-direction:column;gap:var(--s-4);
}
.scorecard .sc-top{display:flex;align-items:center;justify-content:space-between;gap:var(--s-2)}
.scorecard .sc-mid{display:flex;align-items:center;gap:var(--s-4)}
.ring-wrap{position:relative;flex:none;width:76px;height:76px;display:grid;place-items:center}
.ring-wrap canvas{width:100%;height:100%;display:block}
.ring-wrap .ring-center{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:20px;font-weight:600;color:var(--aly-text)}

/* delta */
.delta{
  display:inline-flex;align-items:center;gap:3px;
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:var(--fs-cap);font-weight:600;
}
.delta .ic{font-size:13px}
.delta.up{color:var(--aly-pos)} .delta.down{color:var(--aly-neg)} .delta.flat{color:var(--aly-mute)}

/* =========================================================================
   BUTTONS
   ========================================================================= */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:var(--s-2);
  height:40px;padding:0 var(--s-4);border-radius:var(--r-sm);
  font-family:var(--aly-sans);font-size:14px;font-weight:600;letter-spacing:.005em;
  background:var(--aly-panel-2);border:1px solid var(--aly-line);color:var(--aly-text);
  cursor:pointer;white-space:nowrap;
  transition:background var(--dur-fast) var(--aly-ease),border-color var(--dur-fast) var(--aly-ease),transform var(--dur-fast) var(--aly-ease),color var(--dur-fast) var(--aly-ease);
}
.btn .ic{font-size:16px}
.btn:hover{border-color:var(--aly-line-strong);background:#1e232b}
.btn:active{transform:translateY(1px)}
.btn-primary{
  background:linear-gradient(160deg,var(--aly-gold-hi),var(--aly-gold) 70%);
  border-color:transparent;color:#1a1408;
  box-shadow:0 1px 0 rgba(255,255,255,.24) inset, 0 2px 10px rgba(200,164,90,.2);
}
.btn-primary:hover{background:linear-gradient(160deg,#e6c986,var(--aly-gold-hi) 70%);border-color:transparent}
.btn-ghost{background:transparent;border-color:transparent;color:var(--aly-dim)}
.btn-ghost:hover{background:var(--aly-panel-2);border-color:var(--aly-line);color:var(--aly-text)}
.btn-sm{height:32px;padding:0 var(--s-3);font-size:var(--fs-cap)}
.btn-sm .ic{font-size:14px}
.btn-block{display:flex;width:100%}
.btn-icon{width:40px;height:40px;padding:0;flex:none;color:var(--aly-dim);background:transparent;border-color:transparent}
.btn-icon:hover{background:var(--aly-panel-2);color:var(--aly-text);border-color:var(--aly-line)}
.btn-icon .ic{font-size:20px}
.btn:disabled,.btn[disabled]{opacity:.42;cursor:not-allowed;transform:none;background:var(--aly-panel-2);border-color:var(--aly-line);color:var(--aly-mute);box-shadow:none}

/* =========================================================================
   CHIPS / PILLS / BADGES / RATING / TAG
   ========================================================================= */
.chip{
  display:inline-flex;align-items:center;gap:var(--s-2);
  height:30px;padding:0 var(--s-3);border-radius:var(--r-full);
  font-size:var(--fs-cap);font-weight:500;color:var(--aly-dim);
  background:var(--aly-panel-2);border:1px solid var(--aly-line);cursor:pointer;
  transition:all var(--dur-fast) var(--aly-ease);white-space:nowrap;
}
.chip .ic{font-size:14px}
.chip:hover{border-color:var(--aly-line-strong);color:var(--aly-text)}
.chip.is-on{background:var(--aly-gold-soft);border-color:var(--aly-gold-line);color:var(--aly-text)}
.chip.is-on .ic{color:var(--aly-gold)}

.pill{
  display:inline-flex;align-items:center;gap:5px;
  height:22px;padding:0 9px;border-radius:var(--r-full);
  font-size:var(--fs-micro);line-height:1;font-weight:600;letter-spacing:.02em;
  border:1px solid var(--aly-line);color:var(--aly-dim);background:var(--aly-panel-2);white-space:nowrap;
}
.pill .ic{font-size:12px}
.pill .dotmark{width:6px;height:6px;border-radius:var(--r-full);background:currentColor;flex:none}
.pill.pos{color:var(--aly-pos);background:var(--aly-pos-soft);border-color:transparent}
.pill.neg{color:var(--aly-neg);background:var(--aly-neg-soft);border-color:transparent}
.pill.warn{color:var(--aly-warn);background:var(--aly-warn-soft);border-color:transparent}
.pill.info{color:var(--aly-info);background:var(--aly-info-soft);border-color:transparent}
.pill.mute{color:var(--aly-mute);background:var(--aly-panel-2);border-color:var(--aly-line)}

.badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;border-radius:var(--r-full);
  font-family:var(--aly-mono);font-size:10px;font-weight:600;line-height:1;
  background:var(--aly-panel-2);border:1px solid var(--aly-line);color:var(--aly-dim);
}

.rating{
  display:inline-flex;align-items:center;gap:5px;
  height:24px;padding:0 10px;border-radius:var(--r-sm);
  font-size:var(--fs-micro);font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  border:1px solid var(--aly-line);color:var(--aly-dim);background:var(--aly-panel-2);
}
.rating .dotmark{width:6px;height:6px;border-radius:var(--r-full);background:currentColor;flex:none}
.rating.add{color:var(--aly-pos);background:var(--aly-pos-soft);border-color:transparent}
.rating.hold{color:var(--aly-dim);background:var(--aly-panel-2);border-color:var(--aly-line)}
.rating.trim{color:var(--aly-warn);background:var(--aly-warn-soft);border-color:transparent}
.rating.avoid{color:var(--aly-neg);background:var(--aly-neg-soft);border-color:transparent}

.tag{
  display:inline-flex;align-items:center;gap:5px;
  font-size:var(--fs-micro);font-weight:500;color:var(--aly-dim);
  padding:3px 8px;border-radius:var(--r-sm);background:var(--aly-panel-2);border:1px solid var(--aly-line);
}

/* =========================================================================
   EVIDENCE CHIPS (fact / analysis / assumption / uncertain)
   ========================================================================= */
.ev{
  display:inline-flex;align-items:center;gap:6px;
  font-size:var(--fs-micro);line-height:1.3;font-weight:600;
  padding:4px 9px;border-radius:var(--r-full);
  border:1px solid var(--aly-line);background:var(--aly-panel-2);color:var(--aly-dim);white-space:nowrap;
}
.ev::before{content:"";width:6px;height:6px;border-radius:var(--r-full);background:currentColor;flex:none}
.ev .ev-lbl{text-transform:uppercase;letter-spacing:.07em;opacity:.9}
.ev--fact{color:var(--aly-info)}
.ev--analysis{color:var(--aly-gold)}
.ev--assumption{color:var(--aly-warn)}
.ev--uncertain{color:var(--aly-mute)}

/* =========================================================================
   RECOMMENDATION
   ========================================================================= */
.rec{
  border:1px solid var(--aly-line);border-left:2px solid var(--aly-gold);border-radius:var(--r-md);
  background:linear-gradient(180deg, var(--aly-gold-soft), transparent 40%), var(--aly-panel);
  padding:var(--s-5);display:flex;flex-direction:column;gap:var(--s-3);box-shadow:var(--e-1);
}
.rec-action{font-family:var(--aly-serif);font-size:21px;line-height:1.25;font-weight:600;color:var(--aly-text)}
.rec-conf{display:flex;align-items:center;gap:var(--s-3);flex-wrap:wrap}
.rec-note{
  display:flex;align-items:center;gap:var(--s-2);
  font-size:var(--fs-cap);color:var(--aly-mute);
  border-top:1px solid var(--aly-line);padding-top:var(--s-3);margin-top:var(--s-1);
}
.rec-note .ic{font-size:14px;color:var(--aly-mute)}

/* =========================================================================
   CONFIDENCE
   ========================================================================= */
.confbar{position:relative;height:6px;border-radius:var(--r-full);background:var(--aly-panel-2);overflow:hidden;border:1px solid var(--aly-line)}
.confbar>i{position:absolute;inset:0 auto 0 0;height:100%;border-radius:var(--r-full);background:linear-gradient(90deg,var(--aly-gold),var(--aly-gold-hi));width:var(--val,0%);transition:width var(--dur-slow) var(--aly-ease)}
.confpill{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:var(--fs-cap);font-weight:600;
  padding:3px 10px;border-radius:var(--r-full);
  color:var(--aly-gold);background:var(--aly-gold-soft);border:1px solid var(--aly-gold-line);
}
.confpill .ic{font-size:13px}

/* =========================================================================
   PROVENANCE
   ========================================================================= */
.prov{
  font-family:var(--aly-mono);font-size:var(--fs-micro);line-height:var(--lh-micro);
  color:var(--aly-mute);letter-spacing:.01em;
  display:inline-flex;align-items:center;gap:6px;
}
.prov .ic{font-size:12px;opacity:.75}

/* =========================================================================
   TABLE
   ========================================================================= */
.tbl-wrap{overflow-x:auto;border:1px solid var(--aly-line);border-radius:var(--r-md)}
.tbl{width:100%;border-collapse:collapse;font-size:var(--fs-cap)}
.tbl th,.tbl td{padding:11px var(--s-4);text-align:left;border-bottom:1px solid var(--aly-line);white-space:nowrap}
.tbl thead th{
  font-size:var(--fs-micro);text-transform:uppercase;letter-spacing:.1em;color:var(--aly-mute);font-weight:600;
  background:var(--aly-panel);position:sticky;top:0;
}
.tbl tbody tr{transition:background var(--dur-fast) var(--aly-ease)}
.tbl tbody tr:hover{background:var(--aly-panel-2)}
.tbl tbody tr:last-child td{border-bottom:0}
.tbl .num,.num{font-family:var(--aly-mono);font-variant-numeric:tabular-nums;text-align:right}
.tbl th.num{text-align:right}

/* =========================================================================
   FORMS
   ========================================================================= */
.field{display:flex;flex-direction:column;gap:var(--s-2)}
.flabel{font-size:var(--fs-cap);font-weight:600;color:var(--aly-dim)}
.flabel .hint{font-weight:400;color:var(--aly-mute);margin-left:var(--s-2)}
.input,.textarea,.select{
  width:100%;background:var(--aly-panel-2);border:1px solid var(--aly-line);border-radius:var(--r-sm);
  color:var(--aly-text);padding:10px var(--s-3);font-size:14px;
  transition:border-color var(--dur-fast) var(--aly-ease),box-shadow var(--dur-fast) var(--aly-ease);
}
.input::placeholder,.textarea::placeholder{color:var(--aly-mute)}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--aly-gold-line);box-shadow:0 0 0 3px var(--aly-gold-soft)}
.textarea{min-height:96px;resize:vertical;line-height:1.5;font-family:var(--aly-sans)}
.select{appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='1.75' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:36px;cursor:pointer;
}

.toggle{
  --w:44px;--h:24px;
  position:relative;width:var(--w);height:var(--h);flex:none;border-radius:var(--r-full);cursor:pointer;
  background:var(--aly-panel-2);border:1px solid var(--aly-line);
  transition:background var(--dur-base) var(--aly-ease),border-color var(--dur-base) var(--aly-ease);
}
.toggle::after{
  content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:var(--r-full);
  background:var(--aly-dim);transition:transform var(--dur-base) var(--aly-ease),background var(--dur-base) var(--aly-ease);
}
.toggle.is-on{background:var(--aly-gold-soft);border-color:var(--aly-gold-line)}
.toggle.is-on::after{transform:translateX(20px);background:var(--aly-gold)}

.segmented{display:inline-flex;padding:3px;gap:2px;background:var(--aly-panel-2);border:1px solid var(--aly-line);border-radius:var(--r-sm)}
.seg{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px var(--s-3);border-radius:6px;font-size:var(--fs-cap);font-weight:600;
  color:var(--aly-dim);cursor:pointer;background:transparent;border:0;
  transition:background var(--dur-fast) var(--aly-ease),color var(--dur-fast) var(--aly-ease);
}
.seg .ic{font-size:14px}
.seg:hover{color:var(--aly-text)}
.seg.is-on{background:var(--aly-panel);color:var(--aly-text);box-shadow:var(--e-1)}

.range{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:var(--r-full);
  background:var(--aly-panel-2);border:1px solid var(--aly-line);outline:none;cursor:pointer;
}
.range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:var(--r-full);
  background:linear-gradient(160deg,var(--aly-gold-hi),var(--aly-gold));border:2px solid var(--aly-panel);cursor:pointer;box-shadow:var(--e-1)}
.range::-moz-range-thumb{width:18px;height:18px;border-radius:var(--r-full);
  background:var(--aly-gold);border:2px solid var(--aly-panel);cursor:pointer}

/* =========================================================================
   TOOLBAR
   ========================================================================= */
.toolbar{display:flex;align-items:center;gap:var(--s-3);flex-wrap:wrap;padding:var(--s-2) 0}

/* =========================================================================
   FEEDBACK / MISC
   ========================================================================= */
.divider{height:1px;background:var(--aly-line);border:0;margin:var(--s-2) 0}
.divider.v{width:1px;height:auto;align-self:stretch;margin:0}

.callout{
  display:flex;gap:var(--s-3);padding:var(--s-4);border-radius:var(--r-md);
  background:var(--aly-panel-2);border:1px solid var(--aly-line);
  font-size:var(--fs-cap);line-height:1.55;color:var(--aly-dim);
}
.callout .ic{font-size:18px;flex:none;margin-top:1px}
.callout b{color:var(--aly-text);font-weight:600}
.callout.key{border-left:2px solid var(--aly-gold);background:linear-gradient(90deg,var(--aly-gold-soft),transparent 46%),var(--aly-panel-2)}
.callout.key .ic{color:var(--aly-gold)}
.callout.warn{border-left:2px solid var(--aly-warn);background:linear-gradient(90deg,var(--aly-warn-soft),transparent 46%),var(--aly-panel-2)}
.callout.warn .ic{color:var(--aly-warn)}
.callout.note{border-left:2px solid var(--aly-line-strong)}
.callout.note .ic{color:var(--aly-mute)}

.empty{
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--s-3);
  padding:var(--s-8) var(--s-5);color:var(--aly-dim);
}
.empty .empty-ic{
  width:56px;height:56px;border-radius:var(--r-full);display:grid;place-items:center;
  background:var(--aly-panel-2);border:1px solid var(--aly-line);color:var(--aly-mute);
}
.empty .empty-ic .ic{font-size:26px}
.empty h4{font-family:var(--aly-serif);font-size:var(--fs-h2);color:var(--aly-text)}
.empty p{font-size:var(--fs-cap);color:var(--aly-mute);max-width:42ch}

.skeleton{
  background:var(--aly-panel-2);border-radius:var(--r-sm);position:relative;overflow:hidden;
}
.skeleton::after{
  content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.055),transparent);
  animation:shimmer 1.4s var(--aly-ease) infinite;
}
.skeleton.line{height:12px;margin:6px 0}
.skeleton.line.sm{width:40%} .skeleton.line.lg{width:80%}

.cone-note{
  display:inline-flex;align-items:center;gap:6px;
  font-size:var(--fs-micro);color:var(--aly-mute);font-style:italic;letter-spacing:.01em;
}
.cone-note .ic{font-size:13px;font-style:normal}

/* Stepper */
.stepper{display:flex;align-items:center;gap:0;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:var(--s-2);font-size:var(--fs-cap);color:var(--aly-mute);font-weight:500}
.step .step-dot{
  width:22px;height:22px;flex:none;border-radius:var(--r-full);display:grid;place-items:center;
  border:1px solid var(--aly-line);background:var(--aly-panel-2);color:var(--aly-mute);
  font-family:var(--aly-mono);font-size:11px;font-weight:600;
}
.step .step-dot .ic{font-size:13px}
.step+.step::before{content:"";width:22px;height:1px;background:var(--aly-line);margin:0 var(--s-2)}
.step.is-now{color:var(--aly-text)}
.step.is-now .step-dot{border-color:var(--aly-gold);color:var(--aly-gold);background:var(--aly-gold-soft)}
.step.is-done{color:var(--aly-dim)}
.step.is-done .step-dot{border-color:transparent;background:var(--aly-gold);color:#1a1408}

/* Avatar */
.avatar{
  width:34px;height:34px;flex:none;border-radius:var(--r-full);display:grid;place-items:center;
  font-family:var(--aly-sans);font-size:13px;font-weight:600;color:var(--aly-text);
  background:linear-gradient(155deg,var(--aly-panel-2),#20262f);border:1px solid var(--aly-line);
}
.avatar.gold{background:linear-gradient(155deg,var(--aly-gold-hi),var(--aly-gold) 66%,#9c7c39);color:#1a1408;border-color:transparent}
.avatar.sm{width:26px;height:26px;font-size:11px}
.avatar.lg{width:44px;height:44px;font-size:16px}

/* =========================================================================
   TOAST
   ========================================================================= */
.toast-host{position:fixed;bottom:var(--s-5);right:var(--s-5);z-index:200;display:flex;flex-direction:column;gap:var(--s-2);pointer-events:none}
.toast{
  pointer-events:auto;min-width:240px;max-width:360px;
  display:flex;align-items:center;gap:var(--s-3);
  padding:var(--s-3) var(--s-4);border-radius:var(--r-md);
  background:var(--aly-panel-2);border:1px solid var(--aly-line);box-shadow:var(--e-2);
  color:var(--aly-text);font-size:var(--fs-cap);
  animation:toast-in var(--dur-base) var(--aly-ease) both;
}
.toast .ic{font-size:18px;flex:none}
.toast.info .ic{color:var(--aly-info)}
.toast.ok .ic{color:var(--aly-pos)}
.toast.warn .ic{color:var(--aly-warn)}
.toast.is-out{animation:toast-out var(--dur-base) var(--aly-ease) both}

/* =========================================================================
   MOTION
   ========================================================================= */
[data-reveal]{opacity:0}
/* Kernel adds .is-in when an element enters view; support .revealed too for safety. */
#app [data-reveal].is-in,#app [data-reveal].revealed,#app .revealed [data-reveal]{animation:reveal-in var(--dur-base) var(--aly-ease) both}
/* Failsafe: if scripting/observer never reveals, never leave content invisible. */
#app.reveal-fallback [data-reveal]:not(.is-in){opacity:1}
@keyframes reveal-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes page-fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes shimmer{100%{transform:translateX(100%)}}
@keyframes ring-draw{from{stroke-dashoffset:var(--ring-len,0)}to{stroke-dashoffset:var(--ring-off,0)}}
@keyframes toast-in{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
@keyframes toast-out{from{opacity:1;transform:none}to{opacity:0;transform:translateY(8px) scale(.98)}}
@keyframes stagger-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.stagger>*{animation:stagger-in var(--dur-base) var(--aly-ease) both}
.stagger>*:nth-child(1){animation-delay:40ms}
.stagger>*:nth-child(2){animation-delay:90ms}
.stagger>*:nth-child(3){animation-delay:140ms}
.stagger>*:nth-child(4){animation-delay:190ms}
.stagger>*:nth-child(5){animation-delay:240ms}
.stagger>*:nth-child(6){animation-delay:290ms}
.stagger>*:nth-child(7){animation-delay:340ms}
.stagger>*:nth-child(8){animation-delay:390ms}

@media (prefers-reduced-motion:reduce){
  #app *,#app *::before,#app *::after{
    animation-duration:.001ms !important;animation-iteration-count:1 !important;
    transition-duration:.001ms !important;scroll-behavior:auto !important;
  }
  [data-reveal]{opacity:1 !important;transform:none !important}
  .skeleton::after{display:none}
}

/* =========================================================================
   RESPONSIVE
   ========================================================================= */
@media (max-width:1080px){
  :root{--sidebar-w:216px}
  #view{padding:var(--s-5)}
  .topbar{padding:0 var(--s-5)}
  .topsearch{max-width:300px}
}
@media (max-width:900px){
  .shell{grid-template-columns:1fr}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;width:270px;height:100vh;
    transform:translateX(-100%);transition:transform var(--dur-base) var(--aly-ease);
    box-shadow:var(--e-2);
  }
  #app.nav-open .sidebar{transform:none}
  .topbar,#view{grid-column:1}
  .topbar{padding:0 var(--s-4)}
  .nav-toggle{display:inline-flex !important}
  .topbar-stat .lbl{display:none}
}
@media (max-width:760px){
  #view{padding:var(--s-4)}
  .topsearch{display:none}
  .topbar .greeting .sub{display:none}
  .grid{gap:var(--s-3)}
  .rec-action{font-size:19px}
  .metric-val{font-size:28px}
}
@media (max-width:560px){
  .topbar{gap:var(--s-3);padding:0 var(--s-3)}
  .topbar .greeting .hi{font-size:15px}
  .topbar-stat{padding-right:var(--s-3)}
  .topbar-stat .val{font-size:14px}
  #view{padding:var(--s-3)}
  .card>.card-hd,.card>.card-bd,.card>.card-ft,.card.pad,.scorecard,.rec{padding:var(--s-4)}
  .section-title{font-size:21px}
  .toast-host{left:var(--s-3);right:var(--s-3);bottom:var(--s-3)}
  .toast{max-width:none}
}

/* nav-toggle hidden on desktop, shown on mobile via query above */
.nav-toggle{display:none}


/* ===================== screen: advisor.css ===================== */
/* ================================================================
   advisor.css — scoped entirely under .screen-advisor
   Adds only layout rules unique to this screen.
   Shared tokens, component classes, and resets live in shell.html.
   ================================================================ */

/* ── Root layout ─────────────────────────────────────────────── */
.screen-advisor {
  display: grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: auto 1fr auto;
  gap: 0;
  min-height: 100%;
  align-items: start;
}

/* ── Identity header (full-width, spans both columns) ─────────── */
.adv-identity {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.75rem 2rem 1.5rem;
  border-bottom: 1px solid var(--aly-line);
}

.adv-avatar {
  flex-shrink: 0;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--aly-gold) 0%, rgba(200,164,90,.35) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--aly-serif);
  font-size: 1.35rem;
  color: var(--aly-panel);
  font-weight: 600;
  letter-spacing: .02em;
  box-shadow: 0 0 0 2px var(--aly-line), 0 0 0 4px rgba(200,164,90,.15);
  flex-shrink: 0;
}

.adv-identity-info {
  flex: 1;
  min-width: 0;
}

.adv-identity-name {
  font-family: var(--aly-serif);
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--aly-text);
  letter-spacing: .01em;
  line-height: 1.2;
}

.adv-identity-sub {
  font-size: .75rem;
  color: var(--aly-dim);
  margin-top: .2rem;
  line-height: 1.5;
}

.adv-identity-actions {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-shrink: 0;
}

/* ── Main conversation column ─────────────────────────────────── */
.adv-thread-col {
  grid-column: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 0 0 0 2rem;
  border-right: 1px solid var(--aly-line);
}

/* ── Thread scrollable area ───────────────────────────────────── */
.adv-thread {
  flex: 1;
  overflow-y: auto;
  padding: 1.75rem 1.5rem 1.75rem 0;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  /* custom scrollbar */
  scrollbar-width: thin;
  scrollbar-color: var(--aly-line) transparent;
}
.adv-thread::-webkit-scrollbar { width: 4px; }
.adv-thread::-webkit-scrollbar-track { background: transparent; }
.adv-thread::-webkit-scrollbar-thumb { background: var(--aly-line); border-radius: 2px; }

/* ── Individual message blocks ────────────────────────────────── */
/* Advisor note — left-aligned, card treatment */
.adv-msg {
  display: flex;
  gap: .875rem;
  align-items: flex-start;
}

.adv-msg-dot {
  flex-shrink: 0;
  margin-top: .5rem;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--aly-gold);
  box-shadow: 0 0 0 3px rgba(200,164,90,.15);
}

.adv-msg-body {
  flex: 1;
  min-width: 0;
}

.adv-msg-header {
  display: flex;
  align-items: center;
  gap: .625rem;
  margin-bottom: .5rem;
}

.adv-msg-sender {
  font-size: .72rem;
  font-weight: 600;
  color: var(--aly-gold);
  text-transform: uppercase;
  letter-spacing: .1em;
}

.adv-msg-ts {
  font-size: .7rem;
  color: var(--aly-mute);
  font-family: var(--aly-mono);
}

.adv-msg-text {
  font-family: var(--aly-serif);
  font-size: .975rem;
  line-height: 1.75;
  color: var(--aly-text);
  max-width: 58ch;
}

.adv-msg-text p + p {
  margin-top: .625rem;
}

.adv-msg-evidence {
  display: flex;
  flex-wrap: wrap;
  gap: .375rem;
  margin-top: .75rem;
}

/* User message — right-aligned, quieter */
.adv-user-msg {
  display: flex;
  justify-content: flex-end;
}

.adv-user-bubble {
  background: var(--aly-panel-2, var(--aly-panel));
  border: 1px solid var(--aly-line);
  border-radius: 1rem 1rem 4px 1rem;
  padding: .625rem 1rem;
  max-width: 52ch;
}

.adv-user-bubble-text {
  font-size: .9rem;
  color: var(--aly-dim);
  line-height: 1.55;
}

.adv-user-bubble-ts {
  font-size: .68rem;
  color: var(--aly-mute);
  font-family: var(--aly-mono);
  margin-top: .3rem;
  text-align: right;
}

/* Considering indicator */
.adv-considering {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .75rem 0 .25rem;
}

.adv-considering-text {
  font-size: .8rem;
  color: var(--aly-dim);
  font-style: italic;
  letter-spacing: .01em;
}

.adv-considering-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}

.adv-considering-dots span {
  display: block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--aly-gold);
  opacity: .5;
  animation: adv-bounce 1.2s infinite ease-in-out;
}
.adv-considering-dots span:nth-child(2) { animation-delay: .2s; }
.adv-considering-dots span:nth-child(3) { animation-delay: .4s; }

@keyframes adv-bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: .4; }
  40%            { transform: translateY(-4px); opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .adv-considering-dots span { animation: none; opacity: .6; }
}

/* ── Composer ─────────────────────────────────────────────────── */
.adv-composer {
  border-top: 1px solid var(--aly-line);
  padding: 1.25rem 0 1.5rem;
  padding-right: 1.5rem;
}

.adv-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: .375rem;
  margin-bottom: .875rem;
}

.adv-composer-row {
  display: flex;
  gap: .625rem;
  align-items: flex-end;
}

.adv-composer-input {
  flex: 1;
  min-height: 44px;
  max-height: 120px;
  resize: none;
  padding: .65rem .9rem;
  background: var(--aly-panel);
  border: 1px solid var(--aly-line);
  border-radius: .5rem;
  color: var(--aly-text);
  font-family: var(--aly-sans);
  font-size: .9rem;
  line-height: 1.5;
  transition: border-color .15s;
  overflow-y: auto;
}
.adv-composer-input:focus {
  outline: none;
  border-color: var(--aly-gold);
  box-shadow: 0 0 0 3px rgba(200,164,90,.12);
}
.adv-composer-input::placeholder { color: var(--aly-mute); }

.adv-send-btn {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: .45rem;
  background: var(--aly-gold);
  color: var(--aly-panel);
  border: none;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.adv-send-btn:hover  { opacity: .88; }
.adv-send-btn:active { transform: scale(.94); }
.adv-send-btn:disabled { opacity: .35; cursor: not-allowed; }
.adv-send-btn svg { width: 18px; height: 18px; }

/* ── Right sidebar — "What I'm Watching" ─────────────────────── */
.adv-sidebar {
  grid-column: 2;
  padding: 1.75rem 1.75rem 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  position: sticky;
  top: 0;
  max-height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;
}
.adv-sidebar::-webkit-scrollbar { display: none; }

.adv-sidebar-section-title {
  font-size: .7rem;
  font-weight: 700;
  color: var(--aly-mute);
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-bottom: .875rem;
}

/* Watching items */
.adv-watch-list {
  display: flex;
  flex-direction: column;
  gap: .625rem;
}

.adv-watch-item {
  display: flex;
  align-items: flex-start;
  gap: .625rem;
  padding: .75rem .875rem;
  background: var(--aly-panel);
  border: 1px solid var(--aly-line);
  border-radius: .5rem;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.adv-watch-item:hover {
  border-color: var(--aly-gold);
  background: rgba(200,164,90,.04);
}

.adv-watch-sym {
  font-family: var(--aly-mono);
  font-size: .78rem;
  font-weight: 700;
  color: var(--aly-gold);
  letter-spacing: .04em;
  padding-top: .05rem;
  flex-shrink: 0;
  min-width: 3.2rem;
}

.adv-watch-note {
  font-size: .78rem;
  color: var(--aly-dim);
  line-height: 1.5;
}

/* Upcoming earnings in sidebar */
.adv-earnings-list {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

.adv-earn-item {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .5rem .75rem;
  border-radius: .4rem;
  border: 1px solid var(--aly-line);
  background: var(--aly-panel);
}

.adv-earn-sym {
  font-family: var(--aly-mono);
  font-size: .78rem;
  font-weight: 700;
  color: var(--aly-text);
  min-width: 3rem;
}

.adv-earn-date {
  font-size: .73rem;
  color: var(--aly-dim);
  font-family: var(--aly-mono);
  flex: 1;
}

/* Score mini-summary in sidebar */
.adv-scores-mini {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

.adv-score-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .5rem;
}

.adv-score-lbl {
  font-size: .75rem;
  color: var(--aly-dim);
  flex: 1;
}

.adv-score-val {
  font-family: var(--aly-mono);
  font-size: .82rem;
  font-weight: 600;
  color: var(--aly-text);
  min-width: 2.5rem;
  text-align: right;
}

.adv-score-bar-wrap {
  width: 48px;
  height: 4px;
  background: var(--aly-line);
  border-radius: 2px;
  overflow: hidden;
}

.adv-score-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--aly-gold);
  transition: width .6s var(--aly-ease, cubic-bezier(.4,0,.2,1));
}

/* ── Responsive ───────────────────────────────────────────────── */
@media (max-width: 1080px) {
  .screen-advisor {
    grid-template-columns: 1fr 240px;
  }
  .adv-thread-col { padding-left: 1.5rem; }
}

@media (max-width: 900px) {
  .screen-advisor {
    grid-template-columns: 1fr;
  }
  .adv-thread-col {
    border-right: none;
    padding-left: 1.25rem;
  }
  .adv-sidebar {
    grid-column: 1;
    position: static;
    max-height: none;
    padding: 0 1.25rem 2rem;
    border-top: 1px solid var(--aly-line);
  }
  .adv-identity { padding: 1.5rem 1.25rem 1.25rem; }
  .adv-thread   { padding-right: 1.25rem; }
  .adv-composer { padding-right: 1.25rem; }
}

@media (max-width: 560px) {
  .adv-identity { flex-wrap: wrap; gap: .75rem; }
  .adv-identity-actions { width: 100%; }
  .adv-msg-text { font-size: .915rem; }
}


/* ===================== screen: connect.css ===================== */
/* ============================================================
   connect.css — Connect Portfolio screen
   All selectors scoped under .screen-connect
   Reuses shared component classes; does NOT redefine tokens.
   ============================================================ */

/* ── Root layout ── */
.screen-connect {
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: var(--sp-10, 2.5rem) var(--sp-6, 1.5rem) var(--sp-12, 3rem);
  background: var(--aly-ground);
}

.screen-connect .connect-shell {
  width: 100%;
  max-width: 620px;
  display: flex;
  flex-direction: column;
  gap: var(--sp-8, 2rem);
}

/* ── Logo / wordmark row at top ── */
.screen-connect .connect-brand {
  display: flex;
  align-items: center;
  gap: var(--sp-3, 0.75rem);
  padding-bottom: var(--sp-2, 0.5rem);
}

.screen-connect .connect-brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--aly-gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--aly-serif);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--aly-ground);
  flex-shrink: 0;
}

.screen-connect .connect-brand-name {
  font-family: var(--aly-serif);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--aly-text);
  letter-spacing: 0.01em;
}

/* ── Page heading block ── */
.screen-connect .connect-heading {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2, 0.5rem);
}

.screen-connect .connect-heading h1 {
  font-family: var(--aly-serif);
  font-size: clamp(1.55rem, 3vw, 2rem);
  font-weight: 700;
  color: var(--aly-text);
  line-height: 1.2;
  text-wrap: balance;
  margin: 0;
}

.screen-connect .connect-heading p {
  font-size: 0.95rem;
  color: var(--aly-dim);
  line-height: 1.6;
  margin: 0;
  max-width: 52ch;
}

/* ── Read-only trust banner ── */
.screen-connect .connect-trust {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-4, 1rem);
  padding: var(--sp-5, 1.25rem) var(--sp-5, 1.25rem);
  background: rgba(200, 164, 90, 0.07);
  border: 1px solid rgba(200, 164, 90, 0.22);
  border-radius: var(--r-lg, 12px);
}

.screen-connect .connect-trust-icon {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(200, 164, 90, 0.14);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--aly-gold);
  margin-top: 1px;
}

.screen-connect .connect-trust-icon .ic {
  width: 18px;
  height: 18px;
}

.screen-connect .connect-trust-body {
  flex: 1;
  min-width: 0;
}

.screen-connect .connect-trust-body strong {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--aly-gold);
  margin-bottom: var(--sp-1, 0.25rem);
}

.screen-connect .connect-trust-body p {
  font-size: 0.88rem;
  color: var(--aly-dim);
  line-height: 1.55;
  margin: 0;
}

.screen-connect .connect-trust-pillars {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2, 0.5rem);
  margin-top: var(--sp-3, 0.75rem);
}

.screen-connect .connect-trust-pillar {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.75rem;
  color: var(--aly-mute);
  padding: 3px 8px;
  border: 1px solid var(--aly-line);
  border-radius: 100px;
  background: transparent;
}

.screen-connect .connect-trust-pillar .ic {
  width: 11px;
  height: 11px;
  opacity: 0.7;
}

/* ── Section label above options ── */
.screen-connect .connect-section-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--aly-mute);
}

/* ── Option cards grid ── */
.screen-connect .connect-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-3, 0.75rem);
}

/* ── Individual option card ── */
.screen-connect .connect-opt {
  position: relative;
  background: var(--aly-panel);
  border: 1px solid var(--aly-line);
  border-radius: var(--r-lg, 12px);
  padding: var(--sp-5, 1.25rem);
  cursor: pointer;
  transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  display: flex;
  flex-direction: column;
  gap: var(--sp-3, 0.75rem);
  outline: none;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}

.screen-connect .connect-opt:hover {
  border-color: rgba(200, 164, 90, 0.4);
  background: var(--aly-panel-2, #181d24);
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}

.screen-connect .connect-opt:focus-visible {
  border-color: var(--aly-gold);
  box-shadow: 0 0 0 2px rgba(200,164,90,0.3);
}

.screen-connect .connect-opt.is-connected {
  border-color: rgba(41, 179, 122, 0.45);
  background: rgba(41, 179, 122, 0.04);
}

.screen-connect .connect-opt.is-connected:hover {
  border-color: rgba(41, 179, 122, 0.65);
}

.screen-connect .connect-opt-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-2, 0.5rem);
}

.screen-connect .connect-opt-logo {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 800;
  font-family: var(--aly-sans);
  flex-shrink: 0;
  letter-spacing: -0.02em;
}

.screen-connect .connect-opt-logo.t212 {
  background: rgba(41, 124, 255, 0.14);
  color: #4C8DFF;
  font-size: 0.75rem;
}

.screen-connect .connect-opt-logo.ibkr {
  background: rgba(229, 72, 77, 0.13);
  color: #E5484D;
  font-size: 0.75rem;
}

.screen-connect .connect-opt-logo.csv {
  background: rgba(200, 164, 90, 0.12);
  color: var(--aly-gold);
}

.screen-connect .connect-opt-logo.manual {
  background: rgba(166, 174, 188, 0.1);
  color: var(--aly-dim);
}

.screen-connect .connect-opt-logo .ic {
  width: 20px;
  height: 20px;
}

.screen-connect .connect-opt-status {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.72rem;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 100px;
}

.screen-connect .connect-opt-status.available {
  color: var(--aly-mute);
  background: rgba(107, 114, 128, 0.1);
  border: 1px solid rgba(107, 114, 128, 0.2);
}

.screen-connect .connect-opt-status.connected {
  color: #29B37A;
  background: rgba(41, 179, 122, 0.1);
  border: 1px solid rgba(41, 179, 122, 0.25);
}

.screen-connect .connect-opt-status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.screen-connect .connect-opt-name {
  font-family: var(--aly-sans);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--aly-text);
  margin: 0;
  line-height: 1.2;
}

.screen-connect .connect-opt-desc {
  font-size: 0.8rem;
  color: var(--aly-mute);
  line-height: 1.45;
  margin: 0;
}

.screen-connect .connect-opt-scope {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-top: var(--sp-1, 0.25rem);
}

.screen-connect .connect-opt-scope-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.73rem;
  color: var(--aly-mute);
}

.screen-connect .connect-opt-scope-item .ic {
  width: 10px;
  height: 10px;
  color: var(--aly-mute);
}

/* Connected preview inside card */
.screen-connect .connect-opt-preview {
  margin-top: var(--sp-1, 0.25rem);
  padding-top: var(--sp-3, 0.75rem);
  border-top: 1px solid var(--aly-line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-2, 0.5rem);
}

.screen-connect .connect-opt-preview-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.screen-connect .connect-opt-preview-val {
  font-family: var(--aly-mono);
  font-size: 1rem;
  font-weight: 600;
  color: var(--aly-text);
  line-height: 1;
}

.screen-connect .connect-opt-preview-lbl {
  font-size: 0.72rem;
  color: var(--aly-mute);
}

.screen-connect .connect-opt-preview-sync {
  font-size: 0.72rem;
  color: var(--aly-mute);
  text-align: right;
}

/* ── Inline consent panel (OAuth mock) ── */
.screen-connect .connect-consent {
  background: var(--aly-panel);
  border: 1px solid var(--aly-line);
  border-radius: var(--r-lg, 12px);
  overflow: hidden;
  display: none;
  flex-direction: column;
}

.screen-connect .connect-consent.is-open {
  display: flex;
}

.screen-connect .connect-consent-hd {
  padding: var(--sp-5, 1.25rem) var(--sp-5, 1.25rem) var(--sp-4, 1rem);
  border-bottom: 1px solid var(--aly-line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-3, 0.75rem);
}

.screen-connect .connect-consent-title {
  font-family: var(--aly-serif);
  font-size: 1rem;
  font-weight: 600;
  color: var(--aly-text);
  margin: 0;
}

.screen-connect .connect-consent-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--aly-mute);
  padding: 4px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  transition: color 0.15s;
}

.screen-connect .connect-consent-close:hover {
  color: var(--aly-text);
}

.screen-connect .connect-consent-close .ic {
  width: 18px;
  height: 18px;
}

.screen-connect .connect-consent-bd {
  padding: var(--sp-5, 1.25rem);
  display: flex;
  flex-direction: column;
  gap: var(--sp-4, 1rem);
}

.screen-connect .connect-consent-intro {
  font-size: 0.88rem;
  color: var(--aly-dim);
  line-height: 1.55;
  margin: 0;
}

.screen-connect .connect-consent-scopes {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2, 0.5rem);
}

.screen-connect .connect-consent-scope-row {
  display: flex;
  align-items: center;
  gap: var(--sp-3, 0.75rem);
  padding: var(--sp-3, 0.75rem);
  background: rgba(41, 179, 122, 0.04);
  border: 1px solid rgba(41, 179, 122, 0.18);
  border-radius: 8px;
}

.screen-connect .connect-consent-scope-row.denied {
  background: rgba(229, 72, 77, 0.04);
  border-color: rgba(229, 72, 77, 0.18);
}

.screen-connect .connect-consent-scope-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.screen-connect .connect-consent-scope-row:not(.denied) .connect-consent-scope-icon {
  background: rgba(41, 179, 122, 0.12);
  color: #29B37A;
}

.screen-connect .connect-consent-scope-row.denied .connect-consent-scope-icon {
  background: rgba(229, 72, 77, 0.12);
  color: #E5484D;
}

.screen-connect .connect-consent-scope-icon .ic {
  width: 14px;
  height: 14px;
}

.screen-connect .connect-consent-scope-text {
  flex: 1;
  min-width: 0;
}

.screen-connect .connect-consent-scope-label {
  font-size: 0.84rem;
  font-weight: 500;
  color: var(--aly-text);
  line-height: 1.2;
}

.screen-connect .connect-consent-scope-sub {
  font-size: 0.75rem;
  color: var(--aly-mute);
  margin-top: 2px;
}

.screen-connect .connect-consent-ft {
  display: flex;
  align-items: center;
  gap: var(--sp-3, 0.75rem);
  padding: var(--sp-4, 1rem) var(--sp-5, 1.25rem);
  border-top: 1px solid var(--aly-line);
  background: var(--aly-panel-2, #181d24);
}

.screen-connect .connect-consent-ft .btn {
  flex: 1;
}

/* ── Syncing animation ── */
.screen-connect .connect-syncing {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-3, 0.75rem);
  padding: var(--sp-6, 1.5rem);
  text-align: center;
}

.screen-connect .connect-syncing.is-active {
  display: flex;
}

.screen-connect .connect-syncing-spinner {
  width: 36px;
  height: 36px;
  border: 2px solid var(--aly-line);
  border-top-color: var(--aly-gold);
  border-radius: 50%;
  animation: connect-spin 0.7s linear infinite;
}

@media (prefers-reduced-motion: reduce) {
  .screen-connect .connect-syncing-spinner {
    animation: none;
    border-top-color: var(--aly-gold);
  }
}

@keyframes connect-spin {
  to { transform: rotate(360deg); }
}

.screen-connect .connect-syncing-text {
  font-size: 0.88rem;
  color: var(--aly-dim);
}

/* ── CSV drop zone ── */
.screen-connect .connect-dropzone {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-3, 0.75rem);
  padding: var(--sp-8, 2rem) var(--sp-5, 1.25rem);
  border: 2px dashed var(--aly-line);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 0.18s, background 0.18s;
  text-align: center;
}

.screen-connect .connect-dropzone.is-open {
  display: flex;
}

.screen-connect .connect-dropzone:hover,
.screen-connect .connect-dropzone.is-dragging {
  border-color: var(--aly-gold);
  background: rgba(200, 164, 90, 0.04);
}

.screen-connect .connect-dropzone .ic {
  width: 32px;
  height: 32px;
  color: var(--aly-gold);
  opacity: 0.7;
}

.screen-connect .connect-dropzone-label {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--aly-dim);
  line-height: 1.45;
}

.screen-connect .connect-dropzone-sub {
  font-size: 0.76rem;
  color: var(--aly-mute);
}

/* ── Manual add-holding mini form ── */
.screen-connect .connect-manual-form {
  display: none;
  flex-direction: column;
  gap: var(--sp-4, 1rem);
  padding: var(--sp-5, 1.25rem);
  background: var(--aly-panel);
  border: 1px solid var(--aly-line);
  border-radius: var(--r-lg, 12px);
}

.screen-connect .connect-manual-form.is-open {
  display: flex;
}

.screen-connect .connect-manual-form-hd {
  font-family: var(--aly-serif);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--aly-text);
}

.screen-connect .connect-manual-fields {
  display: grid;
  grid-template-columns: 2fr 1fr 1.5fr;
  gap: var(--sp-3, 0.75rem);
}

.screen-connect .connect-manual-form .field {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1, 0.25rem);
}

/* ── Preview holdings list (manual + post-connect) ── */
.screen-connect .connect-preview {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1, 0.25rem);
}

.screen-connect .connect-preview-hd {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--aly-mute);
  padding: 0 0 var(--sp-2, 0.5rem);
}

.screen-connect .connect-preview-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-3, 0.75rem);
  padding: var(--sp-3, 0.75rem) var(--sp-4, 1rem);
  background: var(--aly-panel-2, #181d24);
  border-radius: 8px;
  border: 1px solid var(--aly-line);
  animation: connect-row-in 0.2s ease both;
}

@keyframes connect-row-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.screen-connect .connect-preview-sym {
  font-family: var(--aly-mono);
  font-size: 0.84rem;
  font-weight: 600;
  color: var(--aly-text);
  min-width: 52px;
}

.screen-connect .connect-preview-name {
  flex: 1;
  font-size: 0.8rem;
  color: var(--aly-dim);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.screen-connect .connect-preview-shares {
  font-family: var(--aly-mono);
  font-size: 0.8rem;
  color: var(--aly-mute);
  text-align: right;
}

.screen-connect .connect-preview-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--aly-mute);
  padding: 2px;
  display: flex;
  align-items: center;
  border-radius: 4px;
  transition: color 0.15s;
  flex-shrink: 0;
}

.screen-connect .connect-preview-remove:hover { color: #E5484D; }
.screen-connect .connect-preview-remove .ic { width: 14px; height: 14px; }

/* ── Continue / bottom actions ── */
.screen-connect .connect-actions {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3, 0.75rem);
  align-items: stretch;
}

.screen-connect .connect-skip {
  text-align: center;
  font-size: 0.82rem;
  color: var(--aly-mute);
  cursor: pointer;
  background: none;
  border: none;
  padding: var(--sp-2, 0.5rem);
  transition: color 0.15s;
  width: 100%;
}

.screen-connect .connect-skip:hover { color: var(--aly-dim); }

/* ── Step progress (tiny, at top) ── */
.screen-connect .connect-steps {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}

.screen-connect .connect-step-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--aly-line);
  transition: background 0.2s, width 0.2s;
}

.screen-connect .connect-step-dot.is-now {
  background: var(--aly-gold);
  width: 18px;
  border-radius: 3px;
}

.screen-connect .connect-step-dot.is-done {
  background: #29B37A;
}

/* ── Responsive ── */
@media (max-width: 560px) {
  .screen-connect {
    padding: var(--sp-6, 1.5rem) var(--sp-4, 1rem) var(--sp-10, 2.5rem);
  }

  .screen-connect .connect-options {
    grid-template-columns: 1fr;
  }

  .screen-connect .connect-manual-fields {
    grid-template-columns: 1fr 1fr;
  }

  .screen-connect .connect-manual-fields .field:first-child {
    grid-column: 1 / -1;
  }
}


/* ===================== screen: dashboard.css ===================== */
/* ============================================================================
   SCREEN: dashboard — Home (hero + score rings + advisor note + rec + market +
   earnings + recent changes + quick actions).
   Only LAYOUT rules, every selector scoped under .screen-dashboard.
   Shared component classes (.card/.rec/.ev/.pill/.metric/.segmented/…) come
   from the shell — never redefined here.
   ============================================================================ */

/* --- Reveal: the kernel adds `.is-in` to [data-reveal] nodes; the shell keys
   its reveal animation off `.revealed`, so we translate `.is-in` into the same
   entrance here (scoped) to guarantee our cards actually appear + animate. --- */
.screen-dashboard [data-reveal]{
  opacity:0;
  transform:translateY(10px);
  transition:opacity var(--dur-base,.42s) var(--aly-ease,cubic-bezier(.22,.61,.36,1)),
             transform var(--dur-base,.42s) var(--aly-ease,cubic-bezier(.22,.61,.36,1));
  will-change:opacity,transform;
}
.screen-dashboard [data-reveal].is-in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){
  .screen-dashboard [data-reveal]{opacity:1;transform:none;transition:none}
}

/* --- Page rhythm --- */
.screen-dashboard{padding-block:var(--s-2) var(--s-7)}
.screen-dashboard .dash-head{margin-bottom:var(--s-5)}
.screen-dashboard .dash-eyebrow{
  display:flex;align-items:center;gap:var(--s-2);
}
.screen-dashboard .dash-asof{color:var(--aly-mute);font-family:var(--aly-mono);font-variant-numeric:tabular-nums}

/* --- Master 12-col grid; sections span it responsively --- */
.screen-dashboard .dash-grid{
  display:grid;
  grid-template-columns:repeat(12,minmax(0,1fr));
  gap:var(--s-4);
  align-items:start;
}
.screen-dashboard .col-hero{grid-column:span 8}
.screen-dashboard .col-side{grid-column:span 4}
.screen-dashboard .col-half{grid-column:span 6}
.screen-dashboard .col-third{grid-column:span 4}
.screen-dashboard .col-full{grid-column:1 / -1}

/* ---------------------------------------------------------------------------
   HERO — portfolio value + P/L + area chart with range toggle
   --------------------------------------------------------------------------- */
.screen-dashboard .hero{display:flex;flex-direction:column;gap:var(--s-4)}
.screen-dashboard .hero-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:var(--s-4);flex-wrap:wrap;
}
.screen-dashboard .hero-greet{
  font-family:var(--aly-serif);font-size:var(--fs-h2);line-height:var(--lh-h2);
  color:var(--aly-dim);font-weight:500;margin-bottom:var(--s-2);
}
.screen-dashboard .hero-total{
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;
  font-size:var(--fs-display,44px);line-height:1;font-weight:600;
  letter-spacing:-.015em;color:var(--aly-text);
}
.screen-dashboard .hero-pl{display:flex;flex-wrap:wrap;gap:var(--s-2) var(--s-5);margin-top:var(--s-3)}
.screen-dashboard .hero-pl .pl-item{display:flex;flex-direction:column;gap:2px}
.screen-dashboard .hero-pl .pl-lbl{
  font-size:var(--fs-micro);line-height:var(--lh-micro);text-transform:uppercase;
  letter-spacing:.11em;color:var(--aly-mute);font-weight:600;
}
.screen-dashboard .hero-pl .pl-val{display:flex;align-items:baseline;gap:var(--s-2)}
.screen-dashboard .hero-pl .pl-abs{
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;
  font-size:17px;font-weight:600;
}
.screen-dashboard .hero-pl .pl-abs.up{color:var(--aly-pos)}
.screen-dashboard .hero-pl .pl-abs.down{color:var(--aly-neg)}
.screen-dashboard .hero-pl .pl-abs.flat{color:var(--aly-mute)}

.screen-dashboard .hero-chart{position:relative;width:100%}
.screen-dashboard .hero-chart canvas{width:100%;display:block}
.screen-dashboard .hero-range{align-self:flex-start}
.screen-dashboard .hero-foot{
  display:flex;align-items:center;justify-content:space-between;gap:var(--s-3);
  flex-wrap:wrap;color:var(--aly-mute);font-size:var(--fs-cap);
}

/* ---------------------------------------------------------------------------
   SCORE RINGS — 4 scorecards
   --------------------------------------------------------------------------- */
.screen-dashboard .scores-grid{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:var(--s-4);
}
.screen-dashboard .scorecard{height:100%}
.screen-dashboard .sc-band{
  font-size:var(--fs-cap);color:var(--aly-dim);font-weight:500;margin-top:2px;
}
.screen-dashboard .sc-meta{display:flex;flex-direction:column;gap:var(--s-2);min-width:0}
.screen-dashboard .sc-name{
  font-size:var(--fs-cap);text-transform:uppercase;letter-spacing:.08em;
  color:var(--aly-mute);font-weight:600;
}
.screen-dashboard .ring-wrap{width:84px;height:84px}

/* ---------------------------------------------------------------------------
   ADVISOR MESSAGE
   --------------------------------------------------------------------------- */
.screen-dashboard .advisor-card .adv-head{display:flex;align-items:center;gap:var(--s-3)}
.screen-dashboard .advisor-card .adv-id{display:flex;flex-direction:column;gap:1px;min-width:0}
.screen-dashboard .advisor-card .adv-role{font-weight:600;color:var(--aly-text);font-size:var(--fs-body)}
.screen-dashboard .advisor-card .adv-sub{color:var(--aly-mute);font-size:var(--fs-cap)}
.screen-dashboard .advisor-card .adv-body{
  font-family:var(--aly-serif);font-size:16px;line-height:1.6;color:var(--aly-text);
  margin:var(--s-4) 0 var(--s-4);
}
.screen-dashboard .advisor-card .adv-ev{display:flex;flex-wrap:wrap;gap:var(--s-2)}

/* ---------------------------------------------------------------------------
   RECOMMENDATION (.rec shared) — dashboard adds layout only
   --------------------------------------------------------------------------- */
.screen-dashboard .rec .rec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s-3)}
.screen-dashboard .rec .rec-sym{
  display:flex;align-items:center;gap:var(--s-2);
  font-family:var(--aly-mono);font-weight:600;color:var(--aly-dim);font-size:var(--fs-cap);
}
.screen-dashboard .rec .rec-what{color:var(--aly-dim);font-size:var(--fs-body);line-height:var(--lh-body)}
.screen-dashboard .rec .rec-links{display:flex;flex-wrap:wrap;gap:var(--s-2)}
.screen-dashboard .rec .confbar{margin-top:var(--s-1)}
.screen-dashboard .rec .conf-row{display:flex;align-items:center;gap:var(--s-3)}
.screen-dashboard .rec .conf-row .confbar{flex:1;min-width:120px}
.screen-dashboard .rec .conf-num{
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;
  font-size:var(--fs-cap);color:var(--aly-dim);flex:none;
}

/* ---------------------------------------------------------------------------
   MARKET SUMMARY
   --------------------------------------------------------------------------- */
.screen-dashboard .mkt-indices{display:flex;flex-direction:column;gap:var(--s-1)}
.screen-dashboard .mkt-row{
  display:flex;align-items:center;justify-content:space-between;gap:var(--s-3);
  padding:var(--s-2) 0;border-bottom:1px solid var(--aly-line);
}
.screen-dashboard .mkt-row:last-child{border-bottom:0}
.screen-dashboard .mkt-name{color:var(--aly-dim);font-size:var(--fs-body)}
.screen-dashboard .mkt-vals{display:flex;align-items:baseline;gap:var(--s-3)}
.screen-dashboard .mkt-val{
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;color:var(--aly-text);
  font-size:var(--fs-body);
}
.screen-dashboard .mkt-chg{
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:var(--fs-cap);
  min-width:60px;text-align:right;
}
.screen-dashboard .mkt-chg.up{color:var(--aly-pos)}
.screen-dashboard .mkt-chg.down{color:var(--aly-neg)}
.screen-dashboard .mkt-chg.flat{color:var(--aly-mute)}
.screen-dashboard .mkt-summary{color:var(--aly-dim);font-size:var(--fs-cap);line-height:var(--lh-cap);margin-top:var(--s-3)}

/* ---------------------------------------------------------------------------
   EARNINGS
   --------------------------------------------------------------------------- */
.screen-dashboard .earn-list{display:flex;flex-direction:column}
.screen-dashboard .earn-row{
  display:flex;align-items:center;gap:var(--s-3);
  padding:var(--s-3) 0;border-bottom:1px solid var(--aly-line);
  text-align:left;width:100%;background:none;border-left:0;border-right:0;border-top:0;
  color:inherit;cursor:pointer;font:inherit;
  transition:padding-left var(--dur-fast,.16s) var(--aly-ease);
}
.screen-dashboard .earn-row:first-child{padding-top:0}
.screen-dashboard .earn-row:last-child{border-bottom:0;padding-bottom:0}
.screen-dashboard .earn-row:hover .earn-sym,
.screen-dashboard .earn-row:focus-visible .earn-sym{color:var(--aly-gold)}
.screen-dashboard .earn-row:focus-visible{outline:2px solid var(--aly-gold-line,var(--aly-gold));outline-offset:3px;border-radius:var(--r-sm)}
.screen-dashboard .earn-cal{
  width:44px;flex:none;text-align:center;border:1px solid var(--aly-line);
  border-radius:var(--r-sm);padding:4px 0;line-height:1.1;
}
.screen-dashboard .earn-cal .m{
  font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--aly-mute);font-weight:700;
}
.screen-dashboard .earn-cal .d{
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:16px;
  font-weight:600;color:var(--aly-text);
}
.screen-dashboard .earn-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.screen-dashboard .earn-sym{
  font-family:var(--aly-mono);font-weight:600;color:var(--aly-text);font-size:var(--fs-body);
  transition:color var(--dur-fast,.16s) var(--aly-ease);
}
.screen-dashboard .earn-name{
  color:var(--aly-mute);font-size:var(--fs-cap);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.screen-dashboard .earn-meta{display:flex;align-items:center;gap:var(--s-2);flex:none}
.screen-dashboard .earn-when{color:var(--aly-mute);font-family:var(--aly-mono);font-size:var(--fs-micro)}

/* ---------------------------------------------------------------------------
   RECENT CHANGES
   --------------------------------------------------------------------------- */
.screen-dashboard .rc-list{display:flex;flex-direction:column}
.screen-dashboard .rc-row{
  display:flex;align-items:flex-start;gap:var(--s-3);
  padding:var(--s-3) 0;border-bottom:1px solid var(--aly-line);
  text-align:left;width:100%;background:none;border-left:0;border-right:0;border-top:0;
  color:inherit;cursor:pointer;font:inherit;
}
.screen-dashboard .rc-row:first-child{padding-top:0}
.screen-dashboard .rc-row:last-child{border-bottom:0;padding-bottom:0}
.screen-dashboard .rc-row:hover .rc-title,
.screen-dashboard .rc-row:focus-visible .rc-title{color:var(--aly-gold)}
.screen-dashboard .rc-row:focus-visible{outline:2px solid var(--aly-gold-line,var(--aly-gold));outline-offset:3px;border-radius:var(--r-sm)}
.screen-dashboard .rc-mark{
  flex:none;width:24px;height:24px;border-radius:var(--r-full);
  display:grid;place-items:center;margin-top:1px;
  background:var(--aly-panel-2);color:var(--aly-mute);border:1px solid var(--aly-line);
}
.screen-dashboard .rc-mark.up{color:var(--aly-pos)}
.screen-dashboard .rc-mark.down{color:var(--aly-neg)}
.screen-dashboard .rc-mark .ic{font-size:14px}
.screen-dashboard .rc-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.screen-dashboard .rc-title{
  font-size:var(--fs-body);color:var(--aly-text);line-height:1.35;
  transition:color var(--dur-fast,.16s) var(--aly-ease);
}
.screen-dashboard .rc-from-to{
  display:flex;align-items:center;gap:var(--s-2);flex-wrap:wrap;
  font-family:var(--aly-mono);font-variant-numeric:tabular-nums;font-size:var(--fs-cap);
}
.screen-dashboard .rc-from{color:var(--aly-mute)}
.screen-dashboard .rc-to{color:var(--aly-text);font-weight:600}
.screen-dashboard .rc-arrow{color:var(--aly-mute);font-size:12px;display:inline-flex}
.screen-dashboard .rc-top{display:flex;align-items:center;gap:var(--s-2);flex-wrap:wrap}

/* ---------------------------------------------------------------------------
   QUICK ACTIONS
   --------------------------------------------------------------------------- */
.screen-dashboard .qa-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--s-3);
}
.screen-dashboard .qa-btn{
  display:flex;align-items:center;gap:var(--s-3);
  padding:var(--s-3) var(--s-4);text-align:left;
  border:1px solid var(--aly-line);border-radius:var(--r-md);
  background:var(--aly-panel-2);color:var(--aly-text);cursor:pointer;font:inherit;
  transition:border-color var(--dur-fast,.16s) var(--aly-ease),
             transform var(--dur-fast,.16s) var(--aly-ease),
             background var(--dur-fast,.16s) var(--aly-ease);
}
.screen-dashboard .qa-btn:hover{border-color:var(--aly-line-strong,var(--aly-gold-line));transform:translateY(-1px)}
.screen-dashboard .qa-btn:focus-visible{outline:2px solid var(--aly-gold-line,var(--aly-gold));outline-offset:2px}
.screen-dashboard .qa-btn .qa-ic{
  flex:none;width:34px;height:34px;border-radius:var(--r-sm);
  display:grid;place-items:center;background:var(--aly-gold-soft);color:var(--aly-gold);
}
.screen-dashboard .qa-btn .qa-ic .ic{font-size:18px}
.screen-dashboard .qa-btn .qa-lbl{display:flex;flex-direction:column;gap:1px;min-width:0}
.screen-dashboard .qa-btn .qa-t{font-weight:600;font-size:var(--fs-body)}
.screen-dashboard .qa-btn .qa-s{color:var(--aly-mute);font-size:var(--fs-micro);line-height:1.3}

/* --- Shared small helpers used inside cards --- */
.screen-dashboard .card-more{
  display:inline-flex;align-items:center;gap:4px;color:var(--aly-dim);
  font-size:var(--fs-cap);font-weight:600;background:none;border:0;cursor:pointer;padding:0;
  transition:color var(--dur-fast,.16s) var(--aly-ease);
}
.screen-dashboard .card-more:hover{color:var(--aly-gold)}
.screen-dashboard .card-more .ic{font-size:14px}

/* ---------------------------------------------------------------------------
   RESPONSIVE — collapse the 12-col grid gracefully
   --------------------------------------------------------------------------- */
@media (max-width:1080px){
  .screen-dashboard .scores-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:900px){
  .screen-dashboard .col-hero,
  .screen-dashboard .col-side,
  .screen-dashboard .col-half,
  .screen-dashboard .col-third{grid-column:1 / -1}
}
@media (max-width:560px){
  .screen-dashboard .scores-grid{grid-template-columns:1fr}
  .screen-dashboard .qa-grid{grid-template-columns:1fr}
  .screen-dashboard .hero-total{font-size:34px}
  .screen-dashboard .earn-name{white-space:normal}
}


/* ===================== screen: memory.css ===================== */
/* ── memory.css — scoped entirely under .screen-memory ── */

/* ─── Page layout ─── */
.screen-memory {
  padding: var(--sp-6) 0 var(--sp-8);
}

.screen-memory .mem-header {
  margin-bottom: var(--sp-6);
}

.screen-memory .mem-header-inner {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--sp-4);
  flex-wrap: wrap;
}

.screen-memory .mem-title-block {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1);
}

.screen-memory .mem-eyebrow {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-wrap: wrap;
}

.screen-memory .mem-headline {
  font-family: var(--aly-serif);
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--aly-text);
  line-height: 1.2;
  text-wrap: balance;
  margin: 0;
}

.screen-memory .mem-sub {
  font-size: 0.875rem;
  color: var(--aly-dim);
  line-height: 1.5;
  max-width: 56ch;
  margin: var(--sp-1) 0 0;
}

/* ─── Section layout ─── */
.screen-memory .mem-section {
  margin-bottom: var(--sp-5);
}

.screen-memory .mem-section-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-3);
  margin-bottom: var(--sp-3);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--aly-line);
}

.screen-memory .mem-section-label {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.screen-memory .mem-section-label .ic {
  color: var(--aly-gold);
  opacity: 0.85;
  flex-shrink: 0;
}

.screen-memory .mem-section-title {
  font-family: var(--aly-serif);
  font-size: 1.0625rem;
  font-weight: 600;
  color: var(--aly-text);
  letter-spacing: 0.01em;
  margin: 0;
}

.screen-memory .mem-section-count {
  font-family: var(--aly-mono);
  font-size: 0.75rem;
  color: var(--aly-mute);
  background: var(--aly-panel-2);
  border: 1px solid var(--aly-line);
  border-radius: 10px;
  padding: 0 6px;
  line-height: 1.6;
}

/* ─── Item cards ─── */
.screen-memory .mem-item {
  background: var(--aly-panel);
  border: 1px solid var(--aly-line);
  border-radius: var(--radius-md);
  padding: var(--sp-4);
  transition: border-color 150ms var(--aly-ease), box-shadow 150ms var(--aly-ease);
  position: relative;
  overflow: hidden;
}

.screen-memory .mem-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 100%;
  background: transparent;
  transition: background 150ms var(--aly-ease);
  border-radius: var(--radius-md) 0 0 var(--radius-md);
}

.screen-memory .mem-item:hover {
  border-color: color-mix(in srgb, var(--aly-gold) 30%, var(--aly-line));
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
}

.screen-memory .mem-item:hover::before {
  background: var(--aly-gold);
  opacity: 0.6;
}

.screen-memory .mem-item.is-editing {
  border-color: var(--aly-gold);
  box-shadow: 0 0 0 1px var(--aly-gold-soft), 0 4px 20px rgba(0, 0, 0, 0.3);
}

.screen-memory .mem-item.is-editing::before {
  background: var(--aly-gold);
  opacity: 1;
}

.screen-memory .mem-item.is-removing {
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 300ms var(--aly-ease), transform 300ms var(--aly-ease);
}

.screen-memory .mem-items-stack {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
}

/* ─── Item header row ─── */
.screen-memory .mem-item-hd {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--sp-3);
  margin-bottom: var(--sp-2);
}

.screen-memory .mem-item-text {
  font-size: 0.9375rem;
  color: var(--aly-text);
