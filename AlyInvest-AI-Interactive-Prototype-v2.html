    canvas.setAttribute('role', 'img');
    chartWrap.appendChild(canvas);
    bd.appendChild(chartWrap);

    card.appendChild(hd);
    card.appendChild(bd);

    /* Register after card is in DOM (caller appends) — draw deferred via App.onResize */
    var drawChart = function () {
      var pts = (portfolio.ranges && portfolio.ranges[activeRange]) ||
                portfolio.history || [];
      Charts.area(canvas, pts, { color: HEX.gold, fill: true, height: 220 });
    };
    App.onResize(drawChart);

    return card;
  }

  /* ── Build donut + legend card ──────────────────────────────── */
  function buildDonutCard(sectors) {
    var card = el('div', 'card pf-donut-card');
    card.setAttribute('data-reveal', '');

    var hd = el('div', 'card-hd');
    var titleEl = el('h2', 'card-title');
    titleEl.textContent = 'Sector Allocation';
    hd.appendChild(titleEl);

    var bd = el('div', 'card-bd');

    var donutWrap = el('div', 'pf-donut-wrap');
    var cv = document.createElement('canvas');
    cv.setAttribute('aria-label', 'Sector allocation donut chart');
    cv.setAttribute('role', 'img');
    donutWrap.appendChild(cv);

    var segs = (sectors || []).map(function (s, i) {
      return {
        label: s.name,
        value: s.weight,
        color: s.color || SECTOR_COLORS[i % SECTOR_COLORS.length]
      };
    });

    App.onResize(function () {
      Charts.donut(cv, segs, { thickness: 0.42, height: 200 });
    });

    /* Legend */
    var legend = el('div', 'pf-donut-legend');
    segs.forEach(function (s) {
      var row = el('div', 'pf-legend-row');
      var dot = el('span', 'pf-legend-dot');
      dot.style.background = s.color;
      var name = el('span', 'pf-legend-name');
      name.textContent = s.label;
      var pct = el('span', 'pf-legend-val');
      pct.textContent = App.fmt.pct(s.value);
      row.appendChild(dot);
      row.appendChild(name);
      row.appendChild(pct);
      legend.appendChild(row);
    });

    bd.appendChild(donutWrap);
    bd.appendChild(legend);
    card.appendChild(hd);
    card.appendChild(bd);
    return card;
  }

  /* ── Build diversification card ─────────────────────────────── */
  function buildDiversificationCard(scores, portfolio) {
    var div = scores.diversification || {};
    var hhi = div.hhi || 0;
    var hhiPrev = div.hhiPrev || hhi;
    var techSector = (portfolio.sectors || []).find(function (s) {
      return s.name && s.name.toLowerCase().indexOf('tech') !== -1;
    }) || {};
    var techWeight = techSector.weight || 35.23;

    var card = el('div', 'card');
    card.setAttribute('data-reveal', '');

    var hd = el('div', 'card-hd');
    var titleEl = el('h2', 'card-title');
    titleEl.textContent = 'Diversification';
    var sub = el('p', 'card-sub');
    sub.textContent = 'HHI-based concentration analysis';
    hd.appendChild(titleEl);
    hd.appendChild(sub);

    var bd = el('div', 'card-bd');

    /* Stat grid */
    var grid = el('div', 'pf-stat-grid');

    /* Diversification score */
    var scoreMetric = el('div', 'metric');
    var scoreVal = el('div', 'metric-val');
    scoreVal.textContent = div.value || 58;
    var scoreLbl = el('div', 'metric-lbl');
    scoreLbl.textContent = 'Score (0–100)';
    var scoreDelta = el('span', deltaClass(div.delta || -3));
    scoreDelta.innerHTML = arrowIcon(div.delta || -3) +
      deltaStr(div.delta || -3, App.fmt.pct);
    scoreMetric.appendChild(scoreVal);
    scoreMetric.appendChild(scoreLbl);
    scoreMetric.appendChild(scoreDelta);

    /* HHI */
    var hhiMetric = el('div', 'metric');
    var hhiVal = el('div', 'metric-val');
    hhiVal.textContent = hhi ? hhi.toFixed(3) : '0.203';
    var hhiLbl = el('div', 'metric-lbl');
    hhiLbl.textContent = 'HHI';
    var hhiNote = el('span', 'metric-lbl');
    hhiNote.textContent = 'prev ' + (hhiPrev ? hhiPrev.toFixed(3) : '0.193');
    hhiMetric.appendChild(hhiVal);
    hhiMetric.appendChild(hhiLbl);
    hhiMetric.appendChild(hhiNote);

    /* Tech concentration */
    var techMetric = el('div', 'metric');
    var techVal = el('div', 'metric-val');
    techVal.style.color = HEX.warn;
    techVal.textContent = App.fmt.pct(techWeight);
    var techLbl = el('div', 'metric-lbl');
    techLbl.textContent = 'Technology weight';
    techMetric.appendChild(techVal);
    techMetric.appendChild(techLbl);

    /* Band */
    var bandMetric = el('div', 'metric');
    var bandVal = el('div', 'metric-val');
    bandVal.textContent = div.band || 'Fair';
    var bandLbl = el('div', 'metric-lbl');
    bandLbl.textContent = 'Band';
    bandMetric.appendChild(bandVal);
    bandMetric.appendChild(bandLbl);

    grid.appendChild(scoreMetric);
    grid.appendChild(hhiMetric);
    grid.appendChild(techMetric);
    grid.appendChild(bandMetric);
    bd.appendChild(grid);

    /* Tech concentration bar */
    var barLbl = el('div', 'metric-lbl');
    barLbl.textContent = 'Technology concentration vs 35% ceiling';
    var bar = el('div', 'pf-concentration-bar');
    var fill = el('div', 'pf-concentration-fill' + (techWeight >= 35 ? ' over' : ''));
    fill.style.width = Math.min(techWeight / 50 * 100, 100) + '%';
    bar.appendChild(fill);

    /* 35% ceiling marker label */
    var pctLbl = el('div', '');
    pctLbl.style.cssText = 'display:flex;justify-content:flex-end;';
    var pctSpan = el('span', 'prov');
    pctSpan.textContent = 'Ceiling 35% (Moderately Aggressive)';
    pctLbl.appendChild(pctSpan);

    bd.appendChild(barLbl);
    bd.appendChild(bar);
    bd.appendChild(pctLbl);

    /* Evidence chip + explanation note */
    var noteWrap = el('div', 'pf-divider-note');
    var evChip = el('span', 'ev ev--analysis');
    evChip.textContent = 'Analysis';
    noteWrap.appendChild(evChip);
    var noteText = document.createTextNode(
      ' Technology sits at the Moderately-Aggressive 35% sector ceiling. ' +
      'Adding further large-cap tech exposure would concentrate risk — ' +
      'consider trimming or diversifying into other sectors.'
    );
    noteWrap.appendChild(noteText);
    bd.appendChild(noteWrap);

    card.appendChild(hd);
    card.appendChild(bd);
    return card;
  }

  /* ── Build score card (ring) ────────────────────────────────── */
  function buildScoreCard(label, scoreObj, color, sublabel) {
    var card = el('div', 'card pf-score-card');
    card.setAttribute('data-reveal', '');

    var lbl = el('div', 'pf-score-label');
    lbl.textContent = label;
    card.appendChild(lbl);

    var ringWrap = el('div', 'ring-wrap');
    var cv = document.createElement('canvas');
    cv.setAttribute('aria-label', label + ' score ring');
    cv.setAttribute('role', 'img');
    ringWrap.appendChild(cv);
    card.appendChild(ringWrap);

    var val = scoreObj ? scoreObj.value : 0;
    var bandLabel = scoreObj ? (scoreObj.bandLabel || scoreObj.band || sublabel || '') : '';
    var delta = scoreObj ? (scoreObj.delta || 0) : 0;

    App.onResize(function () {
      Charts.ring(cv, val, {
        label: (label === 'AI Confidence') ? (val + '%') : String(val),
        sublabel: bandLabel,
        color: color,
        track: HEX.line,
        height: 110
      });
    });

    var deltaEl = el('span', deltaClass(delta));
    deltaEl.innerHTML = arrowIcon(delta) +
      deltaStr(delta, label === 'AI Confidence' ? App.fmt.pct : null);
    if (label === 'AI Confidence') {
      deltaEl.innerHTML = arrowIcon(delta) +
        (delta >= 0 ? '+' : '') + delta + '%';
    }
    card.appendChild(deltaEl);

    return card;
  }

  /* ── Build holdings table ───────────────────────────────────── */
  function buildHoldingsTable(holdings, host) {
    var COLS = [
      { key: 'symbol',     label: 'Symbol / Name',  numeric: false },
      { key: 'price',      label: 'Price',           numeric: true  },
      { key: 'shares',     label: 'Shares',          numeric: true  },
      { key: 'avgCost',    label: 'Avg Cost',        numeric: true  },
      { key: 'value',      label: 'Value',           numeric: true  },
      { key: 'weight',     label: 'Weight',          numeric: true  },
      { key: 'dayChangePct', label: 'Day %',         numeric: true  },
      { key: 'plPct',      label: 'P/L %',           numeric: true  },
      { key: 'rating',     label: 'Rating',          numeric: false }
    ];

    function rebuildBody(tbody) {
      tbody.innerHTML = '';
      var sorted = sortHoldings(holdings);

      sorted.forEach(function (h) {
        var tr = el('tr', 'pf-row-link');
        tr.setAttribute('tabindex', '0');
        tr.setAttribute('role', 'button');
        tr.setAttribute('aria-label', 'View ' + h.symbol + ' details');
        tr.addEventListener('click', function () {
          App.go('stock', { symbol: h.symbol });
        });
        tr.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            App.go('stock', { symbol: h.symbol });
          }
        });

        /* Symbol + name */
        var tdSym = el('td', '');
        var symSpan = el('div', 'pf-sym');
        symSpan.textContent = h.symbol;
        var nameSpan = el('div', 'pf-name');
        nameSpan.textContent = h.name || '';
        tdSym.appendChild(symSpan);
        tdSym.appendChild(nameSpan);
        tr.appendChild(tdSym);

        /* Price */
        var tdPrice = el('td', 'num');
        tdPrice.textContent = App.fmt.money(h.price);
        tr.appendChild(tdPrice);

        /* Shares */
        var tdShares = el('td', 'num');
        tdShares.textContent = App.fmt.num(h.shares, { frac: 4 });
        tr.appendChild(tdShares);

        /* Avg cost */
        var tdAvg = el('td', 'num');
        tdAvg.textContent = App.fmt.money(h.avgCost);
        tr.appendChild(tdAvg);

        /* Value */
        var tdVal = el('td', 'num');
        tdVal.textContent = App.fmt.money(h.value);
        tr.appendChild(tdVal);

        /* Weight */
        var tdW = el('td', 'num');
        tdW.textContent = App.fmt.pct(h.weight);
        tr.appendChild(tdW);

        /* Day % */
        var tdDay = el('td', 'num');
        var daySpan = el('span', deltaClass(h.dayChangePct));
        daySpan.innerHTML = arrowIcon(h.dayChangePct) +
          App.fmt.pct(h.dayChangePct, { sign: true });
        tdDay.appendChild(daySpan);
        tr.appendChild(tdDay);

        /* P/L % */
        var tdPl = el('td', 'num');
        var plSpan = el('span', deltaClass(h.plPct));
        plSpan.innerHTML = arrowIcon(h.plPct) +
          App.fmt.pct(h.plPct, { sign: true });
        tdPl.appendChild(plSpan);
        tr.appendChild(tdPl);

        /* Rating */
        var tdR = el('td', '');
        var ratingCls = 'rating';
        if (h.rating) ratingCls += ' ' + h.rating;
        var ratBadge = el('span', ratingCls);
        ratBadge.textContent = h.ratingLabel || h.rating || '';
        tdR.appendChild(ratBadge);
        tr.appendChild(tdR);

        tbody.appendChild(tr);
      });

      /* Cash row */
      var cash = (App.db.portfolio || {}).cash || 0;
      if (cash > 0) {
        var cashTr = el('tr', 'pf-cash-row');
        var cashSym = el('td', '');
        var cs = el('div', 'pf-sym');
        cs.textContent = 'CASH';
        var cn = el('div', 'pf-name');
        cn.textContent = 'Available cash';
        cashSym.appendChild(cs);
        cashSym.appendChild(cn);
        cashTr.appendChild(cashSym);

        /* empty price/shares/avgcost */
        cashTr.appendChild(el('td', 'num', { text: '—' }));
        cashTr.appendChild(el('td', 'num', { text: '—' }));
        cashTr.appendChild(el('td', 'num', { text: '—' }));

        var cashValTd = el('td', 'num');
        cashValTd.textContent = App.fmt.money(cash);
        cashTr.appendChild(cashValTd);

        /* weight of cash */
        var total = (App.db.portfolio || {}).totalValue || 1;
        var cashW = el('td', 'num');
        cashW.textContent = App.fmt.pct(cash / total * 100);
        cashTr.appendChild(cashW);

        cashTr.appendChild(el('td', 'num', { text: '—' }));
        cashTr.appendChild(el('td', 'num', { text: '—' }));
        cashTr.appendChild(el('td', ''));
        tbody.appendChild(cashTr);
      }
    }

    var card = el('div', 'card pf-table-card');
    card.setAttribute('data-reveal', '');

    var hd = el('div', 'card-hd');
    var titleEl = el('h2', 'card-title');
    titleEl.textContent = 'Holdings';
    var addBtn = el('button', 'btn btn-ghost btn-sm');
    addBtn.type = 'button';
    addBtn.innerHTML = App.icon('plus') + ' Add holding';
    addBtn.addEventListener('click', function () {
      App.toast('Add holding is a prototype stub — connect a broker to sync positions automatically.', 'info');
    });
    hd.appendChild(titleEl);
    hd.appendChild(addBtn);

    var scrollWrap = el('div', 'pf-table-scroll');
    var table = el('table', 'tbl');
    table.setAttribute('aria-label', 'Holdings table');

    /* Thead */
    var thead = el('thead', '');
    var theadTr = el('tr', '');
    COLS.forEach(function (col) {
      var th = el('th', col.numeric ? 'num' : '');
      th.setAttribute('scope', 'col');
      var sortBtn = el('button', 'pf-sort-btn' + (sortState.col === col.key ? ' is-sorted' : ''));
      sortBtn.type = 'button';
      sortBtn.setAttribute('aria-label', 'Sort by ' + col.label);
      var chevronName = (sortState.col === col.key && sortState.dir === 'asc')
        ? 'chevron-down' : 'chevron-down';
      sortBtn.innerHTML = col.label + App.icon(chevronName);
      sortBtn.addEventListener('click', function () {
        if (sortState.col === col.key) {
          sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
        } else {
          sortState.col = col.key;
          sortState.dir = col.numeric ? 'desc' : 'asc';
        }
        /* Update active sort indicator */
        theadTr.querySelectorAll('.pf-sort-btn').forEach(function (b) {
          b.classList.remove('is-sorted');
        });
        sortBtn.classList.add('is-sorted');
        rebuildBody(tbody);
      });
      th.appendChild(sortBtn);
      theadTr.appendChild(th);
    });
    thead.appendChild(theadTr);
    table.appendChild(thead);

    var tbody = el('tbody', '');
    rebuildBody(tbody);
    table.appendChild(tbody);

    scrollWrap.appendChild(table);
    card.appendChild(hd);
    card.appendChild(scrollWrap);
    return card;
  }

  /* ── Build "as of" provenance footer ────────────────────────── */
  function buildProv(engine) {
    var p = el('p', 'prov');
    p.textContent = (engine && engine.version ? engine.version : 'fin-engine') +
      ' · ' + (engine && engine.asOf ? engine.asOf : 'as of —');
    return p;
  }

  /* ══════════════════════════════════════════════════════════════
     REGISTER
  ══════════════════════════════════════════════════════════════ */
  App.register('portfolio', {
    chrome: 'app',
    title:  'Holdings',

    mount: function (el_host) {
      var db = App.db || {};
      var portfolio = db.portfolio || {};
      var holdings  = db.holdings  || [];
      var scores    = db.scores    || {};
      var engine    = db.engine    || {};

      /* Root */
      var root = el('div', 'screen screen-portfolio');
      var container = el('div', 'container');
      root.appendChild(container);

      /* ── Hero stats ── */
      var hero = buildHero(portfolio);
      hero.setAttribute('data-reveal', '');
      container.appendChild(hero);

      /* ── Chart + Donut row ── */
      var chartRow = el('div', 'pf-chart-row');

      var chartCard = buildChartCard(portfolio);
      chartRow.appendChild(chartCard);

      var donutCard = buildDonutCard(portfolio.sectors || []);
      chartRow.appendChild(donutCard);

      container.appendChild(chartRow);

      /* ── Diversification + Score rings row ── */
      var divcardRow = el('div', 'pf-divcard-row');

      var diversCard = buildDiversificationCard(scores, portfolio);
      divcardRow.appendChild(diversCard);

      /* Scores sub-grid (2×2) */
      var scoresWrap = el('div', '');
      var scoresGrid = el('div', 'pf-scores-row');

      scoresGrid.appendChild(buildScoreCard(
        'Portfolio Health',
        scores.health,
        HEX.pos,
        (scores.health && scores.health.band) || 'Strong'
      ));
      scoresGrid.appendChild(buildScoreCard(
        'Risk',
        scores.risk,
        HEX.warn,
        (scores.risk && scores.risk.bandLabel) || 'Moderately Aggressive'
      ));
      scoresGrid.appendChild(buildScoreCard(
        'Diversification',
        scores.diversification,
        HEX.info,
        (scores.diversification && scores.diversification.band) || 'Fair'
      ));
      scoresGrid.appendChild(buildScoreCard(
        'AI Confidence',
        scores.confidence,
        HEX.gold,
        ''
      ));

      scoresWrap.appendChild(scoresGrid);
      divcardRow.appendChild(scoresWrap);

      container.appendChild(divcardRow);

      /* ── Holdings table ── */
      var tableCard = buildHoldingsTable(holdings, el_host);
      container.appendChild(tableCard);

      /* ── Provenance ── */
      var prov = buildProv(engine);
      container.appendChild(prov);

      /* Mount into host */
      el_host.appendChild(root);

      /* Reveal entrance */
      App.reveal(el_host);
    },

    unmount: function () {
      /* App.onResize fns are auto-cleared by the kernel on unmount */
      sortState = { col: 'value', dir: 'desc' };
    }
  });

}());

  function scorePassword(pw) {
    if (!pw) { return 0; }
    var score = 0;
    if (pw.length >= 8)  { score += 1; }
    if (pw.length >= 12) { score += 1; }
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) { score += 1; }
    if (/[0-9]/.test(pw)) { score += 1; }
    if (/[^A-Za-z0-9]/.test(pw)) { score += 1; }
    return Math.min(4, Math.max(1, score > 4 ? 4 : score));
  }

  /* Build a .field block: label + <input> + error slot */
  function buildInputField(opts) {
    /* opts: { id, label, type, placeholder, value, autocomplete, required } */
    var outer = makeEl('div', 'field');

    var lbl = makeEl('label', 'flabel');
    lbl.setAttribute('for', opts.id);
    lbl.textContent = opts.label;

    var wrap = makeEl('div', 'su-field-wrap');
    wrap.dataset.fieldId = opts.id;

    var input = makeEl('input', 'input');
    input.id           = opts.id;
    input.name         = opts.id;
    input.type         = opts.type || 'text';
    input.required     = opts.required !== false;
    if (opts.placeholder)  { input.placeholder  = opts.placeholder; }
    if (opts.value)        { input.value         = opts.value; }
    if (opts.autocomplete) { input.setAttribute('autocomplete', opts.autocomplete); }
    input.setAttribute('aria-describedby', opts.id + '-err');

    var errMsg = makeEl('p', 'su-err');
    errMsg.id = opts.id + '-err';
    errMsg.setAttribute('aria-live', 'polite');
    errMsg.textContent = opts.errMsg || 'This field is required.';

    wrap.appendChild(input);
    wrap.appendChild(errMsg);
    outer.appendChild(lbl);
    outer.appendChild(wrap);
    return { outer: outer, wrap: wrap, input: input, errMsg: errMsg };
  }

  /* Build a .field block: label + <select> + error slot */
  function buildSelectField(opts) {
    /* opts: { id, label, options:[string], value } */
    var outer = makeEl('div', 'field');

    var lbl = makeEl('label', 'flabel');
    lbl.setAttribute('for', opts.id);
    lbl.textContent = opts.label;

    var wrap = makeEl('div', 'su-field-wrap');
    wrap.dataset.fieldId = opts.id;

    var sel = makeEl('select', 'select');
    sel.id   = opts.id;
    sel.name = opts.id;
    sel.setAttribute('aria-describedby', opts.id + '-err');

    opts.options.forEach(function (o) {
      var opt = document.createElement('option');
      opt.value       = o;
      opt.textContent = o;
      if (o === opts.value) { opt.selected = true; }
      sel.appendChild(opt);
    });

    var errMsg = makeEl('p', 'su-err');
    errMsg.id = opts.id + '-err';
    errMsg.setAttribute('aria-live', 'polite');

    wrap.appendChild(sel);
    wrap.appendChild(errMsg);
    outer.appendChild(lbl);
    outer.appendChild(wrap);
    return { outer: outer, wrap: wrap, sel: sel };

  function validateForm(root) {
    var ok = true;

    function check(fieldId, testFn, msg) {
      var wrap  = root.querySelector('[data-field-id="' + fieldId + '"]');
      if (!wrap) { return; }
      var input = wrap.querySelector('input, select');
      var errEl = wrap.querySelector('.su-err');
      if (input && !testFn(input.value)) {
        wrap.classList.add('invalid');
        if (errEl && msg) { errEl.textContent = msg; }
        ok = false;
      } else if (wrap) {
        wrap.classList.remove('invalid');
      }

      function (v) { return !isEmpty(v); },
      'Please enter your full name.');
    check('su-email',
      function (v) { return isEmail(v); },
      isEmpty((root.querySelector('#su-email') || {}).value || '')
        ? 'Email address is required.'
        : 'Please enter a valid email address.');
    check('su-password',
      function (v) { return v && v.length >= 8; },

    EXP_OPTS.forEach(function (opt) {

      segBtn.type = 'button';

    continueBtn.type = 'button';

    continueBtn.addEventListener('click', function () {
      if (!validateForm(root)) {
        var firstInvalid = root.querySelector('.su-field-wrap.invalid input, .su-field-wrap.invalid select');
        if (firstInvalid) { firstInvalid.focus(); }
        return;
      }
      continueBtn.disabled    = true;
      continueBtn.textContent = 'Setting up…';
      setTimeout(function () { App.go('connect'); }, 550);
    });

    /* Privacy line */
    var reassure = makeEl('p', 'su-reassure');

    var signinP = makeEl('p', 'su-signin');

    signinBtn.type = 'button';
    signinBtn.textContent = 'Sign in';
    signinBtn.addEventListener('click', function () {
      App.toast('Signing you in…', 'info');
      setTimeout(function () { App.go('dashboard'); }, 700);
    });
    signinP.appendChild(document.createTextNode('Already have an account? '));
    signinP.appendChild(signinBtn);
    cardBd.appendChild(signinP);

    /* Assemble card */
    card.appendChild(cardBd);
    panel.appendChild(card);

    /* No-custody micro-line below card */
    var noCustody = makeEl('p', 'su-nocustody');
    noCustody.innerHTML = App.icon('shield')
      + '<span>Read-only broker access · AlyInvest never holds or moves funds</span>';
    panel.appendChild(noCustody);

    /* ── Live blur-validation + dynamic Continue enable/disable ─────────────── */
    function attachBlurValidator(fieldId, testFn, msgFn) {
      var inputEl = root.querySelector('#' + fieldId);
      if (!inputEl) { return; }
      inputEl.addEventListener('blur', function () {
        var wrapEl = root.querySelector('[data-field-id="' + fieldId + '"]');
        if (!wrapEl) { return; }
        var errEl = wrapEl.querySelector('.su-err');
        if (!testFn(inputEl.value)) {
          wrapEl.classList.add('invalid');
          if (errEl && msgFn) { errEl.textContent = msgFn(inputEl.value); }
        } else {
          wrapEl.classList.remove('invalid');
        }
        updateContinueBtn();
      });
      inputEl.addEventListener('input', function () {
        var wrapEl = root.querySelector('[data-field-id="' + fieldId + '"]');
        if (wrapEl && testFn(inputEl.value)) { wrapEl.classList.remove('invalid'); }
        updateContinueBtn();
      });
    }

    function updateContinueBtn() {
      var nv = ((root.querySelector('#su-name')     || {}).value || '');
      var ev = ((root.querySelector('#su-email')    || {}).value || '');
      var pv = ((root.querySelector('#su-password') || {}).value || '');
      continueBtn.disabled = !((!isEmpty(nv)) && isEmail(ev) && pv.length >= 8);
    }

    attachBlurValidator('su-name',
      function (v) { return !isEmpty(v); },
      function ()  { return 'Please enter your full name.'; });

    attachBlurValidator('su-email',
      function (v) { return isEmail(v); },
      function (v) { return isEmpty(v) ? 'Email address is required.'
                                       : 'Please enter a valid email address.'; });

    /* Initial enable state — name + email prefilled; password blank → disabled */
    updateContinueBtn();

    /* ── Assemble and inject ────────────────────────────────────────────────── */
    wrap.appendChild(aside);
    wrap.appendChild(panel);
    root.appendChild(wrap);
    host.appendChild(root);

    /* Entrance reveal */
    App.reveal(root);
  }

  /* ── unmount ─────────────────────────────────────────────────────────────── */
  function unmount() {
    /* No global listeners or RAF loops added by this screen. */
  }

  /* ── Register ────────────────────────────────────────────────────────────── */
  App.register('signup', {
    chrome:  'flow',
    title:   'Create your account — AlyInvest',
    mount:   mount,
    unmount: unmount
  });

}());


/* ===================== screen: splash.js ===================== */
/* ==========================================================================
   splash.js — Premium brand splash screen.
   chrome: flow | Auto-advances to "welcome" after ~2000 ms.
   Advance also fires on click, tap, or Enter keypress.
   ========================================================================== */
(function () {
  'use strict';

  /* Private state for this screen instance */
  var _timer = null;
  var _keyHandler = null;
  var _clickHandler = null;
  var _el = null;

  /* ── advance ─────────────────────────────────────────────────────────────── */
  function advance() {
    if (_timer) { clearTimeout(_timer); _timer = null; }
    App.go('welcome');
  }

  /* ── mount ───────────────────────────────────────────────────────────────── */
  function mount(el) {
    _el = el;

    /* Root wrapper — deep dark ground, centered, flow chrome */
    var root = document.createElement('div');
    root.className = 'screen screen-splash';
    root.setAttribute('role', 'main');
    root.setAttribute('aria-label', 'AlyInvest — loading');
    root.setAttribute('tabindex', '0');

    /* ── Inline SVG defs: gold gradient for the "A" stroke ──────────────── */
    root.insertAdjacentHTML('beforeend',
      '<svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">' +
        '<defs>' +
          '<linearGradient id="splashGold" x1="0" y1="0" x2="1" y2="1">' +
            '<stop offset="0%"  stop-color="#DAB574"/>' +
            '<stop offset="55%" stop-color="#C8A45A"/>' +
            '<stop offset="100%" stop-color="#9C7C39"/>' +
          '</linearGradient>' +
        '</defs>' +
      '</svg>'
    );

    /* ── Center content stack ───────────────────────────────────────────── */
    var inner = document.createElement('div');
    inner.className = 'splash-inner';
    inner.setAttribute('aria-hidden', 'true'); /* decorative; root carries a11y */

    /* ── "A" mark tile ──────────────────────────────────────────────────── */
    /*
     * Stroked "A" letterform drawn via stroke-dashoffset animation in CSS.
     * Path data: a clean serif-inspired capital A (26×30 grid, stroke only).
     * --len must match the SVG path's approximate total length so the
     * stroke-dasharray / stroke-dashoffset CSS variables work.  240 is a
     * good approximation for this path; CSS overrides if needed.
     */
    var markEl = document.createElement('div');
    markEl.className = 'splash-mark';
    markEl.insertAdjacentHTML('beforeend',
      '<svg viewBox="0 0 52 52" aria-hidden="true" focusable="false">' +
        /* Outer circle ring (decorative) */
        '<circle cx="26" cy="26" r="22" fill="none" stroke="rgba(200,164,90,.22)" stroke-width="1"/>' +
        /* Capital A glyph — centered, generous; --len ≈ 240 set on element */
        '<path class="glyph" style="--len:200" d="M14 38 L26 14 L38 38 M18.5 30 L33.5 30"/>' +
      '</svg>'
    );

    /* ── Wordmark ───────────────────────────────────────────────────────── */
    var wordEl = document.createElement('h1');
    wordEl.className = 'splash-word';
    wordEl.textContent = 'AlyInvest';

    /* ── Hairline rule ──────────────────────────────────────────────────── */
    var ruleEl = document.createElement('div');
    ruleEl.className = 'splash-rule';
    ruleEl.setAttribute('aria-hidden', 'true');

    /* ── Tagline ────────────────────────────────────────────────────────── */
    var tagEl = document.createElement('p');
    tagEl.className = 'splash-tag';
    tagEl.textContent = 'Wealth, considered.';

    /* ── Indeterminate progress shimmer ─────────────────────────────────── */
    var progressEl = document.createElement('div');
    progressEl.className = 'splash-progress';
    progressEl.setAttribute('role', 'progressbar');
    progressEl.setAttribute('aria-label', 'Loading');
    progressEl.setAttribute('aria-valuemin', '0');
    progressEl.setAttribute('aria-valuemax', '100');

    /* Assemble inner */
    inner.appendChild(markEl);
    inner.appendChild(wordEl);
    inner.appendChild(ruleEl);
    inner.appendChild(tagEl);
    inner.appendChild(progressEl);

    /* ── "Tap to continue" hint at bottom ───────────────────────────────── */
    var hintEl = document.createElement('p');
    hintEl.className = 'splash-hint';
    hintEl.setAttribute('aria-hidden', 'true');
    hintEl.textContent = 'Tap to continue';

    root.appendChild(inner);
    root.appendChild(hintEl);
    el.appendChild(root);

    /* ── Interaction handlers ───────────────────────────────────────────── */
    _clickHandler = function (e) {
      e.preventDefault();
      advance();
    };
    root.addEventListener('click', _clickHandler);
    root.addEventListener('touchend', _clickHandler, { passive: false });

    _keyHandler = function (e) {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') {
        e.preventDefault();
        advance();
      }
    };
    root.addEventListener('keydown', _keyHandler);

    /* Auto-focus so keyboard events are captured without a click first */
    root.focus({ preventScroll: true });

    /* ── Auto-advance ───────────────────────────────────────────────────── */
    _timer = setTimeout(advance, 2000);
  }

  /* ── unmount ─────────────────────────────────────────────────────────────── */
  function unmount() {
    if (_timer) { clearTimeout(_timer); _timer = null; }
    /* Handlers are on the root element inside el; el is cleared by the
       router so they will be garbage-collected.  We null refs anyway. */
    _keyHandler = null;
    _clickHandler = null;
    _el = null;
  }

  /* ── Register ────────────────────────────────────────────────────────────── */
  App.register('splash', {
    chrome: 'flow',
    title:  'AlyInvest',
    mount:   mount,
    unmount: unmount
  });

}());
