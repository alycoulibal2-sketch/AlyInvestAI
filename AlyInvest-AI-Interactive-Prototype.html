            '<button class="btn btn-ghost" id="stkPos" type="button">'+icon(held?'edit':'plus',16)+(held?'Adjust position':'Add to portfolio')+'</button></div>'+
        '</div>'+
      '</div>'+

      // PRICE CHART
      '<div class="card mt20">'+
        '<div class="seg-row"><div><div class="eyebrow">Price history</div><div class="ct">Performance</div></div>'+
          '<div class="row g16"><div class="hl-row"><div class="hl"><span class="label-xs">Range high</span><span class="mono tnum" id="stkHi" style="color:'+C.pos+'">—</span></div>'+
            '<div class="hl"><span class="label-xs">Range low</span><span class="mono tnum" id="stkLo" style="color:'+C.neg+'">—</span></div></div>'+
            '<div class="seg" id="stkSeg"><button class="on" data-r="1M">1M</button><button data-r="3M">3M</button><button data-r="6M">6M</button></div></div></div>'+
        '<canvas id="stkChart" style="width:100%;height:240px"></canvas>'+
      '</div>'+

      wcHtml+

      // VALUATION & FUNDAMENTALS
      '<div class="card mt20"><div class="card-head"><div><div class="eyebrow">Tear sheet</div><div class="ct">Valuation &amp; fundamentals</div>'+
        '<div class="cs">Engine figures · '+esc(DB.meta.engineVersion)+'</div></div></div>'+
        '<div class="mt8">'+fvHtml+'</div>'+
        (it.valuationSummary?'<div class="note info mt16">'+icon('scale',16)+'<div>'+esc(it.valuationSummary)+'</div></div>':'')+
        '<div class="m-cols mt16">'+valGroup+growthGroup+qualGroup+riskGroup+'</div>'+
      '</div>'+

      // SCENARIOS
      '<div class="card mt20"><div class="card-head"><div><div class="eyebrow">Forward view</div><div class="ct">Scenarios</div></div></div>'+
        '<div class="mt8">'+scnHtml+'</div>'+
        '<div class="note info mt12">'+icon('info',16)+'<div>These are probability-weighted scenarios, not guarantees. Returns are uncertain and ranges reflect modeled outcomes over the stated horizon.</div></div>'+
      '</div>'+

      // EXPLAIN EVERYTHING
      '<div class="card mt20"><div class="card-head"><div><div class="eyebrow">Explain everything</div><div class="ct">The full reasoning, in plain language</div>'+
        '<div class="cs">Tap any section to expand</div></div></div>'+
        '<div class="mt8" id="stkAcc">'+accHtml+'</div>'+
      '</div>'+

    '</div>';

    // ===== Wire =====
    document.getElementById('stkBack').onclick=function(){App.navigate('portfolio');};
    document.getElementById('stkAsk').onclick=function(){App.navigate('advisor',{symbol:sym});};
    document.getElementById('stkPos').onclick=function(){App.toast(held?('Position adjustment for '+sym+' — coming soon'):(sym+' added to your watchlist'));};

    // confidence ring
    var ring=document.getElementById('confRing');
    if(ring)Charts.ring(ring,it.rec.confidence,{color:C.gold,lw:5});

    // chart + segment
    var canvas=document.getElementById('stkChart');
    var hiEl=document.getElementById('stkHi'), loEl=document.getElementById('stkLo');
    var ranges={'1M':22,'3M':64,'6M':120};
    function draw(rk){
      var n=ranges[rk]||120;
      var h=it.history||[];
      var data=h.slice(Math.max(0,h.length-n));
      if(!data.length)return;
      Charts.area(canvas,data,{color:lineColor,grid:true,fill:true,lw:2});
      hiEl.textContent=fmt.money2(Math.max.apply(null,data));
      loEl.textContent=fmt.money2(Math.min.apply(null,data));
    }
    var curRange='1M';
    draw(curRange);
    var seg=document.getElementById('stkSeg');
    seg.addEventListener('click',function(e){
      var b=e.target.closest('button'); if(!b)return;
      seg.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on'); curRange=b.getAttribute('data-r'); draw(curRange);
    });

    // accordion
    var acc=document.getElementById('stkAcc');
    acc.addEventListener('click',function(e){
      var h=e.target.closest('.acc-h'); if(!h)return;
      h.parentNode.classList.toggle('open');
    });

    // responsive redraw
    var ro=function(){draw(curRange);};
    window.addEventListener('resize',ro);

    return function cleanup(){ window.removeEventListener('resize',ro); };
  };
})();
</script>
<script>
/* ===== screen: advisor ===== */
(function(){
  var EVI = {fact:'Fact', analysis:'Analysis', assume:'Assumption', uncertain:'Uncertain'};
  var TONE = {pos:'var(--pos)', neg:'var(--neg)', warn:'var(--warn)', neu:'var(--muted)'};

  function esc(s){
    return String(s==null?'':s).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }
  function eviChip(k){
    var kk = k || 'analysis';
    return '<span class="evi '+kk+'">'+ (EVI[kk]||kk) +'</span>';
  }

  App.screens.advisor = function(view, params){
    var A = DB.advisor || {};
    var suggested = A.suggested || [];
    var qa = A.qa || [];
    var timers = [];
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var confPct = Math.round((A.confidence || 0) * 100);
    var confColor = confPct >= 70 ? 'var(--pos)' : 'var(--warn)';

    var FALLBACK = { a:[
      {t:"I don’t have a prepared note on that exact question yet. What I can speak to with confidence is your own portfolio — its allocation, risk band, diversification, and how the engine currently reads each holding.", k:'uncertain'},
      {t:"Try one of the suggested questions on the right, or ask about your diversification, risk, or a specific position like NVDA or VOO.", k:'analysis'}
    ]};

    var suggHTML = suggested.map(function(q){
      return '<button class="adv-q" type="button" data-q="'+esc(q)+'">'+
        '<span class="qic">'+icon('arrowR',14)+'</span><span>'+esc(q)+'</span></button>';
    }).join('') || '<div class="faint" style="font-size:13px">No suggestions right now.</div>';

    var watchHTML = (DB.changes || []).slice(0,3).map(function(c){
      var col = TONE[c.tone] || 'var(--muted)';
      return '<div class="wi">'+
          '<span class="dot-i" style="background:'+col+';margin-top:5px"></span>'+
          '<div><div class="wi-t">'+esc(c.title)+'</div>'+
          (c.when ? '<div class="wi-w faint">'+esc(c.when)+'</div>' : '')+
        '</div></div>';
    }).join('') || '<div class="faint" style="font-size:13px">Nothing notable today.</div>';

    view.innerHTML =
      '<div class="view screen-advisor">'+
        '<div class="adv-id rise">'+
          '<div class="adv-id-ava">'+icon('advisor',26)+'</div>'+
          '<div class="adv-id-meta">'+
            '<div class="adv-id-name">Your Advisor</div>'+
            '<div class="adv-id-status">'+icon('shield',12)+' Briefed on your portfolio · '+esc(DB.meta.dataAsOf)+'</div>'+
          '</div>'+
          '<div class="spacer"></div>'+
          '<div class="pill adv-conf"><span class="dot-i" style="background:'+confColor+'"></span> '+confPct+'% confidence</div>'+
        '</div>'+
        '<div class="adv-wrap">'+
          '<div class="adv-main">'+
            '<div class="card flush adv-thread-card">'+
              '<div class="adv-thread" id="adv-thread" aria-live="polite"></div>'+
            '</div>'+
            '<div class="adv-composer">'+
              '<input class="input" id="adv-input" autocomplete="off" placeholder="Ask about your portfolio, risk, or a holding…" aria-label="Ask your advisor" />'+
              '<button class="btn btn-primary" id="adv-send" type="button">'+icon('send',16)+'<span class="lbl">Ask Your Advisor</span></button>'+
            '</div>'+
          '</div>'+
          '<aside class="adv-aside">'+
            '<div class="card">'+
              '<div class="card-head"><div><div class="ct">Suggested questions</div><div class="cs">Tap to ask your advisor</div></div></div>'+
              '<div class="adv-sugg">'+suggHTML+'</div>'+
            '</div>'+
            '<div class="card mt16">'+
              '<div class="card-head"><div class="ct">What I’m watching</div></div>'+
              '<div class="adv-watch">'+watchHTML+'</div>'+
            '</div>'+
            '<div class="note info mt16">'+icon('lock',16)+
              '<div><b>Grounded in your data.</b> Your advisor speaks only from your portfolio and the engine’s current numbers ('+esc(DB.meta.engineVersion)+') — not market hype or guesses.</div>'+
            '</div>'+
          '</aside>'+
        '</div>'+
      '</div>';

    var threadEl = view.querySelector('#adv-thread');
    var inputEl = view.querySelector('#adv-input');

    function msgHTML(m){
      if(m.role === 'user'){
        return '<div class="adv-msg user rise"><div class="adv-bubble user">'+esc(m.text)+'</div></div>';
      }
      var inner = '';
      if(m.type === 'briefing'){
        inner =
          '<div class="adv-brief-head">'+
            '<span class="eyebrow">Today’s note</span>'+
            '<span class="bsep">·</span>'+
            '<span class="bsep">'+esc(DB.meta.asOf)+'</span>'+
          '</div>'+
          '<div class="adv-lead">'+esc(A.greeting)+'</div>'+
          '<p class="adv-prose">'+esc(A.dailySummary)+'</p>';
      } else if(m.type === 'typing'){
        inner = '<div class="adv-typing" aria-label="Your advisor is reviewing"><span></span><span></span><span></span></div>';
      } else if(m.type === 'answer'){
        inner = m.a.map(function(st){
          return '<div class="adv-stmt">'+eviChip(st.k)+'<p class="adv-prose">'+esc(st.t)+'</p></div>';
        }).join('');
      }
      var cls = 'adv-bubble advisor' + (m.type==='briefing'?' briefing':'') + (m.type==='answer'?' rise':'');
      return '<div class="adv-msg advisor'+(m.type==='briefing'?' rise':'')+'">'+
          '<div class="adv-ava">'+icon('advisor',18)+'</div>'+
          '<div class="'+cls+'">'+inner+'</div>'+
        '</div>';
    }

    function appendMsg(m){
      var holder = document.createElement('div');
      holder.innerHTML = msgHTML(m);
      var node = holder.firstChild;
      threadEl.appendChild(node);
      return node;
    }
    function scrollBottom(){ threadEl.scrollTop = threadEl.scrollHeight; }

    function findAnswer(text){
      var t = text.trim().toLowerCase();
      for(var i=0;i<qa.length;i++){
        if(qa[i].q && qa[i].q.toLowerCase() === t) return qa[i];
      }
      var words = t.split(/[^a-z0-9]+/).filter(function(w){ return w.length > 3; });
      var best = null, bestScore = 0;
      for(var j=0;j<qa.length;j++){
        var q = (qa[j].q||'').toLowerCase();
        var score = 0;
        words.forEach(function(w){ if(q.indexOf(w) >= 0) score++; });
        if(score > bestScore){ bestScore = score; best = qa[j]; }
      }
      if(best && bestScore > 0) return best;
      return null;
    }

    function ask(text){
      text = (text||'').trim();
      if(!text) return;
      appendMsg({role:'user', type:'text', text:text});
      inputEl.value = '';
      scrollBottom();

      var typingNode = appendMsg({role:'advisor', type:'typing'});
      scrollBottom();

      var delay = reduce ? 80 : 600;
      var id = setTimeout(function(){
        // drop this timer id from the tracked list now that it has fired
        var ix = timers.indexOf(id);
        if(ix >= 0) timers.splice(ix, 1);
        if(typingNode && typingNode.parentNode) typingNode.parentNode.removeChild(typingNode);
        var ans = findAnswer(text) || FALLBACK;
        appendMsg({role:'advisor', type:'answer', a:ans.a});
        scrollBottom();
        inputEl.focus();
      }, delay);
      timers.push(id);
    }

    // seed the thread with today's briefing
    appendMsg({role:'advisor', type:'briefing'});

    view.querySelectorAll('.adv-q').forEach(function(b){
      b.addEventListener('click', function(){ ask(b.getAttribute('data-q')); });
    });
    view.querySelector('#adv-send').addEventListener('click', function(){ ask(inputEl.value); });
    inputEl.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){ e.preventDefault(); ask(inputEl.value); }
    });

    return function cleanup(){
      for(var i=0;i<timers.length;i++){ clearTimeout(timers[i]); }
      timers.length = 0;
    };
  };
})();
</script>
<script>
/* ===== screen: explore ===== */
(function(){
  var WATCH = ['V','COST'];

  function heldSet(){
    var s = {};
    (DB.portfolio.holdings||[]).forEach(function(h){ s[h.symbol]=true; });
    return s;
  }
  function isBuy(it){ return it.rec && (it.rec.action==='buy'||it.rec.action==='strong_buy'); }

  function fvHint(it){
    if(it.fairValue==null || it.assetClass==='ETF'){
      return '<span class="fv muted">'+icon('info',12)+' No fair-value model</span>';
    }
    var diff = (it.fairValue - it.price)/it.price;
    var pct = fmt.pctRaw(Math.abs(diff),0);
    if(Math.abs(diff) < 0.005){
      return '<span class="fv muted">'+icon('scale',12)+' Near fair value</span>';
    }
    if(diff > 0){
      return '<span class="fv pos-t">▲ '+pct+' below fair value</span>';
    }
    return '<span class="fv neg-t">▼ '+pct+' above fair value</span>';
  }

  function cardHTML(it, held){
    var up = it.dayChange>=0;
    return ''+
    '<div class="card ex-card" tabindex="0" role="button" data-sym="'+it.symbol+'" aria-label="'+it.name+'">'+
      (held?'<span class="badge gold held-pill">Held</span>':'')+
      '<div class="tk">'+
        '<div class="sym-i" style="background:'+symColor(it.symbol)+'">'+it.symbol+'</div>'+
        '<div class="nm"><b>'+it.name+'</b><span>'+it.sector+'</span></div>'+
      '</div>'+
      '<div class="px-row">'+
        '<span class="px mono tnum">'+fmt.money2(it.price)+'</span>'+
        '<span class="tnum" style="color:'+moveColor(it.dayChange)+';font-size:12.5px">'+fmt.pct(it.dayChange)+'</span>'+
      '</div>'+
      '<canvas class="card-spark" data-sym="'+it.symbol+'" style="width:100%;height:46px"></canvas>'+
      '<div class="meta-row">'+
        '<span class="badge '+recTone(it.rec.action)+'">'+actionLabel(it.rec.action)+'</span>'+
        fvHint(it)+
      '</div>'+
      '<div class="stats">'+
        '<div class="st"><span class="k">P/E</span><span class="v mono tnum">'+(it.pe!=null?fmt.x(it.pe):'—')+'</span></div>'+
        '<div class="st"><span class="k">Beta</span><span class="v mono tnum">'+(it.beta!=null?fmt.num(it.beta,2):'—')+'</span></div>'+
        '<div class="st"><span class="k">Vol</span><span class="v mono tnum">'+(it.vol!=null?fmt.pctRaw(it.vol,1):'—')+'</span></div>'+
      '</div>'+
    '</div>';
  }

  function moverRow(it){
    return ''+
    '<div class="mv-row" data-sym="'+it.symbol+'">'+
      '<div class="sym-i" style="background:'+symColor(it.symbol)+';width:30px;height:30px;font-size:10px">'+it.symbol+'</div>'+
      '<canvas class="mv-spark" data-sym="'+it.symbol+'" style="width:54px;height:24px"></canvas>'+
      '<div class="mv-px">'+
        '<div class="p mono tnum">'+fmt.money2(it.price)+'</div>'+
        '<div class="c tnum" style="color:'+moveColor(it.dayChange)+'">'+fmt.pct(it.dayChange)+'</div>'+
      '</div>'+
    '</div>';
  }

  App.screens.explore = function(view, params){
    var st = { q:'', filter:'all' };
    var held = heldSet();

    var sorted = INSTR.slice().sort(function(a,b){ return b.dayChange - a.dayChange; });
    var gainers = sorted.slice(0,3);
    var losers = sorted.slice(-3).reverse();

    view.innerHTML = ''+
    '<div class="view screen-explore">'+
      '<div class="rise">'+
        '<div class="eyebrow">Research</div>'+
        '<h1 class="h-page">Explore</h1>'+
        '<div class="sub">Research ideas across your universe</div>'+
      '</div>'+
      '<div class="ex-controls">'+
        '<div class="ex-search">'+
          '<span class="sicon">'+icon('search',16)+'</span>'+
          '<input class="input" id="ex-q" type="text" placeholder="Search symbol or name…" autocomplete="off">'+
        '</div>'+
        '<div class="seg" id="ex-seg">'+
          '<button class="on" data-f="all">All</button>'+
          '<button data-f="held">Held</button>'+
          '<button data-f="watch">Watchlist</button>'+
          '<button data-f="buy">Buy-rated</button>'+
        '</div>'+
      '</div>'+
      '<div class="movers">'+
        '<div class="card mv-col">'+
          '<div class="mv-head">'+icon('trendUp',16)+'<span class="label-xs pos-t">Top gainers</span></div>'+
          gainers.map(moverRow).join('')+
        '</div>'+
        '<div class="card mv-col">'+
          '<div class="mv-head">'+icon('trendDn',16)+'<span class="label-xs neg-t">Top losers</span></div>'+
          losers.map(moverRow).join('')+
        '</div>'+
      '</div>'+
      '<div class="ex-grid" id="ex-grid"></div>'+
    '</div>';

    var gridEl = view.querySelector('#ex-grid');

    function matches(it){
      if(st.q){
        var q = st.q.toLowerCase();
        if(it.symbol.toLowerCase().indexOf(q)===-1 && it.name.toLowerCase().indexOf(q)===-1) return false;
      }
      if(st.filter==='held') return !!held[it.symbol];
      if(st.filter==='watch') return WATCH.indexOf(it.symbol)!==-1;
      if(st.filter==='buy') return isBuy(it);
      return true;
    }

    function drawSpark(canvas){
      var it = BYSYM[canvas.getAttribute('data-sym')];
      if(!it) return;
      Charts.spark(canvas, it.history, {color: it.dayChange>=0?'#56C28D':'#E0726A'});
    }

    function renderGrid(){
      var list = INSTR.filter(matches);
      if(!list.length){
        gridEl.innerHTML = '<div class="ex-empty">'+icon('search',22)+'<div class="mt8">No instruments match your search.</div></div>';
        return;
      }
      gridEl.innerHTML = list.map(function(it){ return cardHTML(it, !!held[it.symbol]); }).join('');
      gridEl.querySelectorAll('canvas.card-spark').forEach(drawSpark);
    }

    // movers sparks
    view.querySelectorAll('canvas.mv-spark').forEach(drawSpark);

    // wire mover rows
    view.querySelectorAll('.mv-row').forEach(function(r){
      r.addEventListener('click', function(){ App.navigate('stock',{symbol:r.getAttribute('data-sym')}); });
    });

    // search
    var qEl = view.querySelector('#ex-q');
    qEl.addEventListener('input', function(){ st.q = qEl.value.trim(); renderGrid(); });

    // seg filter
    var seg = view.querySelector('#ex-seg');
    seg.addEventListener('click', function(e){
      var b = e.target.closest('button'); if(!b) return;
      st.filter = b.getAttribute('data-f');
      seg.querySelectorAll('button').forEach(function(x){ x.classList.toggle('on', x===b); });
      renderGrid();
    });

    // card clicks (delegated)
    gridEl.addEventListener('click', function(e){
      var c = e.target.closest('.ex-card'); if(!c) return;
      App.navigate('stock',{symbol:c.getAttribute('data-sym')});
    });
    gridEl.addEventListener('keydown', function(e){
      if(e.key!=='Enter' && e.key!==' ') return;
      var c = e.target.closest('.ex-card'); if(!c) return;
      e.preventDefault();
      App.navigate('stock',{symbol:c.getAttribute('data-sym')});
    });

    renderGrid();
  };
})();
</script>
<script>
/* ===== screen: settings ===== */
(function(){
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function field(label, val, opts){
    opts=opts||{};
    var inner;
    if(opts.select){
      inner='<select class="select">'+opts.options.map(function(o){
        return '<option'+(o===val?' selected':'')+'>'+esc(o)+'</option>';
      }).join('')+'</select>';
    } else if(opts.area){
      inner='<textarea class="textarea" rows="'+(opts.rows||3)+'">'+esc(val)+'</textarea>';

      inner='<div class="prefix-in"><span class="pfx">'+esc(opts.prefix)+'</span><input class="input" value="'+esc(val)+'"></div>';
    } else {
      inner='<input class="input" value="'+esc(val)+'">';
    }
    return '<div class="field'+(opts.full?' full':'')+'"><label>'+esc(label)+'</label>'+inner+'</div>';
  }
  function chips(items, selected){
    return items.map(function(it){

  App.screens.settings = function(view, params){

    var styleOpts=['Index funds','Growth','Value','Dividend','Momentum','Quality','Small cap'];
    var sectorOpts=['Technology','Healthcare','AI','Financials','Energy','Consumer','Industrials','Utilities'];
    var regionOpts=['United States','Global Developed','Emerging Markets','Europe','Asia-Pacific'];
    var avoidOpts=['Tobacco','Gambling','Weapons','Fossil fuels','Alcohol'];

    var html='<div class="view screen-settings">'+
      '<div class="rise" style="margin-bottom:22px">'+
        '<div class="eyebrow">Account</div>'+
        '<h1 class="h-page">Settings &amp; Profile</h1>'+
        '<div class="sub">Review and edit your investor profile, preferences, and what your advisor has learned. You are in control.</div>'+
      '</div>'+
      '<div class="set-wrap">'+
        '<nav class="set-nav">'+nav.map(function(n,i){
          return '<button data-go="'+n[0]+'"'+(i===0?' class="on"':'')+'><span class="ico">'+icon(n[1],16)+'</span><span>'+n[2]+'</span></button>';
        }).join('')+'</nav>'+
        '<div class="set-body">';

    // PROFILE
    html+='<section class="set-sec" id="sec-profile">'+
      '<div class="card-head sec-h"><div><div class="ct">Investor profile</div><div class="cs">Your core financial context. The engine personalizes everything to these.</div></div></div>'+
      '<div class="card"><div class="ff-grid">'+
        field('Name',u.name)+
        field('Age',u.age)+
        field('Country / residence',u.country,{select:true,options:['United Arab Emirates','United States','United Kingdom','Singapore','Saudi Arabia','India']})+
        field('Reporting currency',u.currency,{select:true,options:['USD','AED','EUR','GBP','SGD']})+
        field('Experience level',u.experience,{select:true,options:['Beginner','Intermediate','Advanced']})+
        field('Employment',u.employment,{select:true,options:['Employed full-time','Self-employed','Business owner','Retired','Student']})+
        field('Annual income band',u.income,{select:true,options:['<60,000','60,000–120,000','120,000–180,000','180,000–300,000','300,000+']})+
        field('Monthly investing budget',fmt.num(u.monthlyBudget),{prefix:'$'})+
        field('Existing investments',u.existingInvestments,{full:true})+
        field('Emergency fund',u.emergencyFund,{select:true,options:['None','1–3 months of expenses','3–6 months of expenses','6 months of expenses','12+ months of expenses']})+
        field('Investment horizon',u.horizon,{select:true,options:['<3 years (short-term)','3–10 years (medium-term)','10+ years (long-term)']})+
      '</div><div class="save-row"><button class="btn btn-primary" data-save="Profile updated">Save changes</button><span class="muted" style="font-size:12.5px">Last updated '+esc(m.asOf)+'</span></div></div>'+
    '</section>';

    // GOALS
    html+='<section class="set-sec" id="sec-goals">'+
      '<div class="card-head sec-h"><div><div class="ct">Goals</div><div class="cs">What you are investing toward. Tap to add or remove a goal.</div></div></div>'+
      '<div class="card"><div class="chipset">'+chips(['Financial independence','Wealth growth','Long-term investing','Retirement','Passive income','Capital preservation','Major purchase'],u.goals)+'</div>'+
        '<div class="field" style="margin-top:18px"><label>In your own words</label><textarea class="textarea" rows="3">'+esc(u.goalText)+'</textarea></div>'+
        '<div class="save-row"><button class="btn btn-primary" data-save="Goals saved">Save goals</button></div>'+
      '</div></section>';

    // RISK
    var bandDesc='Your <b>'+esc(u.riskBand)+'</b> profile balances meaningful long-term growth with tolerance for interim volatility. Meaningful interim drawdowns are expected and acceptable given your long-term horizon — your strategy is built to ride through them rather than react. The engine sizes positions and equity exposure to this score.';
    html+='<section class="set-sec" id="sec-risk">'+
      '<div class="card-head sec-h"><div><div class="ct">Risk profile</div><div class="cs">How much volatility your plan is built to absorb.</div></div></div>'+
      '<div class="card risk-card">'+
        '<div class="ring-wrap risk-ring"><canvas data-ring style="width:128px;height:128px"></canvas><div class="ring-val"><div class="n tnum">'+u.riskScore+'</div><div class="c">'+esc(u.riskBand)+'</div></div></div>'+
        '<div><div class="row g8" style="margin-bottom:8px"><span class="badge gold">'+esc(u.riskBand)+'</span><span class="muted" style="font-size:12.5px">Score '+u.riskScore+' / 100</span></div>'+
        '<p style="font-size:14px;line-height:1.6;color:var(--muted);margin:0 0 14px">'+bandDesc+'</p>'+
        '<button class="btn btn-ghost" data-retake>'+icon('refresh',15)+' Retake risk assessment</button></div>'+
      '</div></section>';

    // PREFERENCES
    html+='<section class="set-sec" id="sec-prefs">'+
      '<div class="card-head sec-h"><div><div class="ct">Investment preferences</div><div class="cs">Guardrails the engine respects when building your strategy.</div></div></div>'+
      '<div class="card">'+
        '<div class="pref-block"><div class="label-xs" style="margin-bottom:8px">Preferred styles</div><div class="chipset">'+chips(styleOpts,p.styles)+'</div></div>'+
        '<div class="pref-block"><div class="label-xs" style="margin-bottom:8px">Favored sectors</div><div class="chipset">'+chips(sectorOpts,p.sectors)+'</div></div>'+
        '<div class="pref-block"><div class="label-xs" style="margin-bottom:8px">Regions</div><div class="chipset">'+chips(regionOpts,p.regions)+'</div></div>'+
        '<div class="hr"></div>'+
        '<div class="ff-grid">'+field('Maximum holdings',String(p.maxHoldings),{select:true,options:['8','10','12','15','20','25']})+'<div></div></div>'+
        '<div class="pref-block" style="margin-top:18px"><div class="label-xs" style="margin-bottom:8px">Industries to avoid</div><div class="chipset">'+chips(avoidOpts,p.avoid)+'</div></div>'+
        '<div class="hr"></div>'+
        '<div class="between"><div><div class="tr-t" style="font-size:14px;color:var(--ink)">Sustainable / ESG-aware investing</div><div class="tr-s" style="font-size:12px;color:var(--faint);margin-top:2px">Tilt toward companies with stronger ESG profiles where it does not hurt returns.</div></div>'+
          '<div class="toggle'+(p.sustainable?' on':'')+'" data-toggle></div></div>'+
        '<div class="save-row"><button class="btn btn-primary" data-save="Preferences saved">Save preferences</button></div>'+
      '</div></section>';

    // MEMORY
    html+='<section class="set-sec" id="sec-memory">'+
      '<div class="card-head sec-h"><div><div class="ct">What your advisor has learned</div><div class="cs">Editable memory the advisor uses to personalize guidance.</div></div></div>'+
      '<div class="note info" style="margin-bottom:14px">'+icon('lock',16)+'<div>This memory is <b>investment-related only</b> and never leaves your account. You can edit or forget any item at any time — you are always in control of what the advisor remembers.</div></div>'+
      '<div data-mem-list>'+DB.memory.map(function(mem,i){
        var conf=Math.round(mem.confidence*100);
        return '<div class="mem-card" data-mem="'+i+'">'+
          '<div><div class="mem-key">'+esc(mem.key)+'</div><div class="mem-val">'+esc(mem.value)+'</div></div>'+
          '<div class="mem-acts"><button class="lk" data-mem-edit>Edit</button><button class="lk danger" data-mem-forget>Forget</button></div>'+
          '<div class="mem-meta"><div class="conf"><div class="bar thin"><i style="width:'+conf+'%"></i></div></div>'+
            '<span class="mem-src">'+conf+'% confidence &middot; '+esc(mem.source)+'</span></div>'+
        '</div>';
      }).join('')+'</div></section>';

    // AI & DATA
    html+='<section class="set-sec" id="sec-ai">'+
      '<div class="card-head sec-h"><div><div class="ct">AI &amp; data</div><div class="cs">How AlyInvest produces numbers and explanations.</div></div></div>'+
      '<div class="card">'+
        '<div class="note key" style="margin-bottom:14px">'+icon('shield',16)+'<div><b>Numbers are deterministic.</b> All scores, allocations, and projections come from the financial engine — the same inputs always produce the same outputs. The AI advisor only <i>explains</i> those results in plain language; it never invents figures.</div></div>'+
        '<div class="ai-grid">'+
          '<div class="ai-cell"><div class="ac-k">Engine version</div><div class="ac-v">'+esc(m.engineVersion)+'</div><div class="ac-d">Deterministic financial engine — valuation, risk &amp; portfolio math.</div></div>'+
          '<div class="ai-cell"><div class="ac-k">Reasoning models</div><div class="ac-v" style="font-size:12.5px">GPT for structured reasoning</div><div class="ac-v" style="font-size:12.5px">Claude for explanations</div><div class="ac-d">Models phrase and contextualize results; they do not compute them.</div></div>'+
          '<div class="ai-cell"><div class="ac-k">Market &amp; data as of</div><div class="ac-v" style="font-size:13px">'+esc(m.dataAsOf)+'</div><div class="ac-d">Snapshot used for this session’s calculations.</div></div>'+
          '<div class="ai-cell"><div class="ac-k">Advisor confidence</div><div class="ac-v tnum">'+Math.round(DB.scores.confidence*100)+'%</div><div class="ac-d">Aggregate confidence across current recommendations.</div></div>'+
        '</div></div></section>';

    // NOTIFICATIONS
    var notifs=[
      ['Daily briefing','A short morning summary of your portfolio and what changed.',true],
      ['Material changes only','Notify me only when a rating or thesis changes meaningfully.',true],
      ['Earnings reminders','Heads-up the day before a holding reports.',false],
      ['Email summary','Weekly digest delivered to '+DB.user.firstName+'’s inbox.',false]
    ];
    html+='<section class="set-sec" id="sec-notif">'+
      '<div class="card-head sec-h"><div><div class="ct">Notifications</div><div class="cs">Calm by default. You choose what reaches you.</div></div></div>'+
      '<div class="card">'+notifs.map(function(n){
        return '<div class="tog-row"><div><div class="tr-t">'+esc(n[0])+'</div><div class="tr-s">'+esc(n[1])+'</div></div><div class="toggle'+(n[2]?' on':'')+'" data-toggle></div></div>';
      }).join('')+'</div></section>';

    html+='</div></div></div>';
    view.innerHTML=html;

    // ring gauge
    var ring=view.querySelector('[data-ring]');
    if(ring) Charts.ring(ring, DB.user.riskScore/100, {color:'#C7A867', lw:9});

    // generic toggles
    view.querySelectorAll('[data-toggle]').forEach(function(t){
      t.addEventListener('click',function(){ t.classList.toggle('on'); });
    });

    // chips toggle
    view.querySelectorAll('[data-chip]').forEach(function(c){
      c.addEventListener('click',function(){ c.classList.toggle('selected'); });
    });

    // save buttons
    view.querySelectorAll('[data-save]').forEach(function(b){
      b.addEventListener('click',function(){ App.toast(b.getAttribute('data-save')); });
    });

    // retake
    var rt=view.querySelector('[data-retake]');
    if(rt) rt.addEventListener('click',function(){ App.navigate('onboarding'); });

    // memory edit / forget
    view.querySelectorAll('[data-mem-edit]').forEach(function(b){
      b.addEventListener('click',function(){
        var card=b.closest('.mem-card');
        var valEl=card.querySelector('.mem-val');
        if(card.getAttribute('data-editing')){
          var inp=valEl.querySelector('input');
          var nv=inp?inp.value:valEl.textContent;
          valEl.textContent=nv;
          card.removeAttribute('data-editing');
          b.textContent='Edit';
          App.toast('Memory updated');
        } else {
          var cur=valEl.textContent;
          valEl.innerHTML='<input class="input" style="font-size:14px" value="'+esc(cur)+'">';
          card.setAttribute('data-editing','1');
          b.textContent='Done';
          var i2=valEl.querySelector('input'); if(i2) i2.focus();
        }
      });
    });
    view.querySelectorAll('[data-mem-forget]').forEach(function(b){
      b.addEventListener('click',function(){
        var card=b.closest('.mem-card');
        card.classList.add('gone');
        setTimeout(function(){ if(card.parentNode) card.parentNode.removeChild(card); },260);
        App.toast('Forgotten. The advisor will no longer use this.');
      });
    });

    // sub-nav scroll + active state
    var btns=view.querySelectorAll('.set-nav button');
    btns.forEach(function(btn){
      btn.addEventListener('click',function(){
        var id=btn.getAttribute('data-go');
        var sec=view.querySelector('#sec-'+id);
        btns.forEach(function(x){x.classList.remove('on');});
        btn.classList.add('on');
        if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
      });
    });

    return function cleanup(){};
  };
})();
</script>

<script>App.boot();</script>
</body>
</html>
